<!DOCTYPE html>
<html lang="ko">
<head>

<title>ZIP-UP 4주차 · 3-STEP 인출 훈련 (AI/보안/NW/경영)</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;background:#f4f6fa;color:#1e293b;min-height:100vh}
.hdr{background:#fff;border-bottom:2px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:5px;letter-spacing:1px;white-space:nowrap}
.hdr-info{display:flex;flex-direction:column;gap:1px}
.hdr-t{font-size:14px;font-weight:700;color:#3730a3}
.hdr-sub{font-size:10px;color:#64748b}
.hdr-badge{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hdr-year{font-size:13px;font-weight:700;color:#64748b}
.hdr-tag{font-size:9px;background:#eef2ff;color:#4f46e5;padding:2px 7px;border-radius:4px;font-weight:700}
.prog-wrap{background:#fff;padding:10px 20px;border-bottom:1px solid #e2e8f0}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:5px}
.prog-bar{height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s}
.con{max-width:700px;margin:0 auto;padding:24px 16px 20px}
.home-title{text-align:center;margin:0 0 4px;font-size:22px;font-weight:800;color:#3730a3}
.home-sub{text-align:center;font-size:12px;color:#64748b;margin-bottom:24px;line-height:1.6}
.pipeline{display:flex;flex-direction:column;gap:0;margin-bottom:20px}
.pipe-step{position:relative;background:#fff;border:2px solid #e2e8f0;border-radius:14px;padding:18px 18px 18px 56px;cursor:pointer;transition:all .2s}
.pipe-step:hover{border-color:#4f46e5;box-shadow:0 4px 14px rgba(79,70,229,.1);transform:translateY(-1px)}
.pipe-step.done{border-color:#10b981;background:#f0fdf4}
.pipe-num{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.pn1{background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.pn2{background:linear-gradient(135deg,#059669,#10b981)}
.pn3{background:linear-gradient(135deg,#d97706,#f59e0b)}
.pipe-step.done .pipe-num{background:linear-gradient(135deg,#059669,#10b981)!important}
.pipe-lbl{font-size:14px;font-weight:800;color:#1e293b;margin-bottom:2px}
.pipe-desc{font-size:11px;color:#64748b;line-height:1.5}
.pipe-score{font-size:11px;font-weight:700;color:#059669;margin-top:4px}
.pipe-connector{width:2px;height:16px;background:#cbd5e1;margin:0 auto}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;display:inline-block}
.tSE{background:#dbeafe;color:#1d4ed8}.tCA{background:#dcfce7;color:#166534}.tDB{background:#fee2e2;color:#b91c1c}.tDS{background:#fef3c7;color:#92400e}.tN{background:#f1f5f9;color:#475569}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-meta{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.back-btn{margin-left:auto;background:#fff;border:1px solid #cbd5e1;color:#475569;padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:#4f46e5;color:#4f46e5}
.q-text{font-size:14px;line-height:1.85;color:#1e293b;margin-bottom:16px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;padding:11px 14px;text-align:left;cursor:pointer;color:#334155;font-size:13px;line-height:1.55;transition:all .18s;display:flex;align-items:flex-start;gap:9px}
.opt:hover:not(.dis){border-color:#4f46e5;background:#eef2ff}
.opt-lbl{font-weight:800;min-width:20px;color:#4f46e5}
.opt.ok{border-color:#10b981;background:#f0fdf4;color:#065f46}.opt.ok .opt-lbl{color:#10b981}
.opt.ng{border-color:#ef4444;background:#fef2f2;color:#991b1b}.opt.ng .opt-lbl{color:#ef4444}
.opt.rv{border-color:#10b981;background:#f0fdf4;color:#065f46;opacity:.6}.opt.dis{cursor:default}
.fb{margin-top:12px;padding:12px 14px;border-radius:9px;font-size:12px;line-height:1.7;display:none}
.fb.ok{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.fb.ng{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
.fb-t{font-weight:800;margin-bottom:3px}
.next-row{text-align:right;margin-top:10px}
.next-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:none;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.next-btn:hover{opacity:.88}
.kw-card{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kw-topic{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:4px}
.kw-prompt{font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.6}
.kw-reveal-btn{display:block;width:100%;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;transition:opacity .2s}
.kw-reveal-btn:hover{opacity:.85}
.kw-reveal-btn.revealed{background:#e2e8f0;color:#64748b;cursor:default}
.kw-list{display:none;flex-direction:column;gap:8px}
.kw-list.show{display:flex}
.kw-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;cursor:pointer;transition:all .18s;font-size:13px;line-height:1.55}
.kw-item:hover{border-color:#059669;background:#f0fdf4}
.kw-check{width:22px;height:22px;border-radius:6px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:transparent}
.kw-item.checked .kw-check{background:#10b981;border-color:#10b981;color:#fff}
.kw-item.missed .kw-check{background:#ef4444;border-color:#ef4444;color:#fff}
.kw-self-row{display:none;margin-top:14px;text-align:center}
.kw-self-row.show{display:block}
.bl-card{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.bl-topic{font-size:15px;font-weight:800;color:#1e293b;margin-bottom:4px}
.bl-prompt{font-size:12px;color:#64748b;margin-bottom:14px}
.bl-sentence{font-size:13px;line-height:2.1;color:#334155;padding:10px 0;border-bottom:1px solid #f1f5f9}
.bl-sentence:last-of-type{border-bottom:none}
.bl-label{font-size:10px;color:#94a3b8;display:block;margin-bottom:2px;font-weight:700}
.bl-blank{display:inline-block;min-width:60px;padding:2px 8px;border-bottom:2px dashed #4f46e5;color:transparent;background:#eef2ff;border-radius:4px;cursor:pointer;transition:all .25s;font-weight:700;text-align:center;margin:0 2px;font-size:12px}
.bl-blank.revealed{color:#4f46e5;background:#dbeafe;border-bottom-color:#4f46e5;border-bottom-style:solid}
.bl-reveal-all{display:block;width:100%;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:14px}
.bl-reveal-all:hover{opacity:.85}
.bl-reveal-all.done{background:#e2e8f0;color:#64748b;cursor:default}
.result-card{background:#fff;border:2px solid #c7d2fe;border-radius:16px;padding:36px 24px;text-align:center;box-shadow:0 2px 12px rgba(79,70,229,.08)}
.r-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-denom{font-size:18px;color:#94a3b8}
.r-pct{font-size:13px;color:#64748b;margin:5px 0 12px}
.r-grade{font-size:20px;font-weight:700;margin-bottom:5px;color:#1e293b}
.r-msg{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.7}
.r-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.r-btn{border:none;padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.r-btn:hover{opacity:.85}
.r-btn.primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.r-btn.green{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.r-btn.amber{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.r-btn.secondary{background:#f1f5f9;border:1px solid #cbd5e1;color:#475569}
.info-banner{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:12px;color:#3730a3;line-height:1.7}
.info-banner b{color:#4f46e5}
.step-ind{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:20px}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;transition:all .2s}
.step-dot.s1{background:#4f46e5}.step-dot.s2{background:#059669}.step-dot.s3{background:#d97706}
.step-dot.inactive{background:#cbd5e1}
.step-dot.current{box-shadow:0 0 0 3px rgba(79,70,229,.25);transform:scale(1.1)}
.step-line{width:40px;height:2px;background:#cbd5e1}
.step-line.done{background:#10b981}
.footer{border-top:1px solid #e2e8f0;background:#fff;padding:16px 20px;text-align:center;margin-top:16px}
.footer-name{font-size:12px;color:#475569;margin-bottom:4px;font-weight:500}
.footer-copy{font-size:11px;color:#94a3b8}


.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.day-card{background:#fff;border:2px solid #e2e8f0;border-radius:13px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .2s}
.day-card:hover{border-color:#4f46e5;box-shadow:0 4px 14px rgba(79,70,229,.1);transform:translateY(-1px)}
.day-card.done{border-color:#10b981;background:#f0fdf4}
.day-lbl{font-size:16px;font-weight:800;color:#3730a3;margin-bottom:6px}
.day-score{font-size:11px;margin-bottom:8px}
.day-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
.day-card.done .day-btn{background:linear-gradient(135deg,#059669,#10b981)}
.tAI{background:#fef3c7;color:#92400e}.tNW{background:#dbeafe;color:#1d4ed8}.tMG{background:#f1f5f9;color:#475569}.tSC{background:#fee2e2;color:#b91c1c}

</style>
</head>

<script>
const DAYS=[
{label:`DAY 1`,
qs:[
{a:"AI",t:`연관규칙 학습 (Apriori)`,q:`Apriori 알고리즘의 핵심 원리인 '하향 폐쇄 성질'의 의미로 옳은 것은?`,o:[`지지도가 높은 항목은 신뢰도도 반드시 높다`,`빈발 항목집합의 모든 부분집합도 빈발해야 한다`,`빈발하지 않은 항목집합의 상위집합은 반드시 빈발하다`,`향상도가 1 이상이면 모든 부분집합도 양의 연관성을 가진다`],ans:1,exp:`Apriori 원리(하향 폐쇄 성질): <b>빈발 항목집합의 모든 부분집합도 빈발</b>해야 합니다. 이를 이용해 비빈발 항목의 상위집합을 가지치기합니다.`},
{a:"AI",t:`ROC 곡선과 AUC`,q:`ROC 곡선에서 X축과 Y축이 올바르게 연결된 것은?`,o:[`X축: TPR(재현율), Y축: FPR(위양성률)`,`X축: 재현율(Recall), Y축: 정밀도(Precision)`,`X축: FPR(위양성률), Y축: TPR(재현율)`,`X축: 정밀도(Precision), Y축: 재현율(Recall)`],ans:2,exp:`ROC 곡선: <b>X축은 FPR(위양성률)</b>, <b>Y축은 TPR(재현율)</b>입니다. AUC는 이 곡선 아래 면적입니다.`},
{a:"AI",t:`K-Means와 DBSCAN`,q:`DBSCAN 알고리즘의 두 핵심 파라미터로 옳은 것은?`,o:[`K(군집 수)와 초기 중심점 위치`,`ε(탐색 반경)과 MinPts(최소 이웃 수)`,`학습률(Learning Rate)과 에포크(Epoch)`,`커널 함수와 C(패널티 파라미터)`],ans:1,exp:`DBSCAN의 두 핵심 파라미터: <b>ε(Epsilon, 탐색 반경)</b>과 <b>MinPts(최소 이웃 수)</b>입니다.`},
{a:"AI",t:`ARIMA 모델`,q:`ARIMA(p,d,q)에서 'd'가 의미하는 것은?`,o:[`차분(Differencing) 횟수`,`데이터 차원(Dimension) 수`,`자기회귀(AR) 차수`,`이동평균(MA) 차수`],ans:0,exp:`ARIMA(p,d,q): p=AR 차수, <b>d=차분(Differencing) 횟수</b>, q=MA 차수입니다. 차분으로 비정상 시계열을 정상화합니다.`},
{a:"AI",t:`CNN 풀링 계층`,q:`CNN의 풀링(Pooling) 계층의 목적으로 옳지 않은 것은?`,o:[`공간 불변성(Spatial Invariance) 제공`,`학습 가능한 필터 파라미터 업데이트`,`과적합 방지`,`특성 맵의 차원 축소`],ans:1,exp:`풀링 계층은 <b>학습 파라미터가 없습니다</b>. 차원 축소, 과적합 방지, 공간 불변성이 주요 목적입니다.`},
{a:"AI",t:`회귀 분석과 다중공선성`,q:`다중공선성을 측정하는 VIF가 심각한 수준으로 판단되는 기준은?`,o:[`VIF ≥ 20`,`VIF ≥ 5`,`VIF ≥ 3`,`VIF ≥ 10`],ans:3,exp:`<b>VIF(Variance Inflation Factor) ≥ 10</b>이면 심각한 다중공선성으로 판단합니다. 변수 제거, PCA, 릿지 회귀로 해결합니다.`},
{a:"AI",t:`SVM`,q:`SVM에서 커널 트릭(Kernel Trick)의 목적으로 옳은 것은?`,o:[`비선형 데이터를 고차원 공간으로 매핑하여 선형 분류를 가능하게 한다`,`서포트 벡터의 수를 줄여 모델을 단순화한다`,`학습 속도를 높이기 위해 데이터를 저차원으로 축소한다`,`마진을 최소화하여 과적합을 방지한다`],ans:0,exp:`<b>커널 트릭</b>은 데이터를 <b>고차원 공간으로 매핑</b>하여 비선형 데이터의 선형 분류를 가능하게 합니다.`},
{a:"AI",t:`데이터 전처리`,q:`결측치의 3가지 무작위성 유형에 해당하지 않는 것은?`,o:[`MDAR(다중 차원 결측)`,`MCAR(완전 무작위 결측)`,`MAR(무작위 결측)`,`MNAR(비무작위 결측)`],ans:0,exp:`결측치 3유형: <b>MCAR(완전 무작위)</b>, <b>MAR(무작위)</b>, <b>MNAR(비무작위)</b>입니다. MDAR은 존재하지 않는 유형입니다.`},
{a:"SC",t:`접근 통제 모델`,q:`BLP(Bell-LaPadula) 모델의 핵심 원칙으로 옳은 것은?`,o:[`No Read Down, No Write Up — 무결성 중심`,`읽기와 쓰기 모두 동일 보안 등급에서만 허용`,`No Read Up, No Write Down — 기밀성 중심`,`소유자가 자유롭게 권한을 부여`],ans:2,exp:`BLP 모델: <b>기밀성 중심</b> — <b>No Read Up(상위 등급 읽기 금지)</b>, <b>No Write Down(하위 등급 쓰기 금지)</b>입니다.`},
{a:"SC",t:`망분리`,q:`논리적 망분리 방식으로 옳지 않은 것은?`,o:[`가상화 기반 데스크톱 분리`,`SBC(Server-Based Computing)`,`VDI(Virtual Desktop Infrastructure)`,`물리적 PC 2대 구축`],ans:3,exp:`<b>물리적 PC 2대 구축</b>은 물리적 망분리 방식입니다. 논리적 망분리는 <b>VDI</b>와 <b>SBC</b> 등 가상화 기술을 사용합니다.`},
{a:"SC",t:`침해사고 대응 7단계`,q:`침해사고 대응 절차에서 '초기 대응' 단계의 핵심 활동으로 옳은 것은?`,o:[`네트워크 격리와 증거 보전(포렌식 이미징)`,`대응 팀 구성 및 매뉴얼 작성`,`최종 보고서 작성 및 재발 방지 대책 수립`,`디지털 포렌식으로 공격 경로 분석`],ans:0,exp:`<b>초기 대응</b> 단계의 핵심: <b>피해 확산 방지를 위한 네트워크 격리</b>와 <b>증거 보전(포렌식 이미징)</b>입니다.`},
{a:"SC",t:`CTEM`,q:`CTEM의 5단계 중 실제 공격 시뮬레이션으로 악용 가능성을 확인하는 단계는?`,o:[`발견(Discovery)`,`검증(Validation)`,`범위 설정(Scoping)`,`우선순위화(Prioritization)`],ans:1,exp:`<b>검증(Validation)</b> 단계에서 <b>침투 테스트(Pentest)</b>와 <b>BAS(Breach and Attack Simulation)</b>로 실제 악용 가능성을 확인합니다.`},
{a:"SC",t:`PKI와 PQC`,q:`양자 컴퓨터로 현행 공개키 암호를 해독할 수 있게 하는 알고리즘은?`,o:[`그로버 알고리즘(Grover's Algorithm)`,`쇼어 알고리즘(Shor's Algorithm)`,`RSA 알고리즘`,`다익스트라 알고리즘(Dijkstra's Algorithm)`],ans:1,exp:`<b>쇼어 알고리즘(Shor's Algorithm)</b>은 소인수분해 문제를 다항 시간에 해결하여 <b>RSA, ECC 등 현행 공개키 암호를 해독</b>할 수 있습니다.`},
{a:"NW",t:`BGP`,q:`BGP가 사용하는 라우팅 방식으로 옳은 것은?`,o:[`플러딩(Flooding) 방식`,`거리 벡터(Distance Vector) 방식`,`경로 벡터(Path Vector) 방식`,`링크 상태(Link State) 방식`],ans:2,exp:`BGP는 <b>경로 벡터(Path Vector)</b> 방식으로, AS 경유 경로 전체를 교환하여 <b>루핑을 방지</b>합니다.`},
{a:"NW",t:`IPSec VPN`,q:`IPSec의 3대 핵심 프로토콜로 옳은 것은?`,o:[`AH, ESP, IKE`,`SSL, TLS, DTLS`,`HTTP, HTTPS, SSH`,`TCP, UDP, ICMP`],ans:0,exp:`IPSec의 3대 프로토콜: <b>AH(인증)</b>, <b>ESP(암호화+인증)</b>, <b>IKE(키 교환)</b>입니다.`},
{a:"NW",t:`Wi-Fi 7 MLO`,q:`Wi-Fi 7(802.11be)의 핵심 기술인 MLO의 의미로 옳은 것은?`,o:[`하나의 주파수 대역 내에서 채널 폭을 극대화하는 기술`,`전력 절약을 위해 대기 시간을 조절하는 기술`,`안테나 수를 늘려 전송 속도를 높이는 MIMO 확장 기술`,`2.4GHz, 5GHz, 6GHz 대역을 동시에 묶어 사용하는 기술`],ans:3,exp:`<b>MLO(Multi-Link Operation)</b>는 <b>2.4GHz, 5GHz, 6GHz 대역을 동시에 묶어 사용</b>하는 Wi-Fi 7의 핵심 기술입니다.`},
{a:"NW",t:`6G NTN`,q:`NTN(Non-Terrestrial Network)에서 LEO 위성의 장점으로 옳은 것은?`,o:[`정지궤도로 넓은 커버리지 제공`,`지상 기지국 대비 구축 비용이 저렴함`,`도플러 시프트가 발생하지 않음`,`저궤도로 인한 저지연(20~40ms RTT)`],ans:3,exp:`<b>LEO(저궤도, 500~2000km) 위성</b>의 장점은 <b>저지연(20~40ms RTT)</b>입니다. 단, 빠른 이동으로 도플러 시프트가 발생합니다.`},
{a:"MG",t:`ROI, NPV, IRR`,q:`NPV(순현재가치) > 0이 의미하는 것으로 옳은 것은?`,o:[`투자 수익률이 시장 평균을 초과한다`,`내부수익률이 할인율보다 작다`,`미래 현금흐름의 현재가치가 투자비를 초과하여 투자 가치가 있다`,`투자 비용이 0보다 크다`],ans:2,exp:`<b>NPV > 0</b>은 <b>미래 현금흐름의 현재가치가 투자비를 초과</b>하여 투자 가치가 있음을 의미합니다.`},
{a:"MG",t:`DPP`,q:`디지털 제품 여권(DPP)의 법적 근거가 되는 EU 규정은?`,o:[`디지털시장법(DMA)`,`사이버복원력법(CRA)`,`에코디자인 규정(ESPR)`,`GDPR(개인정보보호규정)`],ans:2,exp:`DPP의 법적 근거: <b>EU 에코디자인 규정(ESPR, Ecodesign for Sustainable Products Regulation)</b>입니다.`},
{a:"MG",t:`ITIL 4 SVS`,q:`ITIL 4에서 ITIL v3 대비 가장 핵심적인 변화는?`,o:[`폭포수 방법론을 공식 채택`,`IT 서비스 데스크를 폐지하고 챗봇으로 대체`,`운영 프로세스 수가 26개에서 34개로 증가`,`서비스 라이프사이클에서 서비스 가치 체계(SVS)로 전환`],ans:3,exp:`ITIL 4의 핵심 변화: <b>서비스 라이프사이클 중심(v3)</b>에서 <b>서비스 가치 체계(SVS) 중심</b>으로 전환. DevOps/Agile과 통합됩니다.`}
],
topics:[
{topic:`연관규칙 학습 (Apriori 알고리즘)`,domain:`AI`,keywords:[`정의: 트랜잭션 데이터에서 항목 간 연관성을 발견하는 비지도 학습 기법`,`Apriori 원리: 빈발 항목집합의 모든 부분집합도 빈발해야 함 (하향 폐쇄 성질, Downward Closure Property)`,`지지도(Support) = 전체 거래 중 A∩B 포함 거래 비율`,`신뢰도(Confidence) = P(B|A) = Support(A∩B) ÷ Support(A)`,`향상도(Lift) = Confidence ÷ Support(B) — Lift>1이면 양의 연관성`,`Apriori 알고리즘 동작: 후보 생성(Candidate Generation) → 가지치기(Pruning) → 지지도 검증 반복`],blanks:[{s:`연관규칙의 3대 평가 지표: {{지지도(Support)}}, {{신뢰도(Confidence)}}, {{향상도(Lift)}}.`},{s:`지지도(Support) = 전체 거래 중 {{A∩B 포함 거래}} 비율.`},{s:`신뢰도(Confidence) = {{P(B|A)}} = {{Support(A∩B)}} ÷ {{Support(A)}}.`},{s:`향상도(Lift) = {{Confidence}} ÷ {{Support(B)}}이며, {{Lift>1}}이면 양의 연관성을 의미한다.`}]},
{topic:`분류 모델 성능 평가 (ROC 곡선과 AUC)`,domain:`AI`,keywords:[`혼동 행렬(Confusion Matrix): TP, TN, FP, FN 4가지 분류 결과의 매트릭스`,`정밀도(Precision) = TP ÷ (TP+FP) — 양성 예측 중 실제 양성 비율`,`재현율(Recall, TPR) = TP ÷ (TP+FN) — 실제 양성 중 정확히 탐지한 비율`,`F1-Score = 2×(Precision×Recall) ÷ (Precision+Recall) — 정밀도와 재현율의 조화 평균`,`ROC 곡선: X축 FPR(위양성률), Y축 TPR(재현율)로 임계값 변화에 따른 성능 시각화`,`AUC(Area Under Curve): ROC 곡선 아래 면적 — 1에 가까울수록 우수한 모델`],blanks:[{s:`혼동 행렬의 4요소: {{TP(True Positive)}}, {{TN(True Negative)}}, {{FP(False Positive)}}, {{FN(False Negative)}}.`},{s:`정밀도(Precision) = {{TP}} ÷ ({{TP+FP}}), 재현율(Recall) = {{TP}} ÷ ({{TP+FN}}).`},{s:`F1-Score = {{2×(Precision×Recall)}} ÷ {{(Precision+Recall)}}로, 정밀도와 재현율의 {{조화 평균}}이다.`},{s:`ROC 곡선의 X축은 {{FPR(위양성률)}}, Y축은 {{TPR(재현율)}}이다.`}]},
{topic:`K-Means 군집화와 DBSCAN 알고리즘`,domain:`AI`,keywords:[`K-Means: 거리 기반 군집화 — K개 중심점(Centroid)을 기준으로 데이터를 분할`,`K-Means 동작: ①중심점 초기화 → ②각 데이터를 가장 가까운 중심에 할당 → ③중심 재계산 → ②~③ 수렴까지 반복`,`K-Means의 한계: 비구형(Non-spherical) 데이터에 부적합, K값 사전 지정 필요, 이상치에 민감`,`엘보우 기법(Elbow Method): K값에 따른 SSE(Sum of Squared Errors) 변화로 최적 K 결정`,`DBSCAN: 밀도 기반 군집화 — 밀집 영역을 하나의 군집으로 연결`,`DBSCAN 파라미터: ε(Epsilon, 탐색 반경)과 MinPts(최소 이웃 수)`],blanks:[{s:`K-Means는 {{거리 기반}} 군집화이고, DBSCAN은 {{밀도 기반}} 군집화이다.`},{s:`K-Means 동작: ①{{중심점 초기화}} → ②{{가장 가까운 중심에 할당}} → ③{{중심 재계산}} → 수렴까지 반복.`},{s:`K-Means의 한계: {{비구형 데이터}}에 부적합, {{K값 사전 지정}} 필요, {{이상치에 민감}}.`},{s:`DBSCAN의 두 핵심 파라미터: {{ε(Epsilon, 탐색 반경)}}과 {{MinPts(최소 이웃 수)}}.`}]},
{topic:`시계열 분석과 ARIMA 모델`,domain:`AI`,keywords:[`시계열 데이터: 시간 순서에 따라 관측된 일련의 데이터 포인트`,`정상성(Stationarity): 평균, 분산, 자기공분산이 시간에 따라 일정한 성질`,`비정상 시계열 → 차분(Differencing)으로 정상화 후 분석`,`ARIMA = AR(자기회귀) + I(차분, 적분) + MA(이동평균)의 결합 모델`,`AR(p): 과거 p개 시점의 자기 값으로 현재 값을 예측`,`MA(q): 과거 q개 시점의 오차(잔차)로 현재 값을 보정`],blanks:[{s:`ARIMA는 {{AR(자기회귀)}} + {{I(차분/적분)}} + {{MA(이동평균)}}의 결합 모델이다.`},{s:`ARIMA(p,d,q)에서 p={{AR 차수}}, d={{차분 횟수}}, q={{MA 차수}}를 의미한다.`},{s:`정상성(Stationarity)이란 {{평균}}, {{분산}}, {{자기공분산}}이 시간에 따라 일정한 성질이다.`},{s:`비정상 시계열은 {{차분(Differencing)}}을 통해 정상화한 후 분석한다.`}]},
{topic:`합성곱 신경망(CNN)의 풀링(Pooling) 계층`,domain:`AI`,keywords:[`CNN 기본 구조: 입력 → [합성곱(Convolution) → 활성화(ReLU) → 풀링(Pooling)] 반복 → 완전연결(FC) → 출력`,`풀링 계층 목적: 특성 맵의 차원 축소(다운샘플링), 연산량 감소, 과적합 방지`,`최대 풀링(Max Pooling): 영역 내 최댓값 선택 — 가장 강한 특성을 추출`,`평균 풀링(Average Pooling): 영역 내 평균값 계산 — 전체적인 특성 정보를 보존`,`공간 불변성(Spatial Invariance): 입력의 위치가 변해도 동일한 특성을 인식`,`풀링 윈도우 크기와 스트라이드(Stride)로 다운샘플링 비율 조절`],blanks:[{s:`풀링 계층의 3대 목적: {{차원 축소}}, {{연산량 감소}}, {{과적합 방지}}.`},{s:`최대 풀링(Max Pooling)은 영역 내 {{최댓값}}을 선택하고, 평균 풀링(Average Pooling)은 {{평균값}}을 계산한다.`},{s:`풀링이 제공하는 {{공간 불변성(Spatial Invariance)}}은 입력 위치가 변해도 동일한 특성을 인식하게 한다.`},{s:`합성곱 계층의 필터는 {{학습 가능한 파라미터}}이지만, 풀링 계층은 {{학습 파라미터가 없다}}.`}]},
{topic:`테스트 타임 컴퓨팅 (Test-Time Compute)`,domain:`AI`,keywords:[`정의: 모델 추론(답변 생성) 단계에서 추가 연산량을 투입하여 응답 품질을 높이는 기법`,`기존 패러다임: 훈련 시간(Training Time)에 연산을 집중 → 모델 크기를 키워 성능 향상`,`새 패러다임: 추론 시간(Inference Time)에 연산을 투입 → 작은 모델도 복잡한 문제 해결`,`핵심 기법: 사고의 사슬(Chain-of-Thought, CoT) — 중간 추론 과정을 명시적으로 생성`,`OpenAI o1 모델: CoT를 내재화하여 수학, 코딩, 과학 추론에서 전문가급 성능 달성`,`강화학습(RL) 기반 훈련: CoT 품질을 보상 함수로 최적화`],blanks:[{s:`테스트 타임 컴퓨팅은 {{추론(Inference)}} 단계에서 추가 {{연산량}}을 투입하여 응답 품질을 높이는 기법이다.`},{s:`핵심 기법인 {{사고의 사슬(Chain-of-Thought, CoT)}}은 {{중간 추론 과정}}을 명시적으로 생성한다.`},{s:`OpenAI {{o1}} 모델은 CoT를 내재화하여 {{수학, 코딩, 과학 추론}}에서 전문가급 성능을 달성했다.`},{s:`기존 Scaling Law가 {{모델 크기}}에 집중했다면, 새 패러다임은 {{추론 연산량}}도 성능 향상의 축으로 확장한다.`}]},
{topic:`회귀 분석과 다중공선성`,domain:`AI`,keywords:[`단순 선형 회귀: y = β₀ + β₁x + ε — 독립변수 1개로 종속변수 예측`,`다중 선형 회귀: y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε — 독립변수 여러 개`,`다중공선성(Multicollinearity): 독립변수 간 높은 상관관계로 회귀계수 추정이 불안정해지는 현상`,`VIF(Variance Inflation Factor, 분산팽창인수): 다중공선성 정량 측정 — VIF≥10이면 심각`,`다중공선성 해결: 변수 제거, 주성분 분석(PCA), 릿지 회귀(Ridge Regression, L2 정규화)`,`R-Square(결정계수): 회귀 모델의 설명력 — 1에 가까울수록 높은 설명력`],blanks:[{s:`단순 선형 회귀: {{y = β₀ + β₁x + ε}}, 다중 선형 회귀: {{y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε}}.`},{s:`다중공선성은 {{독립변수 간 높은 상관관계}}로 인해 {{회귀계수 추정}}이 불안정해지는 현상이다.`},{s:`VIF({{Variance Inflation Factor}})가 {{10}} 이상이면 심각한 다중공선성으로 판단한다.`},{s:`다중공선성 해결 방법: {{변수 제거}}, {{PCA(주성분 분석)}}, {{릿지 회귀(Ridge, L2 정규화)}}.`}]},
{topic:`SVM (서포트 벡터 머신)`,domain:`AI`,keywords:[`정의: 초평면(Hyperplane)으로 데이터를 분류하며 마진(Margin)을 최대화하는 지도 학습 알고리즘`,`서포트 벡터(Support Vector): 결정 경계에 가장 가까운 데이터 포인트들`,`마진(Margin): 결정 경계와 서포트 벡터 사이의 거리 — 마진 최대화가 핵심 목표`,`하드 마진(Hard Margin): 이상치 허용 없이 완벽 분리 — 오버피팅(과적합) 위험`,`소프트 마진(Soft Margin): 슬랙 변수(ξ)로 일부 오분류 허용 — C 파라미터로 패널티 조절`,`커널 트릭(Kernel Trick): 저차원 데이터를 고차원 공간으로 매핑하여 비선형 분류 가능`],blanks:[{s:`SVM은 {{초평면(Hyperplane)}}으로 데이터를 분류하며 {{마진(Margin)}}을 최대화하는 알고리즘이다.`},{s:`{{서포트 벡터(Support Vector)}}는 결정 경계에 {{가장 가까운}} 데이터 포인트들이다.`},{s:`하드 마진은 {{오버피팅}} 위험이 있으므로, {{슬랙 변수(ξ)}}를 도입한 {{소프트 마진}}을 사용한다.`},{s:`{{커널 트릭(Kernel Trick)}}은 데이터를 {{고차원 공간}}으로 매핑하여 비선형 분류를 가능하게 한다.`}]},
{topic:`접근 통제 모델 (MAC, DAC, RBAC)`,domain:`SC`,keywords:[`접근 통제(Access Control): 주체(Subject)가 객체(Object)에 접근할 권한을 관리하는 보안 메커니즘`,`MAC(Mandatory Access Control, 강제적 접근 통제): 시스템(보안 관리자)이 보안 등급에 따라 접근 권한을 강제 부여`,`MAC 모델: BLP(Bell-LaPadula) — 기밀성 중심 (No Read Up, No Write Down)`,`MAC 모델: Biba — 무결성 중심 (No Read Down, No Write Up)`,`DAC(Discretionary Access Control, 임의적 접근 통제): 자원 소유자가 자율적으로 접근 권한 부여`,`DAC 구현: ACL(Access Control List), Capability List`],blanks:[{s:`MAC({{강제적 접근 통제}})는 {{시스템(보안 관리자)}}이 보안 등급에 따라 접근 권한을 강제 부여한다.`},{s:`BLP 모델: 기밀성 중심 — {{No Read Up}}, {{No Write Down}}.`},{s:`Biba 모델: 무결성 중심 — {{No Read Down}}, {{No Write Up}}.`},{s:`DAC({{임의적 접근 통제}})는 {{자원 소유자}}가 자율적으로 접근 권한을 부여한다.`}]},
{topic:`망분리 (물리적 망분리와 논리적 망분리)`,domain:`SC`,keywords:[`목적: 외부 인터넷과 내부 업무망을 분리하여 정보 유출·해킹을 원천 차단`,`물리적 망분리: 내부망·외부망 각각 별도의 PC, 네트워크 장비를 구축 — 완전한 물리적 분리`,`논리적 망분리: 하나의 물리적 인프라에서 가상화 기술로 망을 분리`,`논리적 망분리 방식: VDI(Virtual Desktop Infrastructure) — 서버에서 가상 데스크톱 제공`,`논리적 망분리 방식: SBC(Server-Based Computing) — 서버에서 애플리케이션 실행, 화면만 전송`,`물리적 망분리 장점: 보안 강도 최상 / 단점: 높은 구축·운영 비용, 업무 불편`],blanks:[{s:`물리적 망분리는 내부망·외부망 각각 {{별도의 PC, 네트워크 장비}}를 구축하는 방식이다.`},{s:`논리적 망분리의 두 방식: {{VDI(Virtual Desktop Infrastructure)}}와 {{SBC(Server-Based Computing)}}.`},{s:`물리적 망분리의 장점은 {{보안 강도 최상}}이고, 단점은 {{높은 구축·운영 비용}}이다.`},{s:`논리적 망분리의 위험: {{가상화 취약점}}과 {{하이퍼바이저 해킹}} 위험이 존재한다.`}]},
{topic:`침해사고 대응 7단계 절차`,domain:`SC`,keywords:[`침해사고: 해킹, 악성코드 감염, DDoS 등으로 정보 시스템의 기밀성·무결성·가용성이 침해된 사건`,`7단계: ①사전 준비 → ②탐지/식별 → ③초기 대응 → ④대응 전략 수립 → ⑤조사/분석 → ⑥복구/해결 → ⑦사후 보고/완료`,`①사전 준비: 대응 팀(CERT/CSIRT) 구성, 대응 절차 매뉴얼, 도구·장비 확보`,`②탐지/식별: IDS/IPS, SIEM, 로그 분석으로 이상 징후 탐지 및 사고 유형 식별`,`③초기 대응: 피해 확산 방지를 위한 네트워크 격리, 증거 보전(포렌식 이미징)`,`④대응 전략 수립: 사고 범위·영향도 평가, 법적 조치 필요 여부 판단`],blanks:[{s:`침해사고 대응 7단계: ①{{사전 준비}} → ②{{탐지/식별}} → ③{{초기 대응}} → ④{{대응 전략 수립}} → ⑤{{조사/분석}} → ⑥{{복구/해결}} → ⑦{{사후 보고/완료}}.`},{s:`②탐지/식별 단계에서 {{IDS/IPS}}, {{SIEM}}, 로그 분석으로 이상 징후를 탐지한다.`},{s:`③초기 대응 단계의 핵심: {{네트워크 격리}}와 {{증거 보전(포렌식 이미징)}}.`},{s:`⑤조사/분석 단계에서 {{디지털 포렌식}}으로 공격 경로와 원인을 규명한다.`}]},
{topic:`CTEM (지속적 위협 노출 관리)`,domain:`SC`,keywords:[`정의: 가트너(Gartner)가 제시한 능동적 사이버 보안 프레임워크 — 조직의 위협 노출을 지속적으로 평가·관리`,`기존 취약점 관리(VM)와의 차이: VM은 패치 중심 → CTEM은 비즈니스 리스크 기준으로 우선순위 결정`,`CTEM 5단계: ①범위 설정(Scoping) → ②발견(Discovery) → ③우선순위화(Prioritization) → ④검증(Validation) → ⑤동원(Mobilization)`,`①범위 설정: 비즈니스 자산과 공격 표면(Attack Surface) 식별`,`②발견: 자산의 취약점, 구성 오류, 위협 인텔리전스 수집`,`③우선순위화: 실제 악용 가능성과 비즈니스 영향도에 따른 리스크 순위 결정`],blanks:[{s:`CTEM은 {{가트너(Gartner)}}가 제시한 능동적 사이버 보안 프레임워크이다.`},{s:`CTEM 5단계: ①{{범위 설정(Scoping)}} → ②{{발견(Discovery)}} → ③{{우선순위화(Prioritization)}} → ④{{검증(Validation)}} → ⑤{{동원(Mobilization)}}.`},{s:`기존 취약점 관리(VM)는 {{패치 중심}}이지만, CTEM은 {{비즈니스 리스크 기준}}으로 우선순위를 결정한다.`},{s:`검증 단계에서 {{침투 테스트}}와 {{BAS(Breach and Attack Simulation)}}로 악용 가능성을 확인한다.`}]},
{topic:`PKI와 양자내성암호(PQC)`,domain:`SC`,keywords:[`대칭키 암호: 암·복호화에 동일한 키 사용 — 키 분배 문제 N(N-1)/2`,`공개키(비대칭키) 암호: 공개키(암호화)와 개인키(복호화)를 분리 — RSA, ECC 등`,`PKI(Public Key Infrastructure): 공개키의 소유자를 인증하는 디지털 인증서 발급·관리 체계`,`PKI 구성요소: CA(인증기관), RA(등록기관), CRL(인증서 폐지 목록), OCSP(온라인 인증서 상태 프로토콜)`,`디지털 인증서: X.509 표준 — 공개키, 소유자 정보, CA 서명 포함`,`양자 위협: 쇼어 알고리즘(Shor's Algorithm)으로 RSA, ECC 등 현행 공개키 암호가 해독 가능`],blanks:[{s:`대칭키 암호의 키 분배 문제: N명 통신 시 {{N(N-1)/2}}개의 키가 필요하다.`},{s:`PKI 구성요소: {{CA(인증기관)}}, {{RA(등록기관)}}, {{CRL(인증서 폐지 목록)}}, {{OCSP}}.`},{s:`양자 컴퓨터의 {{쇼어 알고리즘(Shor's Algorithm)}}으로 RSA, ECC 등 현행 공개키 암호가 해독 가능해진다.`},{s:`NIST PQC 표준: {{CRYSTALS-Kyber}}(키캡슐화)와 {{CRYSTALS-Dilithium}}(전자서명).`}]},
{topic:`BGP (Border Gateway Protocol)`,domain:`NW`,keywords:[`정의: 자율 시스템(AS, Autonomous System) 간 라우팅을 수행하는 외부 게이트웨이 프로토콜(EGP)`,`경로 벡터(Path Vector) 방식: AS 경유 경로 전체를 교환하여 루핑(Looping) 방지`,`BGP 특성: 정책 기반 라우팅 — ISP 간 비즈니스 관계(고객/제공자/피어)에 따른 경로 선택`,`BGP 메시지: OPEN, UPDATE, KEEPALIVE, NOTIFICATION`,`AS-PATH 속성: 경유하는 AS 번호를 순서대로 기록 — 경로 선택과 루프 탐지에 활용`,`eBGP(External BGP): 서로 다른 AS 간 라우팅, iBGP(Internal BGP): 같은 AS 내부 라우팅`],blanks:[{s:`BGP는 {{자율 시스템(AS)}} 간 라우팅을 수행하는 {{외부 게이트웨이 프로토콜(EGP)}}이다.`},{s:`BGP는 {{경로 벡터(Path Vector)}} 방식으로 AS 경유 경로 전체를 교환하여 {{루핑}}을 방지한다.`},{s:`BGP 4가지 메시지: {{OPEN}}, {{UPDATE}}, {{KEEPALIVE}}, {{NOTIFICATION}}.`},{s:`{{AS-PATH}} 속성은 경유하는 AS 번호를 순서대로 기록하여 경로 선택과 루프 탐지에 활용된다.`}]},
{topic:`IPSec VPN 아키텍처`,domain:`NW`,keywords:[`IPSec: 네트워크 계층(L3)에서 IP 패킷 단위로 인증·암호화를 제공하는 보안 프로토콜`,`3대 핵심 프로토콜: AH(Authentication Header), ESP(Encapsulating Security Payload), IKE(Internet Key Exchange)`,`AH: 인증·무결성 보장 (암호화 없음)`,`ESP: 인증·무결성 + 기밀성(암호화) 보장 — 실무에서 가장 많이 사용`,`IKE(Internet Key Exchange): SA(Security Association) 설정을 위한 자동 키 교환 프로토콜`,`전송 모드(Transport Mode): IP 페이로드만 암호화 — 호스트 간 통신`],blanks:[{s:`IPSec의 3대 프로토콜: {{AH(Authentication Header)}}, {{ESP(Encapsulating Security Payload)}}, {{IKE(Internet Key Exchange)}}.`},{s:`AH는 {{인증·무결성}}만 보장하고, ESP는 추가로 {{기밀성(암호화)}}을 제공한다.`},{s:`전송 모드는 {{IP 페이로드만}} 암호화하고, 터널 모드는 {{전체 패킷}}을 암호화한다.`},{s:`{{SA(Security Association)}}는 보안 파라미터를 합의하는 {{단방향}} 논리적 연결이다.`}]},
{topic:`Wi-Fi 7과 MLO (Multi-Link Operation)`,domain:`NW`,keywords:[`Wi-Fi 7 표준: IEEE 802.11be — Extremely High Throughput(EHT)`,`MLO(Multi-Link Operation): 2.4GHz, 5GHz, 6GHz 대역을 동시에 묶어 사용하는 핵심 기술`,`MLO 장점: 대역폭 증가, 지연 감소(Low Latency), 링크 장애 시 자동 페일오버`,`4K-QAM(4096-QAM): 한 심볼에 12비트 전송 → Wi-Fi 6의 1024-QAM(10비트) 대비 20% 처리량 증가`,`320MHz 채널 폭: Wi-Fi 6E(160MHz)의 2배 — 최대 46Gbps 이론 속도`,`CMU-MIMO: 좌표 다중 사용자 MIMO — 더 많은 사용자 동시 접속 지원`],blanks:[{s:`Wi-Fi 7의 표준명은 {{IEEE 802.11be}}이며, {{EHT(Extremely High Throughput)}}로 불린다.`},{s:`MLO({{Multi-Link Operation}})는 {{2.4GHz}}, {{5GHz}}, {{6GHz}} 대역을 동시에 묶어 사용한다.`},{s:`Wi-Fi 7은 {{4K-QAM(4096-QAM)}}으로 한 심볼에 {{12비트}}를 전송한다.`},{s:`Wi-Fi 7의 최대 채널 폭은 {{320MHz}}로, Wi-Fi 6E({{160MHz}})의 2배이다.`}]},
{topic:`네트워크 계층별 암호화 (IPsec, TLS)`,domain:`NW`,keywords:[`구간 암호화: OSI 7계층 각 계층에서 데이터를 보호하는 암호화 프로토콜 적용`,`L3(네트워크 계층) — IPsec: IP 패킷 단위 인증·암호화, VPN 구현의 핵심`,`L4(전송 계층) — TLS(Transport Layer Security): 세션 기반 암호화, HTTPS의 기반`,`L7(응용 계층) — HTTPS, SSH, S/MIME 등 애플리케이션별 보안 프로토콜`,`TLS 1.3의 개선: 불필요한 암호 스위트 제거, 1-RTT 핸드셰이크(기존 2-RTT), 0-RTT 재개(Resumption)`,`TLS 핸드셰이크: 클라이언트 Hello → 서버 Hello → 인증서 교환 → 키 교환 → 암호화 통신`],blanks:[{s:`L3 암호화: {{IPsec}} — IP 패킷 단위 인증·암호화.`},{s:`L4 암호화: {{TLS(Transport Layer Security)}} — 세션 기반 암호화, {{HTTPS}}의 기반.`},{s:`TLS 1.3의 핸드셰이크 개선: 기존 {{2-RTT}}에서 {{1-RTT}}로 단축.`},{s:`TLS 1.3에서는 {{RSA 키 교환}}이 제거되고 {{ECDHE}}만 허용하여 {{PFS(전방향 비밀성)}}를 보장한다.`}]},
{topic:`IT 투자 타당성 분석 (ROI, NPV, IRR)`,domain:`MG`,keywords:[`IT 투자 타당성 분석: 정보화 사업의 재무적 가치를 정량적으로 평가하여 투자 의사결정을 지원`,`ROI(Return on Investment, 투자 수익률) = (순이익 ÷ 투자비용) × 100`,`ROI 장점: 직관적이고 이해 쉬움 / 단점: 화폐의 시간가치 미반영, 투자 기간 무시`,`NPV(Net Present Value, 순현재가치): 미래 현금흐름을 할인율로 현재가치화한 후 투자비를 차감`,`NPV > 0이면 투자 가치 있음, NPV가 가장 큰 대안을 선택`,`IRR(Internal Rate of Return, 내부수익률): NPV=0이 되는 할인율 — IRR > 요구수익률이면 투자`],blanks:[{s:`ROI({{투자 수익률}}) = ({{순이익}} ÷ {{투자비용}}) × 100.`},{s:`NPV({{순현재가치}})는 미래 현금흐름을 {{할인율}}로 현재가치화한 후 투자비를 차감한 값이다.`},{s:`NPV > {{0}}이면 투자 가치가 있으며, NPV가 {{가장 큰}} 대안을 선택한다.`},{s:`IRR({{내부수익률}})은 {{NPV=0}}이 되는 할인율이며, IRR > {{요구수익률}}이면 투자한다.`}]},
{topic:`디지털 제품 여권 (DPP, Digital Product Passport)`,domain:`MG`,keywords:[`정의: 제품의 원재료부터 폐기까지 전 생애주기 정보를 디지털화한 전자 기록`,`법적 근거: EU 에코디자인 규정(ESPR, Ecodesign for Sustainable Products Regulation)`,`도입 목적: 순환경제(Circular Economy) 실현 — 자원 효율성, 재활용률 향상, 탄소 배출 감축`,`기록 정보: 탄소발자국(Carbon Footprint), 원산지, 재활용 비율, 유해물질 함량, 수리 정보`,`기술 기반: 블록체인(데이터 위변조 방지·투명성), IoT(실시간 추적), QR코드/NFC(소비자 접근)`,`적용 대상: 배터리(2027년 의무화 예정), 섬유, 전자제품 등 단계적 확대`],blanks:[{s:`DPP는 제품의 {{원재료부터 폐기까지}} 전 {{생애주기 정보}}를 디지털화한 전자 기록이다.`},{s:`법적 근거: EU {{에코디자인 규정(ESPR)}} — {{순환경제(Circular Economy)}} 실현이 목적이다.`},{s:`기록 정보: {{탄소발자국}}, {{원산지}}, {{재활용 비율}}, 유해물질 함량, 수리 정보.`},{s:`기술 기반: {{블록체인}}(위변조 방지), {{IoT}}(실시간 추적), {{QR코드/NFC}}(소비자 접근).`}]},
{topic:`ITIL 4 서비스 가치 체계(SVS)`,domain:`MG`,keywords:[`ITIL(IT Infrastructure Library): IT 서비스 관리(ITSM)를 위한 모범 사례 프레임워크`,`ITIL v3 → ITIL 4 전환: 서비스 라이프사이클 중심 → 서비스 가치 체계(SVS) 중심`,`SVS(Service Value System): 수요(Demand) → 가치(Value) 창출의 전체 흐름을 관리`,`SVS 구성요소: ①기회/수요 → ②서비스 가치 사슬(SVC) → ③지도 원칙 → ④거버넌스 → ⑤지속적 개선 → ⑥관리 관행(Practice)`,`서비스 가치 사슬(SVC): 계획(Plan), 개선(Improve), 참여(Engage), 설계·전환(Design & Transition), 획득·구축(Obtain/Build), 전달·지원(Deliver & Support)`,`ITIL 4 지도 원칙 7가지: 가치에 집중, 현재 위치에서 출발, 피드백으로 반복 개선, 협업·가시성, 전체적 사고, 단순·실용, 최적화·자동화`],blanks:[{s:`ITIL 4의 핵심은 {{SVS(Service Value System)}}로, {{수요(Demand)}}를 {{가치(Value)}}로 전환하는 체계이다.`},{s:`SVS의 핵심인 서비스 가치 사슬(SVC) 6가지: {{계획}}, {{개선}}, {{참여}}, {{설계·전환}}, {{획득·구축}}, {{전달·지원}}.`},{s:`ITIL 4의 4차원 모델: {{조직과 사람}}, {{정보와 기술}}, {{파트너와 공급자}}, {{가치 흐름과 프로세스}}.`},{s:`ITIL v3는 {{서비스 라이프사이클}} 중심이었으나, ITIL 4는 {{서비스 가치 체계(SVS)}} 중심이다.`}]}
]},
{label:`DAY 2`,
qs:[
{a:"AI",t:`연관규칙 학습 (Apriori)`,q:`연관규칙 평가에서 향상도(Lift)가 1보다 클 때의 의미로 옳은 것은?`,o:[`A와 B는 양의 연관성(보완재 관계)이다`,`A와 B는 음의 연관성(대체재 관계)이다`,`A와 B는 서로 독립적이다`,`A와 B의 지지도가 동일하다`],ans:0,exp:`<b>Lift > 1</b>이면 <b>양의 연관성</b>(A 구매 시 B도 구매할 확률이 높아짐), <b>Lift = 1</b>이면 독립, <b>Lift < 1</b>이면 음의 연관성입니다.`},
{a:"AI",t:`ROC 곡선과 AUC`,q:`F1-Score의 산출 방식으로 옳은 것은?`,o:[`(Precision + Recall) ÷ 2`,`(TP + TN) ÷ 전체 데이터 수`,`TP ÷ (TP + FP + FN)`,`2 × (Precision × Recall) ÷ (Precision + Recall)`],ans:3,exp:`<b>F1-Score = 2 × (Precision × Recall) ÷ (Precision + Recall)</b> — 정밀도와 재현율의 <b>조화 평균</b>입니다.`},
{a:"AI",t:`단어 임베딩 (Word2Vec, BERT)`,q:`BERT의 사전훈련 방법에 해당하지 않는 것은?`,o:[`Skip-gram`,`NSP(Next Sentence Prediction)`,`Self-Attention 기반 양방향 학습`,`MLM(Masked Language Model)`],ans:0,exp:`BERT의 사전훈련: <b>MLM(Masked Language Model)</b>과 <b>NSP(Next Sentence Prediction)</b>입니다. Skip-gram은 <b>Word2Vec</b>의 아키텍처입니다.`},
{a:"AI",t:`GAN vs Diffusion`,q:`GAN의 대표적 한계로 옳은 것은?`,o:[`생성 속도가 수백 스텝으로 느리다`,`판별자 없이 생성자만으로 학습한다`,`모드 붕괴(Mode Collapse)로 다양성이 부족해진다`,`학습에 레이블 데이터가 반드시 필요하다`],ans:2,exp:`GAN의 대표적 한계: <b>모드 붕괴(Mode Collapse)</b> — 생성자가 한정된 패턴만 반복 생성하여 다양성이 부족해집니다.`},
{a:"AI",t:`Scaling Law`,q:`Chinchilla Scaling Law(2022)의 핵심 주장으로 옳은 것은?`,o:[`데이터 양보다 학습률(Learning Rate)이 더 중요하다`,`모델 크기와 데이터 양을 동등하게 스케일링해야 최적이다`,`모델 크기만 키우면 성능이 무한히 향상된다`,`파라미터 수를 줄이고 추론 시간을 늘려야 한다`],ans:1,exp:`Chinchilla Law: <b>모델 크기와 데이터 양을 동등하게 스케일링</b>해야 컴퓨팅 예산 대비 최적 성능을 달성합니다.`},
{a:"AI",t:`테스트 타임 컴퓨팅`,q:`테스트 타임 컴퓨팅의 핵심 기법으로, 중간 추론 과정을 명시적으로 생성하는 것은?`,o:[`Chain-of-Thought(CoT)`,`Transfer Learning`,`Batch Normalization`,`Data Augmentation`],ans:0,exp:`<b>Chain-of-Thought(CoT)</b>: 최종 답변 전에 <b>중간 추론 과정을 명시적으로 생성</b>하여 복잡한 문제의 정확도를 높입니다.`},
{a:"AI",t:`CNN 풀링 계층`,q:`글로벌 평균 풀링(GAP)이 대체하는 계층은?`,o:[`배치 정규화(Batch Normalization) 계층`,`활성화(ReLU) 계층`,`완전연결(FC) 계층`,`합성곱(Convolution) 계층`],ans:2,exp:`<b>글로벌 평균 풀링(GAP)</b>은 <b>완전연결(FC) 계층</b>을 대체하여 파라미터 수를 대폭 줄이고 과적합을 방지합니다.`},
{a:"AI",t:`K-Means와 DBSCAN`,q:`K-Means의 최적 K값 결정에 사용되는 엘보우 기법에서 관찰하는 지표는?`,o:[`AUC(Area Under Curve)`,`SSE(Sum of Squared Errors)`,`실루엣 계수(Silhouette Coefficient)`,`엔트로피(Entropy)`],ans:1,exp:`<b>엘보우 기법</b>: K값에 따른 <b>SSE(Sum of Squared Errors)</b> 변화를 그래프로 그려, 꺾이는 지점(엘보우)을 최적 K로 결정합니다.`},
{a:"SC",t:`제로 트러스트`,q:`제로 트러스트의 핵심 원칙으로 옳은 것은?`,o:[`Trust but Verify`,`Verify Once, Trust Forever`,`Trust Internal, Verify External`,`Never Trust, Always Verify`],ans:3,exp:`제로 트러스트의 핵심: '<b>Never Trust, Always Verify</b>' — 내부·외부 구분 없이 <b>모든 접근을 항상 검증</b>합니다.`},
{a:"SC",t:`크리덴셜 스터핑과 FDS`,q:`크리덴셜 스터핑 공격의 근본 원인으로 옳은 것은?`,o:[`암호화 알고리즘의 취약점`,`방화벽 설정 오류`,`서버의 패치 미적용`,`사용자의 비밀번호 재사용 습관`],ans:3,exp:`크리덴셜 스터핑의 근본 원인: <b>사용자의 비밀번호 재사용 습관</b> — 하나의 사이트 유출이 전체 계정 탈취로 연쇄됩니다.`},
{a:"SC",t:`SW 공급망 보안`,q:`SBOM의 표준 포맷으로 옳게 연결된 것은?`,o:[`CVE(MITRE)와 NVD(NIST)`,`SPDX(Linux Foundation)와 CycloneDX(OWASP)`,`ISO 27001과 ISO 27701`,`STIX(OASIS)와 TAXII`],ans:1,exp:`SBOM 표준 포맷: <b>SPDX(Linux Foundation)</b>와 <b>CycloneDX(OWASP)</b>입니다. CVE/NVD는 취약점 데이터베이스입니다.`},
{a:"SC",t:`접근 통제 모델`,q:`RBAC(역할 기반 접근 통제)의 장점으로 옳은 것은?`,o:[`자원 소유자가 자유롭게 권한을 부여할 수 있다`,`속성(시간, 위치)에 따라 동적으로 접근을 제어한다`,`최소 권한 원칙과 직무 분리(SoD) 구현이 용이하다`,`보안 등급에 따라 강제적으로 접근을 통제한다`],ans:2,exp:`RBAC의 장점: <b>최소 권한 원칙(Least Privilege)</b>과 <b>직무 분리(SoD, Separation of Duties)</b> 구현이 용이합니다.`},
{a:"SC",t:`PKI와 PQC`,q:`NIST가 PQC 표준으로 선정한 키캡슐화 알고리즘은?`,o:[`CRYSTALS-Kyber`,`AES-256`,`CRYSTALS-Dilithium`,`RSA-2048`],ans:0,exp:`NIST PQC 표준: <b>CRYSTALS-Kyber</b>(키캡슐화)와 CRYSTALS-Dilithium(전자서명)입니다.`},
{a:"NW",t:`IPSec VPN`,q:`IPSec의 터널 모드(Tunnel Mode)에 대한 설명으로 옳은 것은?`,o:[`호스트 간 직접 통신에 주로 사용한다`,`원본 IP 헤더를 포함한 전체 패킷을 암호화하고 새 IP 헤더를 추가한다`,`IP 페이로드만 암호화한다`,`암호화 없이 인증만 제공한다`],ans:1,exp:`<b>터널 모드</b>: <b>원본 IP 헤더를 포함한 전체 패킷을 암호화</b>하고 <b>새 IP 헤더를 추가</b>합니다. VPN 게이트웨이 간 통신에 주로 사용됩니다.`},
{a:"NW",t:`네트워크 계층별 암호화`,q:`TLS 1.3에서 제거된 것으로 옳은 것은?`,o:[`AES-GCM 암호화`,`RSA 키 교환`,`ECDHE 키 교환`,`SHA-256 해시`],ans:1,exp:`TLS 1.3에서 <b>RSA 키 교환이 제거</b>되었습니다. <b>전방향 비밀성(PFS)</b>을 보장하기 위해 ECDHE만 허용합니다.`},
{a:"NW",t:`Wi-Fi 진화`,q:`Wi-Fi 6에서 다수 사용자 동시 접속 효율을 높이기 위해 도입된 핵심 기술은?`,o:[`OFDMA(직교 주파수 분할 다중접속)`,`MLO(Multi-Link Operation)`,`4K-QAM(4096-QAM)`,`320MHz 채널 폭`],ans:0,exp:`Wi-Fi 6의 핵심: <b>OFDMA(직교 주파수 분할 다중접속)</b> — 하나의 채널을 RU(Resource Unit) 단위로 여러 사용자에게 분배합니다.`},
{a:"NW",t:`BGP`,q:`BGP Hijacking을 방어하기 위한 경로 인증 기술은?`,o:[`DNSSEC`,`TLS 1.3`,`RPKI(Resource Public Key Infrastructure)`,`IPSec`],ans:2,exp:`<b>RPKI(Resource Public Key Infrastructure)</b>: BGP 경로 정보의 진위를 인증하여 <b>BGP Hijacking</b>을 방어합니다.`},
{a:"MG",t:`ROI, NPV, IRR`,q:`IRR(내부수익률)의 정의로 옳은 것은?`,o:[`총 비용 대비 총 수익의 비율`,`투자 수익률이 시장 평균을 초과하는 비율`,`투자금 회수에 걸리는 기간의 역수`,`NPV(순현재가치)가 0이 되는 할인율`],ans:3,exp:`<b>IRR(Internal Rate of Return)</b>: <b>NPV=0이 되는 할인율</b>입니다. IRR이 요구수익률보다 크면 투자를 실행합니다.`},
{a:"MG",t:`DPP와 규제 대응`,q:`CBAM(탄소국경조정메커니즘)의 목적으로 옳은 것은?`,o:[`소프트웨어의 보안 내재화를 강제한다`,`IT 서비스 관리 프레임워크를 표준화한다`,`EU 수입품에 탄소국경세를 부과하여 탄소 누출을 방지한다`,`EU 내 제품의 디지털 기록을 의무화한다`],ans:2,exp:`<b>CBAM(Carbon Border Adjustment Mechanism)</b>: <b>EU 수입품에 탄소국경세를 부과</b>하여 탄소 누출(Carbon Leakage)을 방지합니다.`},
{a:"MG",t:`ITIL 4 SVS`,q:`ITIL 4의 4차원 모델에 해당하지 않는 것은?`,o:[`정보와 기술`,`가치 흐름과 프로세스`,`조직과 사람`,`비용과 일정`],ans:3,exp:`ITIL 4의 4차원 모델: <b>①조직과 사람</b>, <b>②정보와 기술</b>, <b>③파트너와 공급자</b>, <b>④가치 흐름과 프로세스</b>입니다.`}
],
topics:[
{topic:`시계열 분석과 ARIMA 모델`,domain:`AI`,keywords:[`비정상 시계열 → 차분(Differencing)으로 정상화 후 분석`,`ARIMA = AR(자기회귀) + I(차분, 적분) + MA(이동평균)의 결합 모델`,`AR(p): 과거 p개 시점의 자기 값으로 현재 값을 예측`,`MA(q): 과거 q개 시점의 오차(잔차)로 현재 값을 보정`,`I(d): d회 차분(Differencing)으로 비정상 시계열을 정상화`,`ARIMA(p,d,q): p=AR 차수, d=차분 횟수, q=MA 차수`],blanks:[{s:`ARIMA(p,d,q)에서 p={{AR 차수}}, d={{차분 횟수}}, q={{MA 차수}}를 의미한다.`},{s:`정상성(Stationarity)이란 {{평균}}, {{분산}}, {{자기공분산}}이 시간에 따라 일정한 성질이다.`},{s:`비정상 시계열은 {{차분(Differencing)}}을 통해 정상화한 후 분석한다.`},{s:`p, q 차수 결정에 {{ACF(자기상관함수)}}와 {{PACF(편자기상관함수)}}를 사용한다.`}]},
{topic:`합성곱 신경망(CNN)의 풀링(Pooling) 계층`,domain:`AI`,keywords:[`최대 풀링(Max Pooling): 영역 내 최댓값 선택 — 가장 강한 특성을 추출`,`평균 풀링(Average Pooling): 영역 내 평균값 계산 — 전체적인 특성 정보를 보존`,`공간 불변성(Spatial Invariance): 입력의 위치가 변해도 동일한 특성을 인식`,`풀링 윈도우 크기와 스트라이드(Stride)로 다운샘플링 비율 조절`,`합성곱 계층의 필터(커널)는 학습 가능한 파라미터, 풀링은 학습 파라미터 없음`,`글로벌 평균 풀링(GAP, Global Average Pooling): FC 계층 대체 → 파라미터 수 대폭 감소`],blanks:[{s:`최대 풀링(Max Pooling)은 영역 내 {{최댓값}}을 선택하고, 평균 풀링(Average Pooling)은 {{평균값}}을 계산한다.`},{s:`풀링이 제공하는 {{공간 불변성(Spatial Invariance)}}은 입력 위치가 변해도 동일한 특성을 인식하게 한다.`},{s:`합성곱 계층의 필터는 {{학습 가능한 파라미터}}이지만, 풀링 계층은 {{학습 파라미터가 없다}}.`},{s:`글로벌 평균 풀링({{GAP}})은 {{FC(완전연결) 계층}}을 대체하여 파라미터 수를 대폭 감소시킨다.`}]},
{topic:`테스트 타임 컴퓨팅 (Test-Time Compute)`,domain:`AI`,keywords:[`새 패러다임: 추론 시간(Inference Time)에 연산을 투입 → 작은 모델도 복잡한 문제 해결`,`핵심 기법: 사고의 사슬(Chain-of-Thought, CoT) — 중간 추론 과정을 명시적으로 생성`,`OpenAI o1 모델: CoT를 내재화하여 수학, 코딩, 과학 추론에서 전문가급 성능 달성`,`강화학습(RL) 기반 훈련: CoT 품질을 보상 함수로 최적화`,`Self-Consistency: 여러 추론 경로를 생성하고 다수결로 최종 답변 선택`,`트레이드오프: 추론 시간 증가 → 비용/지연 상승, 실시간 서비스에 부적합할 수 있음`],blanks:[{s:`핵심 기법인 {{사고의 사슬(Chain-of-Thought, CoT)}}은 {{중간 추론 과정}}을 명시적으로 생성한다.`},{s:`OpenAI {{o1}} 모델은 CoT를 내재화하여 {{수학, 코딩, 과학 추론}}에서 전문가급 성능을 달성했다.`},{s:`기존 Scaling Law가 {{모델 크기}}에 집중했다면, 새 패러다임은 {{추론 연산량}}도 성능 향상의 축으로 확장한다.`},{s:`Self-Consistency 기법은 {{여러 추론 경로}}를 생성하고 {{다수결}}로 최종 답변을 선택한다.`}]},
{topic:`회귀 분석과 다중공선성`,domain:`AI`,keywords:[`다중공선성(Multicollinearity): 독립변수 간 높은 상관관계로 회귀계수 추정이 불안정해지는 현상`,`VIF(Variance Inflation Factor, 분산팽창인수): 다중공선성 정량 측정 — VIF≥10이면 심각`,`다중공선성 해결: 변수 제거, 주성분 분석(PCA), 릿지 회귀(Ridge Regression, L2 정규화)`,`R-Square(결정계수): 회귀 모델의 설명력 — 1에 가까울수록 높은 설명력`,`Adjusted R-Square: 독립변수 수를 보정한 결정계수 — 변수 추가에 따른 과대평가 방지`,`RMSE(Root Mean Square Error): 예측값과 실측값 차이의 평균적 크기`],blanks:[{s:`다중공선성은 {{독립변수 간 높은 상관관계}}로 인해 {{회귀계수 추정}}이 불안정해지는 현상이다.`},{s:`VIF({{Variance Inflation Factor}})가 {{10}} 이상이면 심각한 다중공선성으로 판단한다.`},{s:`다중공선성 해결 방법: {{변수 제거}}, {{PCA(주성분 분석)}}, {{릿지 회귀(Ridge, L2 정규화)}}.`},{s:`R-Square({{결정계수}})는 {{1}}에 가까울수록 모델의 설명력이 높음을 의미한다.`}]},
{topic:`SVM (서포트 벡터 머신)`,domain:`AI`,keywords:[`마진(Margin): 결정 경계와 서포트 벡터 사이의 거리 — 마진 최대화가 핵심 목표`,`하드 마진(Hard Margin): 이상치 허용 없이 완벽 분리 — 오버피팅(과적합) 위험`,`소프트 마진(Soft Margin): 슬랙 변수(ξ)로 일부 오분류 허용 — C 파라미터로 패널티 조절`,`커널 트릭(Kernel Trick): 저차원 데이터를 고차원 공간으로 매핑하여 비선형 분류 가능`,`대표 커널 함수: 선형(Linear), 다항식(Polynomial), RBF(Radial Basis Function, 가우시안)`,`SVM의 장점: 고차원 데이터에 강건, 일반화 성능 우수 (구조적 위험 최소화)`],blanks:[{s:`{{서포트 벡터(Support Vector)}}는 결정 경계에 {{가장 가까운}} 데이터 포인트들이다.`},{s:`하드 마진은 {{오버피팅}} 위험이 있으므로, {{슬랙 변수(ξ)}}를 도입한 {{소프트 마진}}을 사용한다.`},{s:`{{커널 트릭(Kernel Trick)}}은 데이터를 {{고차원 공간}}으로 매핑하여 비선형 분류를 가능하게 한다.`},{s:`대표 커널 함수: {{선형(Linear)}}, {{다항식(Polynomial)}}, {{RBF(가우시안)}}.`}]},
{topic:`단어 임베딩 (Word2Vec, BERT)`,domain:`AI`,keywords:[`Word2Vec 두 아키텍처: CBOW(주변 단어→중심 단어 예측), Skip-gram(중심 단어→주변 단어 예측)`,`Word2Vec 특성: '왕-남성+여성≈여왕' 같은 벡터 연산으로 의미적 관계 표현`,`단방향 문맥의 한계: Word2Vec과 ELMo는 좌→우 또는 양방향 순차적이지만 동시 양방향은 아님`,`BERT(Bidirectional Encoder Representations from Transformers): 양방향 문맥을 동시에 학습하는 사전훈련 모델`,`BERT 사전훈련 방법: MLM(Masked Language Model) + NSP(Next Sentence Prediction)`,`MLM: 입력 문장의 일부 토큰을 마스킹하고 예측 → 양방향 문맥 학습`],blanks:[{s:`Word2Vec의 두 아키텍처: {{CBOW}}(주변→중심 예측)와 {{Skip-gram}}(중심→주변 예측).`},{s:`Word2Vec의 특성: '{{왕}}-{{남성}}+{{여성}}≈{{여왕}}' 같은 벡터 연산이 가능하다.`},{s:`BERT는 {{Bidirectional Encoder Representations from Transformers}}의 약자이다.`},{s:`BERT의 사전훈련 방법: {{MLM(Masked Language Model)}} + {{NSP(Next Sentence Prediction)}}.`}]},
{topic:`GAN vs Diffusion Model (생성형 AI)`,domain:`AI`,keywords:[`GAN 손실 함수: min_G max_D [E[log D(x)] + E[log(1-D(G(z)))]]`,`GAN의 한계: 모드 붕괴(Mode Collapse), 학습 불안정성, 다양성 부족`,`Diffusion Model: 원본 이미지에 노이즈를 점진적으로 추가(Forward)한 후, 역으로 복원(Reverse)하여 생성`,`Forward Process: 원본 → 가우시안 노이즈(점진적 노이즈 추가, T 스텝)`,`Reverse Process: 노이즈 → 원본(신경망이 각 스텝에서 노이즈를 예측하여 제거)`,`Diffusion의 장점: GAN 대비 학습 안정적, 높은 생성 품질, 모드 붕괴 없음`],blanks:[{s:`GAN의 대표적 한계: {{모드 붕괴(Mode Collapse)}}, {{학습 불안정성}}, 다양성 부족.`},{s:`Diffusion Model의 Forward Process는 원본에 {{가우시안 노이즈}}를 {{점진적으로 추가}}하는 과정이다.`},{s:`Reverse Process에서 신경망은 각 스텝에서 {{노이즈를 예측}}하여 제거함으로써 이미지를 복원한다.`},{s:`Diffusion Model은 GAN 대비 {{학습이 안정적}}이고 {{모드 붕괴가 없지만}}, 생성 {{속도가 느리다}}.`}]},
{topic:`LLM Scaling Law와 추론 시간 연산`,domain:`AI`,keywords:[`Chinchilla Scaling Law (Hoffmann et al., 2022): 모델 크기와 데이터 양을 동등하게 스케일링해야 최적`,`Scaling Law의 한계: 무한히 크게 키우는 것은 비용·에너지·수확 체감 문제`,`새 패러다임 — 추론 시간 연산(Test-Time Compute): 모델 크기를 키우지 않고 추론 단계에서 연산량 투입`,`CoT(Chain-of-Thought): 중간 추론 단계를 생성하여 복잡한 문제 해결 능력 향상`,`RL(강화학습) 기반 추론 최적화: RLHF(Reinforcement Learning from Human Feedback)로 추론 품질 개선`,`OpenAI o1 시리즈: 훈련 시간 스케일링 + 추론 시간 스케일링의 이중 축 최적화`],blanks:[{s:`Chinchilla Law: 모델 크기와 {{데이터 양}}을 {{동등하게}} 스케일링해야 최적 효율이다.`},{s:`Scaling Law의 한계: {{비용·에너지 증가}}와 {{수확 체감(Diminishing Returns)}} 문제.`},{s:`새 패러다임은 모델 크기를 키우지 않고 {{추론 단계}}에서 {{연산량을 투입}}하는 것이다.`},{s:`RLHF({{Reinforcement Learning from Human Feedback}})로 추론 품질을 개선한다.`}]},
{topic:`침해사고 대응 7단계 절차`,domain:`SC`,keywords:[`①사전 준비: 대응 팀(CERT/CSIRT) 구성, 대응 절차 매뉴얼, 도구·장비 확보`,`②탐지/식별: IDS/IPS, SIEM, 로그 분석으로 이상 징후 탐지 및 사고 유형 식별`,`③초기 대응: 피해 확산 방지를 위한 네트워크 격리, 증거 보전(포렌식 이미징)`,`④대응 전략 수립: 사고 범위·영향도 평가, 법적 조치 필요 여부 판단`,`⑤조사/분석: 디지털 포렌식으로 공격 경로·원인 규명, 타임라인 재구성`,`⑥복구/해결: 시스템 재설치·패치, 백업 복원, 정상 서비스 재개`],blanks:[{s:`②탐지/식별 단계에서 {{IDS/IPS}}, {{SIEM}}, 로그 분석으로 이상 징후를 탐지한다.`},{s:`③초기 대응 단계의 핵심: {{네트워크 격리}}와 {{증거 보전(포렌식 이미징)}}.`},{s:`⑤조사/분석 단계에서 {{디지털 포렌식}}으로 공격 경로와 원인을 규명한다.`},{s:`증거 보전의 3원칙: {{무결성(Hash)}}, {{연계 보관성(Chain of Custody)}}, {{적법성}}.`}]},
{topic:`CTEM (지속적 위협 노출 관리)`,domain:`SC`,keywords:[`CTEM 5단계: ①범위 설정(Scoping) → ②발견(Discovery) → ③우선순위화(Prioritization) → ④검증(Validation) → ⑤동원(Mobilization)`,`①범위 설정: 비즈니스 자산과 공격 표면(Attack Surface) 식별`,`②발견: 자산의 취약점, 구성 오류, 위협 인텔리전스 수집`,`③우선순위화: 실제 악용 가능성과 비즈니스 영향도에 따른 리스크 순위 결정`,`④검증: 침투 테스트(Pentest), BAS(Breach and Attack Simulation)로 실제 악용 가능성 검증`,`⑤동원: 보안팀·IT팀·경영진 협력하여 수정 조치 실행`],blanks:[{s:`CTEM 5단계: ①{{범위 설정(Scoping)}} → ②{{발견(Discovery)}} → ③{{우선순위화(Prioritization)}} → ④{{검증(Validation)}} → ⑤{{동원(Mobilization)}}.`},{s:`기존 취약점 관리(VM)는 {{패치 중심}}이지만, CTEM은 {{비즈니스 리스크 기준}}으로 우선순위를 결정한다.`},{s:`검증 단계에서 {{침투 테스트}}와 {{BAS(Breach and Attack Simulation)}}로 악용 가능성을 확인한다.`},{s:`{{공격 표면 관리(ASM, Attack Surface Management)}}는 CTEM의 핵심 구성요소이다.`}]},
{topic:`PKI와 양자내성암호(PQC)`,domain:`SC`,keywords:[`PKI(Public Key Infrastructure): 공개키의 소유자를 인증하는 디지털 인증서 발급·관리 체계`,`PKI 구성요소: CA(인증기관), RA(등록기관), CRL(인증서 폐지 목록), OCSP(온라인 인증서 상태 프로토콜)`,`디지털 인증서: X.509 표준 — 공개키, 소유자 정보, CA 서명 포함`,`양자 위협: 쇼어 알고리즘(Shor's Algorithm)으로 RSA, ECC 등 현행 공개키 암호가 해독 가능`,`PQC(Post-Quantum Cryptography, 양자내성암호): 양자 컴퓨터로도 해독 불가능한 차세대 암호 체계`,`NIST PQC 표준화: CRYSTALS-Kyber(키캡슐화), CRYSTALS-Dilithium(전자서명) 등 선정`],blanks:[{s:`PKI 구성요소: {{CA(인증기관)}}, {{RA(등록기관)}}, {{CRL(인증서 폐지 목록)}}, {{OCSP}}.`},{s:`양자 컴퓨터의 {{쇼어 알고리즘(Shor's Algorithm)}}으로 RSA, ECC 등 현행 공개키 암호가 해독 가능해진다.`},{s:`NIST PQC 표준: {{CRYSTALS-Kyber}}(키캡슐화)와 {{CRYSTALS-Dilithium}}(전자서명).`},{s:`PQC의 주류 방식인 {{격자 기반 암호(Lattice-based)}}는 격자 문제의 {{계산 난이도}}를 활용한다.`}]},
{topic:`제로 트러스트 보안 (Zero Trust)`,domain:`SC`,keywords:[`측면 이동(Lateral Movement): 공격자가 초기 침투 후 내부 시스템 간 이동하며 권한 상승`,`NIST SP 800-207: 제로 트러스트 아키텍처(ZTA) 표준 가이드`,`핵심 구성요소: 정책 결정 포인트(PDP), 정책 실행 포인트(PEP)`,`마이크로 세그멘테이션(Micro-segmentation): 네트워크를 세분화하여 측면 이동 차단`,`SDP(Software-Defined Perimeter): 소프트웨어 정의 경계 — 인가된 사용자만 서비스 가시성 제공`,`ZTNA(Zero Trust Network Access): VPN을 대체하는 제로 트러스트 기반 원격 접속 솔루션`],blanks:[{s:`{{측면 이동(Lateral Movement)}}은 공격자가 초기 침투 후 내부 시스템 간 이동하며 {{권한을 상승}}하는 기법이다.`},{s:`제로 트러스트 아키텍처 표준 가이드: {{NIST SP 800-207}}.`},{s:`{{마이크로 세그멘테이션}}은 네트워크를 세분화하여 {{측면 이동}}을 차단한다.`},{s:`{{ZTNA(Zero Trust Network Access)}}는 {{VPN}}을 대체하는 제로 트러스트 기반 원격 접속 솔루션이다.`}]},
{topic:`크리덴셜 스터핑과 FDS`,domain:`SC`,keywords:[`공격 도구: 봇넷(Botnet), 프록시 로테이션으로 IP 차단 우회`,`대응: 다중 인증(MFA), CAPTCHA, 비밀번호 관리자 사용 권장, 유출 DB 크로스 체크`,`FDS(Fraud Detection System, 이상 거래 탐지 시스템): 전자 금융 사기를 실시간 탐지·차단`,`FDS 4단계: ①정보 수집 → ②분석/탐지 → ③차단/대응 → ④모니터링/개선`,`FDS 분석 기법: 룰 기반(Rule-based) + 머신러닝(ML) 하이브리드 방식`,`룰 기반의 한계: 신종 패턴 탐지 불가, 오탐률(False Positive) 높음`],blanks:[{s:`공격의 근본 원인: 사용자의 {{비밀번호 재사용}} 습관.`},{s:`FDS 4단계: ①{{정보 수집}} → ②{{분석/탐지}} → ③{{차단/대응}} → ④{{모니터링/개선}}.`},{s:`FDS 분석 기법: {{룰 기반(Rule-based)}} + {{머신러닝(ML)}} 하이브리드 방식.`},{s:`룰 기반의 한계: {{신종 패턴 탐지 불가}}와 높은 {{오탐률(False Positive)}}.`}]},
{topic:`Wi-Fi 7과 MLO (Multi-Link Operation)`,domain:`NW`,keywords:[`MLO 장점: 대역폭 증가, 지연 감소(Low Latency), 링크 장애 시 자동 페일오버`,`4K-QAM(4096-QAM): 한 심볼에 12비트 전송 → Wi-Fi 6의 1024-QAM(10비트) 대비 20% 처리량 증가`,`320MHz 채널 폭: Wi-Fi 6E(160MHz)의 2배 — 최대 46Gbps 이론 속도`,`CMU-MIMO: 좌표 다중 사용자 MIMO — 더 많은 사용자 동시 접속 지원`,`적용 사례: AR/VR 스트리밍, 클라우드 게이밍, 산업용 IoT 초저지연 통신`,`6GHz 대역: Wi-Fi 6E에서 도입, Wi-Fi 7에서 MLO와 결합하여 본격 활용`],blanks:[{s:`MLO({{Multi-Link Operation}})는 {{2.4GHz}}, {{5GHz}}, {{6GHz}} 대역을 동시에 묶어 사용한다.`},{s:`Wi-Fi 7은 {{4K-QAM(4096-QAM)}}으로 한 심볼에 {{12비트}}를 전송한다.`},{s:`Wi-Fi 7의 최대 채널 폭은 {{320MHz}}로, Wi-Fi 6E({{160MHz}})의 2배이다.`},{s:`MLO의 3대 장점: {{대역폭 증가}}, {{지연 감소}}, 링크 장애 시 {{자동 페일오버}}.`}]},
{topic:`네트워크 계층별 암호화 (IPsec, TLS)`,domain:`NW`,keywords:[`L4(전송 계층) — TLS(Transport Layer Security): 세션 기반 암호화, HTTPS의 기반`,`L7(응용 계층) — HTTPS, SSH, S/MIME 등 애플리케이션별 보안 프로토콜`,`TLS 1.3의 개선: 불필요한 암호 스위트 제거, 1-RTT 핸드셰이크(기존 2-RTT), 0-RTT 재개(Resumption)`,`TLS 핸드셰이크: 클라이언트 Hello → 서버 Hello → 인증서 교환 → 키 교환 → 암호화 통신`,`TLS 1.3에서 제거된 것: RSA 키 교환(전방향 비밀성 미보장), SHA-1, RC4, CBC 모드 등`,`전방향 비밀성(PFS, Perfect Forward Secrecy): 세션키 유출 시에도 이전 세션 데이터 보호`],blanks:[{s:`L4 암호화: {{TLS(Transport Layer Security)}} — 세션 기반 암호화, {{HTTPS}}의 기반.`},{s:`TLS 1.3의 핸드셰이크 개선: 기존 {{2-RTT}}에서 {{1-RTT}}로 단축.`},{s:`TLS 1.3에서는 {{RSA 키 교환}}이 제거되고 {{ECDHE}}만 허용하여 {{PFS(전방향 비밀성)}}를 보장한다.`},{s:`전방향 비밀성(PFS)은 세션키 유출 시에도 {{이전 세션 데이터}}를 보호하는 속성이다.`}]},
{topic:`6G NTN (Non-Terrestrial Network)`,domain:`NW`,keywords:[`기존 지상망(TN) 한계: 도서·산간, 해상, 공중(UAM) 지역의 통신 커버리지 공백`,`3GPP Release 17: NTN 표준 최초 도입 — 5G NR 기반 위성 통신 지원`,`위성 궤도 유형: LEO(저궤도, 500~2000km), MEO(중궤도), GEO(정지궤도, 35,786km)`,`LEO 위성의 장점: 저지연(20~40ms RTT), 단점: 빠른 이동 속도로 도플러 시프트 발생`,`도플러 시프트 보상: 주파수 사전 보상, 빔 핸드오버 기술로 연속 통신 보장`,`HAPS(High Altitude Platform Station): 고도 20km 성층권에 배치하는 준위성 플랫폼`],blanks:[{s:`3GPP {{Release 17}}에서 NTN 표준이 최초 도입되어 {{5G NR}} 기반 위성 통신을 지원한다.`},{s:`LEO(저궤도) 위성의 장점은 {{저지연(20~40ms RTT)}}이고, 단점은 {{도플러 시프트}} 발생이다.`},{s:`HAPS({{High Altitude Platform Station}})는 고도 {{20km}} 성층권에 배치하는 준위성 플랫폼이다.`},{s:`6G 비전: {{지상·해상·공중·우주}}를 아우르는 '{{초공간}}' 통신 커버리지.`}]},
{topic:`Wi-Fi 진화 (Wi-Fi 6 → 6E → 7)`,domain:`NW`,keywords:[`MU-MIMO: 여러 사용자에게 동시에 다중 공간 스트림 전송`,`Wi-Fi 6E: 6GHz 대역 확장(최대 1200MHz 추가 스펙트럼) → 채널 혼잡 해소`,`Wi-Fi 7 (802.11be, EHT): MLO, 4K-QAM, 320MHz 채널 폭의 3대 혁신`,`MLO: 여러 주파수 대역을 동시에 묶어 사용 → 처리량 증가 + 지연 감소`,`4K-QAM(4096-QAM): 한 심볼에 12비트 → Wi-Fi 6(1024-QAM, 10비트) 대비 20% 효율 증가`,`TWT(Target Wake Time): Wi-Fi 6에서 도입된 IoT 기기 전력 절약 기술`],blanks:[{s:`OFDMA는 하나의 채널을 {{RU(Resource Unit)}} 단위로 여러 사용자에게 분배하는 기술이다.`},{s:`Wi-Fi 6E는 {{6GHz 대역}}을 확장하여 최대 {{1200MHz}} 추가 스펙트럼을 제공한다.`},{s:`Wi-Fi 7의 3대 혁신: {{MLO}}, {{4K-QAM}}, {{320MHz 채널 폭}}.`},{s:`TWT({{Target Wake Time}})는 Wi-Fi 6에서 도입된 {{IoT 기기}} 전력 절약 기술이다.`}]},
{topic:`디지털 제품 여권 (DPP, Digital Product Passport)`,domain:`MG`,keywords:[`도입 목적: 순환경제(Circular Economy) 실현 — 자원 효율성, 재활용률 향상, 탄소 배출 감축`,`기록 정보: 탄소발자국(Carbon Footprint), 원산지, 재활용 비율, 유해물질 함량, 수리 정보`,`기술 기반: 블록체인(데이터 위변조 방지·투명성), IoT(실시간 추적), QR코드/NFC(소비자 접근)`,`적용 대상: 배터리(2027년 의무화 예정), 섬유, 전자제품 등 단계적 확대`,`ESG 정보 공시와 연계: 기업의 환경·사회·지배구조 데이터 투명성 강화`,`국내 수출 기업 영향: EU 시장 진출 시 DPP 준수 필수 — 공급망 데이터 디지털화 필요`],blanks:[{s:`법적 근거: EU {{에코디자인 규정(ESPR)}} — {{순환경제(Circular Economy)}} 실현이 목적이다.`},{s:`기록 정보: {{탄소발자국}}, {{원산지}}, {{재활용 비율}}, 유해물질 함량, 수리 정보.`},{s:`기술 기반: {{블록체인}}(위변조 방지), {{IoT}}(실시간 추적), {{QR코드/NFC}}(소비자 접근).`},{s:`배터리 분야는 {{2027년}} DPP 의무화가 예정되어 있다.`}]},
{topic:`ITIL 4 서비스 가치 체계(SVS)`,domain:`MG`,keywords:[`SVS(Service Value System): 수요(Demand) → 가치(Value) 창출의 전체 흐름을 관리`,`SVS 구성요소: ①기회/수요 → ②서비스 가치 사슬(SVC) → ③지도 원칙 → ④거버넌스 → ⑤지속적 개선 → ⑥관리 관행(Practice)`,`서비스 가치 사슬(SVC): 계획(Plan), 개선(Improve), 참여(Engage), 설계·전환(Design & Transition), 획득·구축(Obtain/Build), 전달·지원(Deliver & Support)`,`ITIL 4 지도 원칙 7가지: 가치에 집중, 현재 위치에서 출발, 피드백으로 반복 개선, 협업·가시성, 전체적 사고, 단순·실용, 최적화·자동화`,`4차원 모델: 조직과 사람, 정보와 기술, 파트너와 공급자, 가치 흐름과 프로세스`,`ITIL v3 라이프사이클: 전략→설계→전환→운영→지속적 개선 (수직적 제공 모델)`],blanks:[{s:`SVS의 핵심인 서비스 가치 사슬(SVC) 6가지: {{계획}}, {{개선}}, {{참여}}, {{설계·전환}}, {{획득·구축}}, {{전달·지원}}.`},{s:`ITIL 4의 4차원 모델: {{조직과 사람}}, {{정보와 기술}}, {{파트너와 공급자}}, {{가치 흐름과 프로세스}}.`},{s:`ITIL v3는 {{서비스 라이프사이클}} 중심이었으나, ITIL 4는 {{서비스 가치 체계(SVS)}} 중심이다.`},{s:`ITIL 4는 {{DevOps}}, {{Agile}}, {{Lean}} 관행과 통합하여 현대 IT 환경에 대응한다.`}]},
{topic:`디지털 제품 여권(DPP)과 글로벌 규제 대응`,domain:`MG`,keywords:[`DPP 구현 아키텍처: 블록체인 분산원장 + IoT 센서 + 클라우드 데이터 레이크`,`블록체인 활용: 제조·물류·유통 과정의 데이터 위변조 방지, 스마트 계약으로 자동 검증`,`국내 기업 대응: 제조 데이터 디지털 전환, 탄소 발자국 측정 시스템 구축, GS1 표준 준수`,`CBAM(Carbon Border Adjustment Mechanism): EU가 수입품에 부과하는 탄소국경세`,`탄소발자국(Carbon Footprint): 제품 생산·유통·사용·폐기 전 과정의 온실가스 배출량`,`데이터 상호운용성: IDS(International Data Spaces), Catena-X(자동차 산업 데이터 공유 플랫폼)`],blanks:[{s:`DPP 구현 아키텍처: {{블록체인 분산원장}} + {{IoT 센서}} + {{클라우드 데이터 레이크}}.`},{s:`CBAM({{Carbon Border Adjustment Mechanism}})은 EU가 수입품에 부과하는 {{탄소국경세}}이다.`},{s:`블록체인은 제조·물류 과정의 {{데이터 위변조}}를 방지하고, {{스마트 계약}}으로 자동 검증한다.`},{s:`자동차 산업 데이터 공유 플랫폼: {{Catena-X}}.`}]}
]},
{label:`DAY 3`,
qs:[
{a:"AI",t:`ARIMA 모델`,q:`시계열 데이터의 정상성(Stationarity) 여부를 통계적으로 검증하는 방법은?`,o:[`카이제곱 검정(Chi-Square Test)`,`ADF 검정(Augmented Dickey-Fuller Test)`,`F-검정(F-test)`,`t-검정(t-test)`],ans:1,exp:`<b>ADF 검정(Augmented Dickey-Fuller Test)</b>: 단위근(Unit Root) 존재 여부를 검정하여 <b>시계열의 정상성</b>을 통계적으로 판단합니다.`},
{a:"AI",t:`데이터 전처리`,q:`Min-Max 정규화의 공식으로 옳은 것은?`,o:[`(x - μ) ÷ σ`,`(x - min) ÷ (max - min)`,`log(x + 1)`,`x ÷ max`],ans:1,exp:`<b>Min-Max 정규화: (x - min) ÷ (max - min)</b> — 데이터를 0~1 범위로 변환합니다. (x-μ)÷σ는 표준화(Z-Score)입니다.`},
{a:"AI",t:`SVM`,q:`SVM에서 소프트 마진(Soft Margin)이 하드 마진(Hard Margin) 대비 개선한 점은?`,o:[`서포트 벡터의 수를 0으로 줄여 모델을 단순화했다`,`마진을 0으로 만들어 분류 속도를 극대화했다`,`커널 함수를 사용하여 비선형 분류를 가능하게 했다`,`슬랙 변수(ξ)로 일부 오분류를 허용하여 과적합을 방지했다`],ans:3,exp:`<b>소프트 마진</b>: <b>슬랙 변수(ξ)</b>를 도입하여 일부 오분류를 허용하고, C 파라미터로 패널티를 조절하여 <b>과적합을 방지</b>합니다.`},
{a:"AI",t:`단어 임베딩`,q:`Word2Vec에서 '왕-남성+여성≈여왕'이 가능한 이유는?`,o:[`단어를 밀집 벡터로 변환하여 의미적 관계가 벡터 연산으로 표현되기 때문`,`One-hot 인코딩으로 단어 간 거리를 계산하기 때문`,`BERT의 Self-Attention이 문맥을 이해하기 때문`,`TF-IDF로 단어의 중요도를 반영하기 때문`],ans:0,exp:`Word2Vec은 단어를 <b>밀집 벡터(Dense Vector)</b>로 변환하여 <b>의미적 관계가 벡터 연산</b>으로 표현됩니다.`},
{a:"AI",t:`GAN vs Diffusion`,q:`Diffusion Model의 Reverse Process에서 신경망이 수행하는 역할은?`,o:[`생성자와 판별자를 교대로 학습한다`,`이미지를 분류한다`,`데이터를 차원 축소한다`,`각 스텝에서 노이즈를 예측하여 제거한다`],ans:3,exp:`Reverse Process: 신경망이 <b>각 스텝에서 노이즈를 예측하여 제거</b>함으로써 가우시안 노이즈에서 원본 이미지를 복원합니다.`},
{a:"AI",t:`회귀 분석`,q:`회귀 모델의 설명력을 나타내는 R-Square(결정계수)가 1에 가까울수록 의미하는 것은?`,o:[`독립변수 간 상관관계가 높다`,`모델의 설명력이 높다`,`잔차(오차)가 크다`,`과적합이 심각하다`],ans:1,exp:`<b>R-Square(결정계수)</b>는 <b>1에 가까울수록 모델의 설명력이 높음</b>을 의미합니다. 단, 변수가 늘어나면 항상 증가하므로 Adjusted R²를 함께 확인합니다.`},
{a:"AI",t:`Scaling Law`,q:`Scaling Law의 한계로 옳은 것은?`,o:[`데이터 양이 많을수록 성능이 반드시 감소한다`,`파라미터 수와 성능은 항상 반비례한다`,`모델 크기를 키우면 학습 속도가 항상 빨라진다`,`컴퓨팅 비용·에너지 증가와 수확 체감 문제`],ans:3,exp:`Scaling Law의 한계: 모델을 무한히 키우는 것은 <b>비용·에너지 증가</b>와 <b>수확 체감(Diminishing Returns)</b> 문제가 있습니다.`},
{a:"AI",t:`테스트 타임 컴퓨팅`,q:`Self-Consistency 기법의 원리로 옳은 것은?`,o:[`학습 데이터를 추론 시에도 참고하여 답변한다`,`하나의 추론 경로만 생성하되 최대한 길게 만든다`,`여러 추론 경로를 생성하고 다수결로 최종 답변을 선택한다`,`추론 속도를 최대한 줄이는 기법이다`],ans:2,exp:`<b>Self-Consistency</b>: <b>여러 추론 경로를 생성</b>하고 <b>다수결(Majority Voting)</b>로 최종 답변을 선택하여 정확도를 높입니다.`},
{a:"SC",t:`제로 트러스트`,q:`마이크로 세그멘테이션(Micro-segmentation)의 목적으로 옳은 것은?`,o:[`모든 사용자에게 동일한 접근 권한을 부여한다`,`외부 트래픽을 모두 차단한다`,`암호화 키를 세분화하여 관리한다`,`네트워크를 세분화하여 측면 이동(Lateral Movement)을 차단한다`],ans:3,exp:`<b>마이크로 세그멘테이션</b>: 네트워크를 세분화하여 공격자의 <b>측면 이동(Lateral Movement)</b>을 차단하는 제로 트러스트의 핵심 기술입니다.`},
{a:"SC",t:`크리덴셜 스터핑`,q:`FDS(이상 거래 탐지 시스템)의 4단계 순서로 옳은 것은?`,o:[`모니터링 → 탐지 → 분석 → 차단`,`차단 → 수집 → 분석 → 보고`,`수집 → 분석/탐지 → 차단/대응 → 모니터링/개선`,`분석 → 수집 → 대응 → 모니터링`],ans:2,exp:`FDS 4단계: <b>①정보 수집</b> → <b>②분석/탐지</b> → <b>③차단/대응</b> → <b>④모니터링/개선</b>입니다.`},
{a:"SC",t:`SW 공급망 보안`,q:`EU CRA(사이버복원력법)의 핵심 의무로 옳은 것은?`,o:[`보안 인증 없이도 EU 시장에서 자유롭게 판매할 수 있다`,`출시 후 1년간만 보안 업데이트를 제공하면 된다`,`제품 설계 단계부터 보안을 내재화(Secure by Design)해야 한다`,`모든 소프트웨어를 오픈소스로 공개해야 한다`],ans:2,exp:`EU CRA 핵심 의무: <b>Secure by Design</b>(설계 단계부터 보안 내재화)과 출시 후 <b>최소 5년간 보안 업데이트</b> 제공입니다.`},
{a:"SC",t:`CTEM`,q:`CTEM이 기존 취약점 관리(VM)와 차별화되는 핵심 포인트는?`,o:[`모든 취약점을 동일한 우선순위로 처리한다`,`비즈니스 리스크 기준으로 위협 노출 우선순위를 결정한다`,`외부 위협만 관리하고 내부 위협은 무시한다`,`패치 적용 속도를 최대한 높인다`],ans:1,exp:`CTEM은 패치 중심의 VM과 달리, <b>비즈니스 리스크 기준</b>으로 <b>위협 노출 우선순위</b>를 결정합니다.`},
{a:"SC",t:`망분리`,q:`최근 망분리 정책의 변화 트렌드로 옳은 것은?`,o:[`물리적 망분리를 더욱 강화하는 방향`,`제로 트러스트 기반 논리적 망분리 완화`,`클라우드 사용을 전면 금지`,`모든 기관에 대해 망분리 의무를 폐지`],ans:1,exp:`최근 트렌드: <b>제로 트러스트 기반으로 논리적 망분리를 완화</b>하여 클라우드 환경에 대응하는 방향으로 변화하고 있습니다.`},
{a:"NW",t:`Wi-Fi 7 MLO`,q:`Wi-Fi 7에서 도입된 4K-QAM이 한 심볼에 전송하는 비트 수는?`,o:[`12비트`,`8비트`,`10비트`,`14비트`],ans:0,exp:`<b>4K-QAM(4096-QAM)</b>: 한 심볼에 <b>12비트</b> 전송. Wi-Fi 6의 1024-QAM(10비트) 대비 20% 효율 증가입니다.`},
{a:"NW",t:`네트워크 계층별 암호화`,q:`TLS 1.3의 핸드셰이크 개선 사항으로 옳은 것은?`,o:[`핸드셰이크 없이 즉시 통신`,`3-RTT에서 2-RTT로 단축`,`2-RTT에서 1-RTT로 단축`,`핸드셰이크 대신 사전 공유 키만 사용`],ans:2,exp:`TLS 1.3: <b>기존 2-RTT에서 1-RTT로 핸드셰이크를 단축</b>하고, 0-RTT 재개(Resumption)도 지원합니다.`},
{a:"NW",t:`6G NTN`,q:`3GPP에서 NTN 표준이 최초 도입된 릴리스는?`,o:[`Release 18`,`Release 15`,`Release 17`,`Release 16`],ans:2,exp:`<b>3GPP Release 17</b>에서 NTN 표준이 최초 도입되어 5G NR 기반 위성 통신을 지원합니다.`},
{a:"NW",t:`Wi-Fi 진화`,q:`Wi-Fi 6E가 기존 Wi-Fi 6 대비 추가한 핵심 요소는?`,o:[`OFDMA 기술 도입`,`6GHz 대역 확장`,`MLO(Multi-Link Operation)`,`4K-QAM 변조`],ans:1,exp:`Wi-Fi 6E: <b>6GHz 대역을 확장</b>하여 최대 1200MHz 추가 스펙트럼을 제공합니다. MLO와 4K-QAM은 Wi-Fi 7의 기술입니다.`},
{a:"MG",t:`ROI, NPV, IRR`,q:`ROI의 한계로 옳은 것은?`,o:[`화폐의 시간가치를 반영하지 못한다`,`산출 공식이 너무 복잡하다`,`미래 현금흐름을 예측해야 한다`,`할인율 설정이 필요하다`],ans:0,exp:`ROI의 한계: <b>화폐의 시간가치(Time Value of Money)를 반영하지 못하고</b>, 투자 기간을 무시합니다. NPV가 이를 보완합니다.`},
{a:"MG",t:`DPP`,q:`DPP에서 데이터 위변조 방지를 위해 활용하는 핵심 기술은?`,o:[`양자 컴퓨팅`,`블록체인(Blockchain)`,`가상현실(VR)`,`인공지능(AI)`],ans:1,exp:`DPP의 기술 기반: <b>블록체인</b>(데이터 위변조 방지·투명성), IoT(실시간 추적), QR코드/NFC(소비자 접근)입니다.`},
{a:"MG",t:`ITIL 4 SVS`,q:`ITIL 4의 서비스 가치 사슬(SVC) 활동에 해당하지 않는 것은?`,o:[`참여(Engage)`,`설계·전환(Design & Transition)`,`인시던트 관리(Incident Management)`,`계획(Plan)`],ans:2,exp:`SVC 6가지 활동: 계획, 개선, <b>참여</b>, <b>설계·전환</b>, 획득·구축, 전달·지원. <b>인시던트 관리</b>는 SVC 활동이 아니라 관리 관행(Practice)입니다.`}
],
topics:[
{topic:`회귀 분석과 다중공선성`,domain:`AI`,keywords:[`다중공선성 해결: 변수 제거, 주성분 분석(PCA), 릿지 회귀(Ridge Regression, L2 정규화)`,`R-Square(결정계수): 회귀 모델의 설명력 — 1에 가까울수록 높은 설명력`,`Adjusted R-Square: 독립변수 수를 보정한 결정계수 — 변수 추가에 따른 과대평가 방지`,`RMSE(Root Mean Square Error): 예측값과 실측값 차이의 평균적 크기`,`MAE(Mean Absolute Error): 예측 오차의 절대값 평균`,`최소자승법(OLS, Ordinary Least Squares): 잔차 제곱합을 최소화하여 회귀계수 추정`],blanks:[{s:`VIF({{Variance Inflation Factor}})가 {{10}} 이상이면 심각한 다중공선성으로 판단한다.`},{s:`다중공선성 해결 방법: {{변수 제거}}, {{PCA(주성분 분석)}}, {{릿지 회귀(Ridge, L2 정규화)}}.`},{s:`R-Square({{결정계수}})는 {{1}}에 가까울수록 모델의 설명력이 높음을 의미한다.`},{s:`최소자승법({{OLS}})은 {{잔차 제곱합}}을 최소화하여 회귀계수를 추정하는 방법이다.`}]},
{topic:`SVM (서포트 벡터 머신)`,domain:`AI`,keywords:[`소프트 마진(Soft Margin): 슬랙 변수(ξ)로 일부 오분류 허용 — C 파라미터로 패널티 조절`,`커널 트릭(Kernel Trick): 저차원 데이터를 고차원 공간으로 매핑하여 비선형 분류 가능`,`대표 커널 함수: 선형(Linear), 다항식(Polynomial), RBF(Radial Basis Function, 가우시안)`,`SVM의 장점: 고차원 데이터에 강건, 일반화 성능 우수 (구조적 위험 최소화)`,`SVM의 한계: 대규모 데이터셋에서 학습 시간이 오래 걸림, 커널·하이퍼파라미터 선택 어려움`,`원-클래스 SVM(One-Class SVM): 이상치 탐지에 활용 — 정상 데이터만으로 경계 학습`],blanks:[{s:`하드 마진은 {{오버피팅}} 위험이 있으므로, {{슬랙 변수(ξ)}}를 도입한 {{소프트 마진}}을 사용한다.`},{s:`{{커널 트릭(Kernel Trick)}}은 데이터를 {{고차원 공간}}으로 매핑하여 비선형 분류를 가능하게 한다.`},{s:`대표 커널 함수: {{선형(Linear)}}, {{다항식(Polynomial)}}, {{RBF(가우시안)}}.`},{s:`SVM의 장점은 고차원 데이터에 강건하고 {{구조적 위험 최소화(SRM)}}로 일반화 성능이 우수한 것이다.`}]},
{topic:`단어 임베딩 (Word2Vec, BERT)`,domain:`AI`,keywords:[`단방향 문맥의 한계: Word2Vec과 ELMo는 좌→우 또는 양방향 순차적이지만 동시 양방향은 아님`,`BERT(Bidirectional Encoder Representations from Transformers): 양방향 문맥을 동시에 학습하는 사전훈련 모델`,`BERT 사전훈련 방법: MLM(Masked Language Model) + NSP(Next Sentence Prediction)`,`MLM: 입력 문장의 일부 토큰을 마스킹하고 예측 → 양방향 문맥 학습`,`Transformer 기반: Self-Attention 메커니즘으로 문장 내 모든 위치 간 관계를 동시에 계산`,`Fine-tuning: 사전훈련된 BERT를 특정 과제(분류, QA 등)에 맞게 미세 조정하여 활용`],blanks:[{s:`Word2Vec의 특성: '{{왕}}-{{남성}}+{{여성}}≈{{여왕}}' 같은 벡터 연산이 가능하다.`},{s:`BERT는 {{Bidirectional Encoder Representations from Transformers}}의 약자이다.`},{s:`BERT의 사전훈련 방법: {{MLM(Masked Language Model)}} + {{NSP(Next Sentence Prediction)}}.`},{s:`BERT는 {{Transformer}}의 {{Self-Attention}} 메커니즘으로 양방향 문맥을 동시에 학습한다.`}]},
{topic:`GAN vs Diffusion Model (생성형 AI)`,domain:`AI`,keywords:[`Diffusion Model: 원본 이미지에 노이즈를 점진적으로 추가(Forward)한 후, 역으로 복원(Reverse)하여 생성`,`Forward Process: 원본 → 가우시안 노이즈(점진적 노이즈 추가, T 스텝)`,`Reverse Process: 노이즈 → 원본(신경망이 각 스텝에서 노이즈를 예측하여 제거)`,`Diffusion의 장점: GAN 대비 학습 안정적, 높은 생성 품질, 모드 붕괴 없음`,`Diffusion의 단점: 수백~수천 스텝의 역확산으로 생성 속도가 느림`,`DDPM(Denoising Diffusion Probabilistic Model): 대표적인 확산 모델 프레임워크`],blanks:[{s:`Diffusion Model의 Forward Process는 원본에 {{가우시안 노이즈}}를 {{점진적으로 추가}}하는 과정이다.`},{s:`Reverse Process에서 신경망은 각 스텝에서 {{노이즈를 예측}}하여 제거함으로써 이미지를 복원한다.`},{s:`Diffusion Model은 GAN 대비 {{학습이 안정적}}이고 {{모드 붕괴가 없지만}}, 생성 {{속도가 느리다}}.`},{s:`대표적 확산 모델 프레임워크는 {{DDPM(Denoising Diffusion Probabilistic Model)}}이다.`}]},
{topic:`LLM Scaling Law와 추론 시간 연산`,domain:`AI`,keywords:[`새 패러다임 — 추론 시간 연산(Test-Time Compute): 모델 크기를 키우지 않고 추론 단계에서 연산량 투입`,`CoT(Chain-of-Thought): 중간 추론 단계를 생성하여 복잡한 문제 해결 능력 향상`,`RL(강화학습) 기반 추론 최적화: RLHF(Reinforcement Learning from Human Feedback)로 추론 품질 개선`,`OpenAI o1 시리즈: 훈련 시간 스케일링 + 추론 시간 스케일링의 이중 축 최적화`,`추론 예산(Inference Budget): 문제 난이도에 따라 추론 연산량을 동적 할당`,`미래 방향: 에이전트(Agent) 프레임워크 — 도구 사용, 메모리, 계획 수립 능력 통합`],blanks:[{s:`Scaling Law의 한계: {{비용·에너지 증가}}와 {{수확 체감(Diminishing Returns)}} 문제.`},{s:`새 패러다임은 모델 크기를 키우지 않고 {{추론 단계}}에서 {{연산량을 투입}}하는 것이다.`},{s:`RLHF({{Reinforcement Learning from Human Feedback}})로 추론 품질을 개선한다.`},{s:`추론 예산(Inference Budget)은 문제 {{난이도}}에 따라 추론 연산량을 {{동적 할당}}하는 개념이다.`}]},
{topic:`데이터 전처리 (결측치, 스케일링, 이상치)`,domain:`AI`,keywords:[`Min-Max: (x-min)÷(max-min), 표준화: (x-μ)÷σ`,`이상치 탐지: IQR 방법(Q1-1.5×IQR ~ Q3+1.5×IQR), Z-Score(|z|>3), 고립 포레스트(Isolation Forest)`,`이상치 처리: 제거, 대체(윈저화, Winsorization), 로버스트 스케일러 적용`,`범주형 변수 인코딩: 원핫 인코딩(One-hot), 레이블 인코딩(Label), 타겟 인코딩(Target)`,`피처 엔지니어링: 기존 변수로부터 새로운 유의미한 변수를 생성하는 과정`,`데이터 분할: 훈련(Train)·검증(Validation)·테스트(Test) 세트 분리 — 과적합 방지`],blanks:[{s:`IQR 방법의 이상치 기준: {{Q1-1.5×IQR}} 미만이거나 {{Q3+1.5×IQR}} 초과인 값.`},{s:`결측치 처리 방법: {{삭제}}, {{평균/중앙값 대치}}, {{K-NN 대치}}, 다중 대치(MICE).`},{s:`범주형 변수 인코딩: {{원핫 인코딩}}, {{레이블 인코딩}}, {{타겟 인코딩}}.`},{s:`교차 검증({{K-Fold CV}})은 모델의 {{일반화 성능}}을 안정적으로 평가하는 방법이다.`}]},
{topic:`연관규칙 학습 (Apriori 알고리즘)`,domain:`AI`,keywords:[`향상도(Lift) = Confidence ÷ Support(B) — Lift>1이면 양의 연관성`,`Apriori 알고리즘 동작: 후보 생성(Candidate Generation) → 가지치기(Pruning) → 지지도 검증 반복`,`한계: 후보 생성 시 조합 폭발 → FP-Growth 알고리즘으로 개선 (Frequent Pattern Tree 사용, 후보 생성 불필요)`,`적용 사례: 장바구니 분석(Market Basket Analysis), 추천 시스템, 교차 판매 전략`,`최소 지지도(Minimum Support) 임계값으로 빈발 항목집합 필터링`,`강한 규칙: 최소 지지도와 최소 신뢰도를 동시에 만족하는 연관규칙`],blanks:[{s:`신뢰도(Confidence) = {{P(B|A)}} = {{Support(A∩B)}} ÷ {{Support(A)}}.`},{s:`향상도(Lift) = {{Confidence}} ÷ {{Support(B)}}이며, {{Lift>1}}이면 양의 연관성을 의미한다.`},{s:`Apriori 원리: 빈발 항목집합의 모든 {{부분집합}}도 빈발해야 한다 ({{하향 폐쇄 성질}}).`},{s:`Apriori의 후보 생성 폭발 한계를 극복한 알고리즘은 {{FP-Growth}}이며, {{FP-Tree}}를 사용한다.`}]},
{topic:`분류 모델 성능 평가 (ROC 곡선과 AUC)`,domain:`AI`,keywords:[`ROC 곡선: X축 FPR(위양성률), Y축 TPR(재현율)로 임계값 변화에 따른 성능 시각화`,`AUC(Area Under Curve): ROC 곡선 아래 면적 — 1에 가까울수록 우수한 모델`,`AUC=0.5이면 랜덤 분류기 수준 (대각선), AUC=1이면 완벽한 분류`,`FPR(위양성률) = FP ÷ (FP+TN) — 실제 음성 중 양성으로 오분류한 비율`,`정밀도-재현율 트레이드오프: 임계값을 높이면 정밀도↑ 재현율↓`,`클래스 불균형 시 정확도(Accuracy)보다 F1-Score나 AUC가 더 적합한 평가 지표`],blanks:[{s:`F1-Score = {{2×(Precision×Recall)}} ÷ {{(Precision+Recall)}}로, 정밀도와 재현율의 {{조화 평균}}이다.`},{s:`ROC 곡선의 X축은 {{FPR(위양성률)}}, Y축은 {{TPR(재현율)}}이다.`},{s:`AUC가 {{0.5}}이면 랜덤 분류기 수준이고, {{1}}에 가까울수록 우수한 모델이다.`},{s:`클래스 불균형 데이터에서는 {{정확도(Accuracy)}}보다 {{F1-Score}}나 {{AUC}}가 더 적합한 평가 지표이다.`}]},
{topic:`PKI와 양자내성암호(PQC)`,domain:`SC`,keywords:[`디지털 인증서: X.509 표준 — 공개키, 소유자 정보, CA 서명 포함`,`양자 위협: 쇼어 알고리즘(Shor's Algorithm)으로 RSA, ECC 등 현행 공개키 암호가 해독 가능`,`PQC(Post-Quantum Cryptography, 양자내성암호): 양자 컴퓨터로도 해독 불가능한 차세대 암호 체계`,`NIST PQC 표준화: CRYSTALS-Kyber(키캡슐화), CRYSTALS-Dilithium(전자서명) 등 선정`,`격자 기반 암호(Lattice-based Cryptography): PQC의 주류 — 격자 문제의 계산 난이도 활용`,`Crypto-Agility(암호 민첩성): 암호 알고리즘을 신속하게 교체할 수 있는 시스템 설계 원칙`],blanks:[{s:`양자 컴퓨터의 {{쇼어 알고리즘(Shor's Algorithm)}}으로 RSA, ECC 등 현행 공개키 암호가 해독 가능해진다.`},{s:`NIST PQC 표준: {{CRYSTALS-Kyber}}(키캡슐화)와 {{CRYSTALS-Dilithium}}(전자서명).`},{s:`PQC의 주류 방식인 {{격자 기반 암호(Lattice-based)}}는 격자 문제의 {{계산 난이도}}를 활용한다.`},{s:`{{Crypto-Agility(암호 민첩성)}}는 암호 알고리즘을 {{신속하게 교체}}할 수 있는 설계 원칙이다.`}]},
{topic:`제로 트러스트 보안 (Zero Trust)`,domain:`SC`,keywords:[`핵심 구성요소: 정책 결정 포인트(PDP), 정책 실행 포인트(PEP)`,`마이크로 세그멘테이션(Micro-segmentation): 네트워크를 세분화하여 측면 이동 차단`,`SDP(Software-Defined Perimeter): 소프트웨어 정의 경계 — 인가된 사용자만 서비스 가시성 제공`,`ZTNA(Zero Trust Network Access): VPN을 대체하는 제로 트러스트 기반 원격 접속 솔루션`,`지속적 인증: 세션 중에도 사용자·디바이스·컨텍스트를 지속적으로 검증`,`구현 요소: 강력한 인증(MFA), 최소 권한, 디바이스 신뢰도 검증, 데이터 암호화`],blanks:[{s:`제로 트러스트 아키텍처 표준 가이드: {{NIST SP 800-207}}.`},{s:`{{마이크로 세그멘테이션}}은 네트워크를 세분화하여 {{측면 이동}}을 차단한다.`},{s:`{{ZTNA(Zero Trust Network Access)}}는 {{VPN}}을 대체하는 제로 트러스트 기반 원격 접속 솔루션이다.`},{s:`핵심 구성요소: {{PDP(정책 결정 포인트)}}와 {{PEP(정책 실행 포인트)}}.`}]},
{topic:`크리덴셜 스터핑과 FDS`,domain:`SC`,keywords:[`FDS(Fraud Detection System, 이상 거래 탐지 시스템): 전자 금융 사기를 실시간 탐지·차단`,`FDS 4단계: ①정보 수집 → ②분석/탐지 → ③차단/대응 → ④모니터링/개선`,`FDS 분석 기법: 룰 기반(Rule-based) + 머신러닝(ML) 하이브리드 방식`,`룰 기반의 한계: 신종 패턴 탐지 불가, 오탐률(False Positive) 높음`,`머신러닝 활용: 이상치 탐지(Anomaly Detection), 행동 패턴 학습으로 오탐률 감소`,`금융 분야: 전자금융거래법에 의거 FDS 구축·운영 의무화`],blanks:[{s:`FDS 4단계: ①{{정보 수집}} → ②{{분석/탐지}} → ③{{차단/대응}} → ④{{모니터링/개선}}.`},{s:`FDS 분석 기법: {{룰 기반(Rule-based)}} + {{머신러닝(ML)}} 하이브리드 방식.`},{s:`룰 기반의 한계: {{신종 패턴 탐지 불가}}와 높은 {{오탐률(False Positive)}}.`},{s:`금융 분야에서는 {{전자금융거래법}}에 의거하여 FDS 구축·운영이 의무이다.`}]},
{topic:`SW 공급망 보안과 EU CRA`,domain:`SC`,keywords:[`EU CRA(Cyber Resilience Act, 사이버복원력법): EU 시장 디지털 제품에 보안 내재화 의무`,`CRA 핵심 의무: Secure by Design(설계 단계부터 보안), 출시 후 최소 5년간 보안 업데이트 제공`,`CE 마킹: CRA 준수 인증 없이는 EU 시장 판매 불가`,`DevSecOps: 개발(Dev)·보안(Sec)·운영(Ops)을 통합한 보안 내재화 개발 파이프라인`,`SCA(Software Composition Analysis): 오픈소스 컴포넌트의 라이선스·취약점 자동 분석 도구`,`공급망 보안 강화: SLSA(Supply-chain Levels for Software Artifacts) 프레임워크`],blanks:[{s:`SBOM 표준 포맷: {{SPDX(Linux Foundation)}}와 {{CycloneDX(OWASP)}}.`},{s:`EU CRA의 핵심 의무: {{Secure by Design}}과 출시 후 최소 {{5년간}} 보안 업데이트 제공.`},{s:`{{CE 마킹}} 인증 없이는 EU 시장에서 디지털 제품 판매가 불가하다.`},{s:`{{DevSecOps}}는 {{개발(Dev)}}·{{보안(Sec)}}·{{운영(Ops)}}을 통합한 보안 내재화 개발 파이프라인이다.`}]},
{topic:`접근 통제 모델 (MAC, DAC, RBAC)`,domain:`SC`,keywords:[`DAC(Discretionary Access Control, 임의적 접근 통제): 자원 소유자가 자율적으로 접근 권한 부여`,`DAC 구현: ACL(Access Control List), Capability List`,`DAC 한계: 소유자의 자의적 권한 부여로 보안 취약 → 트로이목마 공격에 취약`,`RBAC(Role-Based Access Control, 역할 기반 접근 통제): 역할(Role)에 권한을 할당하고, 사용자에게 역할을 부여`,`RBAC 장점: 최소 권한 원칙(Least Privilege), 직무 분리(SoD, Separation of Duties) 구현 용이`,`ABAC(Attribute-Based Access Control): 속성(시간, 위치, 부서 등) 기반의 동적 접근 통제 — RBAC의 진화`],blanks:[{s:`Biba 모델: 무결성 중심 — {{No Read Down}}, {{No Write Up}}.`},{s:`DAC({{임의적 접근 통제}})는 {{자원 소유자}}가 자율적으로 접근 권한을 부여한다.`},{s:`RBAC는 {{역할(Role)}}에 권한을 할당하고, 사용자에게 {{역할을 부여}}하는 방식이다.`},{s:`RBAC는 {{최소 권한 원칙}}과 {{직무 분리(SoD)}} 구현이 용이하다.`}]},
{topic:`6G NTN (Non-Terrestrial Network)`,domain:`NW`,keywords:[`위성 궤도 유형: LEO(저궤도, 500~2000km), MEO(중궤도), GEO(정지궤도, 35,786km)`,`LEO 위성의 장점: 저지연(20~40ms RTT), 단점: 빠른 이동 속도로 도플러 시프트 발생`,`도플러 시프트 보상: 주파수 사전 보상, 빔 핸드오버 기술로 연속 통신 보장`,`HAPS(High Altitude Platform Station): 고도 20km 성층권에 배치하는 준위성 플랫폼`,`NTN-TN 융합: 지상 기지국과 위성을 통합 관리하는 하이브리드 네트워크 아키텍처`,`적용 사례: UAM(도심항공교통), 재난 통신, 해상·항공 광대역, IoT 원격 모니터링`],blanks:[{s:`LEO(저궤도) 위성의 장점은 {{저지연(20~40ms RTT)}}이고, 단점은 {{도플러 시프트}} 발생이다.`},{s:`HAPS({{High Altitude Platform Station}})는 고도 {{20km}} 성층권에 배치하는 준위성 플랫폼이다.`},{s:`6G 비전: {{지상·해상·공중·우주}}를 아우르는 '{{초공간}}' 통신 커버리지.`},{s:`NTN의 적용 사례: {{UAM(도심항공교통)}}, {{재난 통신}}, 해상·항공 광대역, IoT 원격 모니터링.`}]},
{topic:`Wi-Fi 진화 (Wi-Fi 6 → 6E → 7)`,domain:`NW`,keywords:[`Wi-Fi 7 (802.11be, EHT): MLO, 4K-QAM, 320MHz 채널 폭의 3대 혁신`,`MLO: 여러 주파수 대역을 동시에 묶어 사용 → 처리량 증가 + 지연 감소`,`4K-QAM(4096-QAM): 한 심볼에 12비트 → Wi-Fi 6(1024-QAM, 10비트) 대비 20% 효율 증가`,`TWT(Target Wake Time): Wi-Fi 6에서 도입된 IoT 기기 전력 절약 기술`,`WPA3: 최신 Wi-Fi 보안 프로토콜 — SAE(Simultaneous Authentication of Equals) 방식 도입`,`Wi-Fi 7의 최대 이론 속도: 약 46Gbps — AR/VR, 클라우드 게이밍에 최적`],blanks:[{s:`Wi-Fi 6E는 {{6GHz 대역}}을 확장하여 최대 {{1200MHz}} 추가 스펙트럼을 제공한다.`},{s:`Wi-Fi 7의 3대 혁신: {{MLO}}, {{4K-QAM}}, {{320MHz 채널 폭}}.`},{s:`TWT({{Target Wake Time}})는 Wi-Fi 6에서 도입된 {{IoT 기기}} 전력 절약 기술이다.`},{s:`WPA3는 {{SAE(Simultaneous Authentication of Equals)}} 방식을 도입한 최신 보안 프로토콜이다.`}]},
{topic:`BGP (Border Gateway Protocol)`,domain:`NW`,keywords:[`AS-PATH 속성: 경유하는 AS 번호를 순서대로 기록 — 경로 선택과 루프 탐지에 활용`,`eBGP(External BGP): 서로 다른 AS 간 라우팅, iBGP(Internal BGP): 같은 AS 내부 라우팅`,`BGP Hijacking: 잘못된 경로 정보를 주입하여 트래픽을 가로채는 공격`,`RPKI(Resource Public Key Infrastructure): BGP 경로 정보의 진위를 인증하여 하이재킹 방어`,`IGP(Interior Gateway Protocol)와의 차이: IGP(OSPF, RIP)는 AS 내부, BGP는 AS 간 라우팅`,`인터넷의 핵심 프로토콜: 전 세계 인터넷 라우팅 테이블은 BGP로 관리됨`],blanks:[{s:`BGP 4가지 메시지: {{OPEN}}, {{UPDATE}}, {{KEEPALIVE}}, {{NOTIFICATION}}.`},{s:`{{AS-PATH}} 속성은 경유하는 AS 번호를 순서대로 기록하여 경로 선택과 루프 탐지에 활용된다.`},{s:`{{eBGP}}는 서로 다른 AS 간, {{iBGP}}는 같은 AS 내부 라우팅이다.`},{s:`BGP Hijacking 방어: {{RPKI(Resource Public Key Infrastructure)}}로 경로 정보의 진위를 인증한다.`}]},
{topic:`IPSec VPN 아키텍처`,domain:`NW`,keywords:[`IKE(Internet Key Exchange): SA(Security Association) 설정을 위한 자동 키 교환 프로토콜`,`전송 모드(Transport Mode): IP 페이로드만 암호화 — 호스트 간 통신`,`터널 모드(Tunnel Mode): IP 헤더를 포함한 전체 패킷 암호화 + 새 IP 헤더 추가 — VPN 게이트웨이 간 통신`,`SA(Security Association): 보안 파라미터(암호 알고리즘, 키, SPI) 합의 — 단방향 논리적 연결`,`SPI(Security Parameter Index): SA를 식별하는 고유 번호`,`IKE 2단계: Phase 1(IKE SA — 안전한 채널 수립) → Phase 2(IPSec SA — 실제 데이터 보호 파라미터 협상)`],blanks:[{s:`전송 모드는 {{IP 페이로드만}} 암호화하고, 터널 모드는 {{전체 패킷}}을 암호화한다.`},{s:`{{SA(Security Association)}}는 보안 파라미터를 합의하는 {{단방향}} 논리적 연결이다.`},{s:`IKE 2단계: Phase 1({{IKE SA}}) → Phase 2({{IPSec SA}}).`},{s:`터널 모드에서는 원본 IP 헤더를 암호화하고 {{새 IP 헤더}}를 추가한다.`}]},
{topic:`ITIL 4 서비스 가치 체계(SVS)`,domain:`MG`,keywords:[`서비스 가치 사슬(SVC): 계획(Plan), 개선(Improve), 참여(Engage), 설계·전환(Design & Transition), 획득·구축(Obtain/Build), 전달·지원(Deliver & Support)`,`ITIL 4 지도 원칙 7가지: 가치에 집중, 현재 위치에서 출발, 피드백으로 반복 개선, 협업·가시성, 전체적 사고, 단순·실용, 최적화·자동화`,`4차원 모델: 조직과 사람, 정보와 기술, 파트너와 공급자, 가치 흐름과 프로세스`,`ITIL v3 라이프사이클: 전략→설계→전환→운영→지속적 개선 (수직적 제공 모델)`,`DevOps/Agile 수용: ITIL 4는 폭포수 방식에서 벗어나 애자일, 린, DevOps 관행과 통합`,`공동 가치 창출(Value Co-creation): 서비스 제공자와 소비자가 함께 가치를 만드는 개념`],blanks:[{s:`ITIL 4의 4차원 모델: {{조직과 사람}}, {{정보와 기술}}, {{파트너와 공급자}}, {{가치 흐름과 프로세스}}.`},{s:`ITIL v3는 {{서비스 라이프사이클}} 중심이었으나, ITIL 4는 {{서비스 가치 체계(SVS)}} 중심이다.`},{s:`ITIL 4는 {{DevOps}}, {{Agile}}, {{Lean}} 관행과 통합하여 현대 IT 환경에 대응한다.`},{s:`{{공동 가치 창출(Value Co-creation)}}은 서비스 제공자와 소비자가 {{함께 가치를 만드는}} 개념이다.`}]},
{topic:`디지털 제품 여권(DPP)과 글로벌 규제 대응`,domain:`MG`,keywords:[`국내 기업 대응: 제조 데이터 디지털 전환, 탄소 발자국 측정 시스템 구축, GS1 표준 준수`,`CBAM(Carbon Border Adjustment Mechanism): EU가 수입품에 부과하는 탄소국경세`,`탄소발자국(Carbon Footprint): 제품 생산·유통·사용·폐기 전 과정의 온실가스 배출량`,`데이터 상호운용성: IDS(International Data Spaces), Catena-X(자동차 산업 데이터 공유 플랫폼)`,`디지털 트윈 연계: 실물 제품의 디지털 복제본에 DPP 정보를 실시간 동기화`,`중소기업 대응 전략: 클라우드 기반 SaaS DPP 솔루션 활용으로 도입 비용 최소화`],blanks:[{s:`CBAM({{Carbon Border Adjustment Mechanism}})은 EU가 수입품에 부과하는 {{탄소국경세}}이다.`},{s:`블록체인은 제조·물류 과정의 {{데이터 위변조}}를 방지하고, {{스마트 계약}}으로 자동 검증한다.`},{s:`자동차 산업 데이터 공유 플랫폼: {{Catena-X}}.`},{s:`중소기업 대응 전략: {{클라우드 기반 SaaS}} DPP 솔루션으로 도입 비용을 최소화한다.`}]},
{topic:`IT 투자 타당성 분석 (ROI, NPV, IRR)`,domain:`MG`,keywords:[`NPV > 0이면 투자 가치 있음, NPV가 가장 큰 대안을 선택`,`IRR(Internal Rate of Return, 내부수익률): NPV=0이 되는 할인율 — IRR > 요구수익률이면 투자`,`화폐의 시간가치(Time Value of Money): 현재의 1원은 미래의 1원보다 가치가 크다는 원칙`,`할인율(Discount Rate): 미래 현금흐름을 현재가치로 변환하는 이자율`,`TCO(Total Cost of Ownership): 도입·운영·유지보수·폐기까지 전체 소유 비용`,`비용편익분석(CBA): 정량적 편익과 비용을 비교하여 경제적 타당성 평가`],blanks:[{s:`NPV > {{0}}이면 투자 가치가 있으며, NPV가 {{가장 큰}} 대안을 선택한다.`},{s:`IRR({{내부수익률}})은 {{NPV=0}}이 되는 할인율이며, IRR > {{요구수익률}}이면 투자한다.`},{s:`ROI의 단점: {{화폐의 시간가치}} 미반영, {{투자 기간}} 무시.`},{s:`TCO({{Total Cost of Ownership}})는 도입·운영·유지보수·폐기까지 {{전체 소유 비용}}이다.`}]}
]},
{label:`DAY 4`,
qs:[
{a:"AI",t:`연관규칙`,q:`Apriori 알고리즘의 후보 생성 폭발 한계를 극복한 알고리즘은?`,o:[`DBSCAN`,`FP-Growth`,`Naive Bayes`,`K-Means`],ans:1,exp:`<b>FP-Growth</b>: <b>FP-Tree(Frequent Pattern Tree)</b>를 사용하여 후보 생성 없이 빈발 항목집합을 추출합니다.`},
{a:"AI",t:`ROC/AUC`,q:`AUC=0.5가 의미하는 것은?`,o:[`랜덤 분류기 수준`,`완벽한 분류 모델`,`모델이 모든 데이터를 양성으로 분류`,`모델이 학습되지 않은 상태`],ans:0,exp:`<b>AUC=0.5</b>는 ROC 곡선이 대각선과 일치하여 <b>랜덤 분류기 수준</b>임을 의미합니다. AUC=1이면 완벽한 모델입니다.`},
{a:"AI",t:`ARIMA`,q:`ARIMA에서 AR(p)의 의미로 옳은 것은?`,o:[`과거 p개 시점의 오차로 현재 값을 보정`,`p개의 독립변수를 사용한 회귀`,`p회 차분으로 비정상 시계열을 정상화`,`과거 p개 시점의 자기 값으로 현재 값을 예측`],ans:3,exp:`<b>AR(p, 자기회귀)</b>: <b>과거 p개 시점의 자기 값</b>으로 현재 값을 예측합니다. MA(q)는 과거 오차로 보정합니다.`},
{a:"AI",t:`데이터 전처리`,q:`이상치 탐지에서 IQR 방법의 기준으로 옳은 것은?`,o:[`최솟값과 최댓값을 제외한 값`,`평균 ± 2×표준편차 밖의 값`,`중앙값 ± 3×MAD 밖의 값`,`Q1-1.5×IQR ~ Q3+1.5×IQR 밖의 값`],ans:3,exp:`IQR 방법: <b>Q1-1.5×IQR 미만</b>이거나 <b>Q3+1.5×IQR 초과</b>인 값을 이상치로 판단합니다.`},
{a:"AI",t:`CNN 풀링`,q:`최대 풀링(Max Pooling)과 평균 풀링(Average Pooling)의 차이로 옳은 것은?`,o:[`최대 풀링은 합성곱 계층 앞에, 평균 풀링은 뒤에 배치한다`,`최대 풀링은 차원을 늘리고, 평균 풀링은 차원을 줄인다`,`최대 풀링은 가장 강한 특성을 추출하고, 평균 풀링은 전체적인 특성을 보존한다`,`최대 풀링은 학습 파라미터가 있고, 평균 풀링은 없다`],ans:2,exp:`<b>최대 풀링</b>: 영역 내 <b>최댓값 선택(가장 강한 특성)</b>. <b>평균 풀링</b>: <b>평균값 계산(전체적인 특성 보존)</b>.`},
{a:"AI",t:`회귀 분석`,q:`다중공선성 해결 방법으로 옳지 않은 것은?`,o:[`상관 높은 변수 제거`,`릿지 회귀(Ridge, L2 정규화) 사용`,`데이터의 행(관측치) 수를 줄인다`,`PCA(주성분 분석) 적용`],ans:2,exp:`다중공선성 해결: <b>변수 제거</b>, <b>PCA</b>, <b>릿지 회귀(L2 정규화)</b>. 관측치 수를 줄이는 것은 해결이 아닌 오히려 문제를 악화시킵니다.`},
{a:"AI",t:`단어 임베딩`,q:`BERT에서 MLM(Masked Language Model) 훈련의 원리는?`,o:[`두 문장의 유사도를 점수로 출력한다`,`입력 문장의 일부 토큰을 마스킹하고 예측한다`,`입력 문장의 다음 단어를 예측한다`,`문장을 요약하여 짧은 문장을 생성한다`],ans:1,exp:`<b>MLM(Masked Language Model)</b>: 입력 문장의 <b>일부 토큰을 마스킹([MASK])하고 원래 토큰을 예측</b>하여 양방향 문맥을 학습합니다.`},
{a:"AI",t:`GAN vs Diffusion`,q:`Diffusion Model의 단점으로 옳은 것은?`,o:[`생성 품질이 GAN보다 낮다`,`학습이 매우 불안정하다`,`수백~수천 스텝의 역확산으로 생성 속도가 느리다`,`모드 붕괴(Mode Collapse)가 심각하다`],ans:2,exp:`Diffusion Model의 단점: <b>수백~수천 스텝의 역확산 과정</b>이 필요하여 <b>생성 속도가 느립니다</b>. 대신 학습 안정성과 품질은 GAN보다 우수합니다.`},
{a:"SC",t:`접근 통제`,q:`Biba 모델의 핵심 원칙으로 옳은 것은?`,o:[`No Read Up, No Write Down — 기밀성`,`No Read, No Write — 가용성`,`No Read Down, No Write Up — 무결성`,`Read All, Write All — 개방성`],ans:2,exp:`<b>Biba 모델</b>: <b>무결성 중심</b> — <b>No Read Down</b>(하위 등급 읽기 금지), <b>No Write Up</b>(상위 등급 쓰기 금지).`},
{a:"SC",t:`침해사고 대응`,q:`증거 보전의 3원칙에 해당하지 않는 것은?`,o:[`무결성(Hash 값 확인)`,`가용성(24시간 접근 보장)`,`연계 보관성(Chain of Custody)`,`적법성(법적 절차 준수)`],ans:1,exp:`증거 보전 3원칙: <b>무결성(Hash)</b>, <b>연계 보관성(Chain of Custody)</b>, <b>적법성</b>입니다. 가용성은 정보보안의 3요소(CIA)이지 증거 보전 원칙이 아닙니다.`},
{a:"SC",t:`PKI와 PQC`,q:`Crypto-Agility(암호 민첩성)의 의미로 옳은 것은?`,o:[`암호 알고리즘을 신속하게 교체할 수 있는 시스템 설계`,`암호화 속도를 최대한 높이는 기법`,`하나의 암호 알고리즘을 영구적으로 사용하는 것`,`모든 데이터를 이중 암호화하는 정책`],ans:0,exp:`<b>Crypto-Agility(암호 민첩성)</b>: <b>암호 알고리즘을 신속하게 교체</b>할 수 있는 시스템 설계 원칙. PQC 전환에 필수적입니다.`},
{a:"SC",t:`제로 트러스트`,q:`ZTNA(Zero Trust Network Access)가 대체하는 기존 기술은?`,o:[`IDS/IPS`,`방화벽(Firewall)`,`NAC(Network Access Control)`,`VPN`],ans:3,exp:`<b>ZTNA(Zero Trust Network Access)</b>: <b>VPN을 대체</b>하는 제로 트러스트 기반 원격 접속 솔루션입니다.`},
{a:"SC",t:`CTEM`,q:`CTEM의 5단계 중 '동원(Mobilization)' 단계의 활동으로 옳은 것은?`,o:[`공격 표면을 식별하고 범위를 설정한다`,`침투 테스트로 악용 가능성을 검증한다`,`취약점을 스캔하여 목록을 작성한다`,`보안팀·IT팀·경영진이 협력하여 수정 조치를 실행한다`],ans:3,exp:`<b>동원(Mobilization)</b>: <b>보안팀·IT팀·경영진이 협력</b>하여 실제 수정 조치를 실행하는 최종 단계입니다.`},
{a:"NW",t:`BGP`,q:`eBGP와 iBGP의 차이로 옳은 것은?`,o:[`eBGP와 iBGP는 동일한 기능이다`,`eBGP는 서로 다른 AS 간, iBGP는 같은 AS 내부 라우팅이다`,`eBGP는 거리 벡터, iBGP는 경로 벡터 방식이다`,`eBGP는 TCP, iBGP는 UDP를 사용한다`],ans:1,exp:`<b>eBGP(External BGP)</b>: 서로 다른 AS 간 라우팅. <b>iBGP(Internal BGP)</b>: 같은 AS 내부 라우팅입니다. 모두 경로 벡터 방식이고 TCP를 사용합니다.`},
{a:"NW",t:`IPSec VPN`,q:`IKE(Internet Key Exchange)의 역할로 옳은 것은?`,o:[`SA(Security Association) 설정을 위한 자동 키 교환을 수행한다`,`IP 패킷의 페이로드를 암호화한다`,`패킷의 무결성만 검증한다`,`라우팅 테이블을 교환한다`],ans:0,exp:`<b>IKE(Internet Key Exchange)</b>: <b>SA(Security Association) 설정을 위한 자동 키 교환</b> 프로토콜입니다.`},
{a:"NW",t:`Wi-Fi 7 MLO`,q:`Wi-Fi 7의 최대 채널 폭으로 옳은 것은?`,o:[`320MHz`,`80MHz`,`240MHz`,`160MHz`],ans:0,exp:`Wi-Fi 7의 최대 채널 폭: <b>320MHz</b> — Wi-Fi 6E(160MHz)의 2배로, 최대 약 46Gbps 이론 속도를 제공합니다.`},
{a:"NW",t:`6G NTN`,q:`HAPS(High Altitude Platform Station)가 배치되는 고도는?`,o:[`약 36,000km (정지궤도)`,`약 20km (성층권)`,`약 2km (저층 대기권)`,`약 500m (드론 수준)`],ans:1,exp:`<b>HAPS(High Altitude Platform Station)</b>: 고도 <b>약 20km 성층권</b>에 배치하는 준위성 플랫폼입니다.`},
{a:"MG",t:`ROI, NPV, IRR`,q:`화폐의 시간가치(Time Value of Money)를 반영하는 분석 기법은?`,o:[`회수 기간법(Payback Period)`,`ROI(투자 수익률)`,`단순 비용편익비율`,`NPV(순현재가치)`],ans:3,exp:`<b>NPV(순현재가치)</b>: 미래 현금흐름을 <b>할인율로 현재가치화</b>하여 화폐의 시간가치를 반영합니다. ROI와 회수 기간법은 시간가치를 미반영합니다.`},
{a:"MG",t:`DPP와 규제`,q:`DPP 구현 아키텍처의 3대 구성 기술로 옳은 것은?`,o:[`양자 컴퓨팅, 6G, 디지털 트윈`,`빅데이터, 엣지 컴퓨팅, AR`,`블록체인, IoT, 클라우드 데이터 레이크`,`AI, VR, 5G`],ans:2,exp:`DPP 구현 아키텍처: <b>블록체인 분산원장</b>(위변조 방지) + <b>IoT 센서</b>(실시간 추적) + <b>클라우드 데이터 레이크</b>(통합 저장).`},
{a:"MG",t:`ITIL 4 SVS`,q:`ITIL 4에서 강조하는 '공동 가치 창출(Value Co-creation)'의 의미는?`,o:[`서비스 제공자와 소비자가 함께 가치를 만든다`,`기술 자체가 자동으로 가치를 생성한다`,`외부 벤더가 전적으로 서비스를 책임진다`,`IT 부서만이 가치를 창출한다`],ans:0,exp:`<b>공동 가치 창출(Value Co-creation)</b>: <b>서비스 제공자와 소비자가 함께 가치를 만드는</b> 개념입니다.`}
],
topics:[
{topic:`GAN vs Diffusion Model (생성형 AI)`,domain:`AI`,keywords:[`GAN(Generative Adversarial Network): 생성자(Generator)와 판별자(Discriminator)의 적대적 학습`,`GAN 비유: 위조지폐범(생성자)과 경찰(판별자)의 경쟁 — Minimax 게임`,`GAN 손실 함수: min_G max_D [E[log D(x)] + E[log(1-D(G(z)))]]`,`GAN의 한계: 모드 붕괴(Mode Collapse), 학습 불안정성, 다양성 부족`,`Diffusion Model: 원본 이미지에 노이즈를 점진적으로 추가(Forward)한 후, 역으로 복원(Reverse)하여 생성`,`Forward Process: 원본 → 가우시안 노이즈(점진적 노이즈 추가, T 스텝)`],blanks:[{s:`GAN은 {{생성자(Generator)}}와 {{판별자(Discriminator)}}의 {{적대적 학습}}으로 이미지를 생성한다.`},{s:`GAN의 대표적 한계: {{모드 붕괴(Mode Collapse)}}, {{학습 불안정성}}, 다양성 부족.`},{s:`Diffusion Model의 Forward Process는 원본에 {{가우시안 노이즈}}를 {{점진적으로 추가}}하는 과정이다.`},{s:`Reverse Process에서 신경망은 각 스텝에서 {{노이즈를 예측}}하여 제거함으로써 이미지를 복원한다.`}]},
{topic:`LLM Scaling Law와 추론 시간 연산`,domain:`AI`,keywords:[`3대 스케일링 축: 파라미터 수(N), 데이터셋 크기(D), 학습 연산량(C)`,`Chinchilla Scaling Law (Hoffmann et al., 2022): 모델 크기와 데이터 양을 동등하게 스케일링해야 최적`,`Scaling Law의 한계: 무한히 크게 키우는 것은 비용·에너지·수확 체감 문제`,`새 패러다임 — 추론 시간 연산(Test-Time Compute): 모델 크기를 키우지 않고 추론 단계에서 연산량 투입`,`CoT(Chain-of-Thought): 중간 추론 단계를 생성하여 복잡한 문제 해결 능력 향상`,`RL(강화학습) 기반 추론 최적화: RLHF(Reinforcement Learning from Human Feedback)로 추론 품질 개선`],blanks:[{s:`Scaling Law: {{모델 크기}}, {{데이터 양}}, {{컴퓨팅 자원}}이 증가하면 손실이 {{멱법칙(Power Law)}}으로 감소한다.`},{s:`Chinchilla Law: 모델 크기와 {{데이터 양}}을 {{동등하게}} 스케일링해야 최적 효율이다.`},{s:`Scaling Law의 한계: {{비용·에너지 증가}}와 {{수확 체감(Diminishing Returns)}} 문제.`},{s:`새 패러다임은 모델 크기를 키우지 않고 {{추론 단계}}에서 {{연산량을 투입}}하는 것이다.`}]},
{topic:`데이터 전처리 (결측치, 스케일링, 이상치)`,domain:`AI`,keywords:[`GIGO(Garbage In, Garbage Out): 입력 데이터 품질이 모델 성능을 결정`,`결측치 3유형: MCAR(완전 무작위 결측), MAR(무작위 결측), MNAR(비무작위 결측)`,`결측치 처리: 삭제(Listwise/Pairwise), 평균/중앙값 대치, K-NN 대치, 다중 대치(MICE)`,`피처 스케일링: Min-Max 정규화(0~1 범위), 표준화(Z-Score, 평균 0 표준편차 1)`,`Min-Max: (x-min)÷(max-min), 표준화: (x-μ)÷σ`,`이상치 탐지: IQR 방법(Q1-1.5×IQR ~ Q3+1.5×IQR), Z-Score(|z|>3), 고립 포레스트(Isolation Forest)`],blanks:[{s:`결측치 처리 방법: {{삭제}}, {{평균/중앙값 대치}}, {{K-NN 대치}}, 다중 대치(MICE).`},{s:`범주형 변수 인코딩: {{원핫 인코딩}}, {{레이블 인코딩}}, {{타겟 인코딩}}.`},{s:`교차 검증({{K-Fold CV}})은 모델의 {{일반화 성능}}을 안정적으로 평가하는 방법이다.`},{s:`데이터 분할: {{훈련(Train)}}·{{검증(Validation)}}·{{테스트(Test)}} 세트로 분리하여 {{과적합}}을 방지한다.`}]},
{topic:`연관규칙 학습 (Apriori 알고리즘)`,domain:`AI`,keywords:[`한계: 후보 생성 시 조합 폭발 → FP-Growth 알고리즘으로 개선 (Frequent Pattern Tree 사용, 후보 생성 불필요)`,`적용 사례: 장바구니 분석(Market Basket Analysis), 추천 시스템, 교차 판매 전략`,`최소 지지도(Minimum Support) 임계값으로 빈발 항목집합 필터링`,`강한 규칙: 최소 지지도와 최소 신뢰도를 동시에 만족하는 연관규칙`,`Lift=1이면 독립, Lift<1이면 음의 연관성(대체재)`,`다차원 연관규칙: 나이, 성별 등 속성 조합까지 확장 가능`],blanks:[{s:`향상도(Lift) = {{Confidence}} ÷ {{Support(B)}}이며, {{Lift>1}}이면 양의 연관성을 의미한다.`},{s:`Apriori 원리: 빈발 항목집합의 모든 {{부분집합}}도 빈발해야 한다 ({{하향 폐쇄 성질}}).`},{s:`Apriori의 후보 생성 폭발 한계를 극복한 알고리즘은 {{FP-Growth}}이며, {{FP-Tree}}를 사용한다.`},{s:`연관규칙의 대표 적용 사례는 {{장바구니 분석(Market Basket Analysis)}}이다.`}]},
{topic:`분류 모델 성능 평가 (ROC 곡선과 AUC)`,domain:`AI`,keywords:[`정밀도(Precision) = TP ÷ (TP+FP) — 양성 예측 중 실제 양성 비율`,`재현율(Recall, TPR) = TP ÷ (TP+FN) — 실제 양성 중 정확히 탐지한 비율`,`F1-Score = 2×(Precision×Recall) ÷ (Precision+Recall) — 정밀도와 재현율의 조화 평균`,`ROC 곡선: X축 FPR(위양성률), Y축 TPR(재현율)로 임계값 변화에 따른 성능 시각화`,`AUC(Area Under Curve): ROC 곡선 아래 면적 — 1에 가까울수록 우수한 모델`,`AUC=0.5이면 랜덤 분류기 수준 (대각선), AUC=1이면 완벽한 분류`],blanks:[{s:`혼동 행렬의 4요소: {{TP(True Positive)}}, {{TN(True Negative)}}, {{FP(False Positive)}}, {{FN(False Negative)}}.`},{s:`정밀도(Precision) = {{TP}} ÷ ({{TP+FP}}), 재현율(Recall) = {{TP}} ÷ ({{TP+FN}}).`},{s:`F1-Score = {{2×(Precision×Recall)}} ÷ {{(Precision+Recall)}}로, 정밀도와 재현율의 {{조화 평균}}이다.`},{s:`ROC 곡선의 X축은 {{FPR(위양성률)}}, Y축은 {{TPR(재현율)}}이다.`}]},
{topic:`K-Means 군집화와 DBSCAN 알고리즘`,domain:`AI`,keywords:[`K-Means 동작: ①중심점 초기화 → ②각 데이터를 가장 가까운 중심에 할당 → ③중심 재계산 → ②~③ 수렴까지 반복`,`K-Means의 한계: 비구형(Non-spherical) 데이터에 부적합, K값 사전 지정 필요, 이상치에 민감`,`엘보우 기법(Elbow Method): K값에 따른 SSE(Sum of Squared Errors) 변화로 최적 K 결정`,`DBSCAN: 밀도 기반 군집화 — 밀집 영역을 하나의 군집으로 연결`,`DBSCAN 파라미터: ε(Epsilon, 탐색 반경)과 MinPts(최소 이웃 수)`,`DBSCAN 포인트 유형: 핵심 포인트(Core), 경계 포인트(Border), 노이즈 포인트(Noise)`],blanks:[{s:`DBSCAN의 두 핵심 파라미터: {{ε(Epsilon, 탐색 반경)}}과 {{MinPts(최소 이웃 수)}}.`},{s:`DBSCAN 포인트 유형: {{핵심 포인트(Core)}}, {{경계 포인트(Border)}}, {{노이즈 포인트(Noise)}}.`},{s:`최적 K값 결정에 사용되는 기법은 {{엘보우 기법(Elbow Method)}}이며, {{SSE}} 변화를 관찰한다.`},{s:`군집 품질 평가 지표인 {{실루엣 계수(Silhouette Coefficient)}}는 {{1}}에 가까울수록 잘 분리됨을 의미한다.`}]},
{topic:`시계열 분석과 ARIMA 모델`,domain:`AI`,keywords:[`I(d): d회 차분(Differencing)으로 비정상 시계열을 정상화`,`ARIMA(p,d,q): p=AR 차수, d=차분 횟수, q=MA 차수`,`ACF(자기상관함수)와 PACF(편자기상관함수)로 p, q 차수를 결정`,`ADF 검정(Augmented Dickey-Fuller Test): 정상성 여부를 통계적으로 검증`,`계절성 데이터는 SARIMA(Seasonal ARIMA)로 확장 분석`,`Box-Jenkins 방법론: 식별(Identification) → 추정(Estimation) → 진단(Diagnostic)`],blanks:[{s:`비정상 시계열은 {{차분(Differencing)}}을 통해 정상화한 후 분석한다.`},{s:`p, q 차수 결정에 {{ACF(자기상관함수)}}와 {{PACF(편자기상관함수)}}를 사용한다.`},{s:`정상성 여부를 통계적으로 검증하는 방법은 {{ADF 검정(Augmented Dickey-Fuller Test)}}이다.`},{s:`Box-Jenkins 방법론: {{식별(Identification)}} → {{추정(Estimation)}} → {{진단(Diagnostic)}}.`}]},
{topic:`합성곱 신경망(CNN)의 풀링(Pooling) 계층`,domain:`AI`,keywords:[`풀링 계층 목적: 특성 맵의 차원 축소(다운샘플링), 연산량 감소, 과적합 방지`,`최대 풀링(Max Pooling): 영역 내 최댓값 선택 — 가장 강한 특성을 추출`,`평균 풀링(Average Pooling): 영역 내 평균값 계산 — 전체적인 특성 정보를 보존`,`공간 불변성(Spatial Invariance): 입력의 위치가 변해도 동일한 특성을 인식`,`풀링 윈도우 크기와 스트라이드(Stride)로 다운샘플링 비율 조절`,`합성곱 계층의 필터(커널)는 학습 가능한 파라미터, 풀링은 학습 파라미터 없음`],blanks:[{s:`풀링 계층의 3대 목적: {{차원 축소}}, {{연산량 감소}}, {{과적합 방지}}.`},{s:`최대 풀링(Max Pooling)은 영역 내 {{최댓값}}을 선택하고, 평균 풀링(Average Pooling)은 {{평균값}}을 계산한다.`},{s:`풀링이 제공하는 {{공간 불변성(Spatial Invariance)}}은 입력 위치가 변해도 동일한 특성을 인식하게 한다.`},{s:`합성곱 계층의 필터는 {{학습 가능한 파라미터}}이지만, 풀링 계층은 {{학습 파라미터가 없다}}.`}]},
{topic:`크리덴셜 스터핑과 FDS`,domain:`SC`,keywords:[`공격 원인: 사용자의 비밀번호 재사용 습관 — 하나의 사이트 유출이 전체 계정 탈취로 연쇄`,`공격 도구: 봇넷(Botnet), 프록시 로테이션으로 IP 차단 우회`,`대응: 다중 인증(MFA), CAPTCHA, 비밀번호 관리자 사용 권장, 유출 DB 크로스 체크`,`FDS(Fraud Detection System, 이상 거래 탐지 시스템): 전자 금융 사기를 실시간 탐지·차단`,`FDS 4단계: ①정보 수집 → ②분석/탐지 → ③차단/대응 → ④모니터링/개선`,`FDS 분석 기법: 룰 기반(Rule-based) + 머신러닝(ML) 하이브리드 방식`],blanks:[{s:`크리덴셜 스터핑은 유출된 {{ID/PW}}를 {{자동화 봇}}으로 타 사이트에 대입하는 공격이다.`},{s:`공격의 근본 원인: 사용자의 {{비밀번호 재사용}} 습관.`},{s:`FDS 4단계: ①{{정보 수집}} → ②{{분석/탐지}} → ③{{차단/대응}} → ④{{모니터링/개선}}.`},{s:`FDS 분석 기법: {{룰 기반(Rule-based)}} + {{머신러닝(ML)}} 하이브리드 방식.`}]},
{topic:`SW 공급망 보안과 EU CRA`,domain:`SC`,keywords:[`대표 사례: SolarWinds Orion(2020), Log4Shell(2021), 3CX(2023)`,`SBOM(Software Bill of Materials): 소프트웨어 구성 요소 목록 — 취약 컴포넌트 추적에 필수`,`SBOM 표준 포맷: SPDX(Linux Foundation), CycloneDX(OWASP)`,`EU CRA(Cyber Resilience Act, 사이버복원력법): EU 시장 디지털 제품에 보안 내재화 의무`,`CRA 핵심 의무: Secure by Design(설계 단계부터 보안), 출시 후 최소 5년간 보안 업데이트 제공`,`CE 마킹: CRA 준수 인증 없이는 EU 시장 판매 불가`],blanks:[{s:`EU CRA의 핵심 의무: {{Secure by Design}}과 출시 후 최소 {{5년간}} 보안 업데이트 제공.`},{s:`{{CE 마킹}} 인증 없이는 EU 시장에서 디지털 제품 판매가 불가하다.`},{s:`{{DevSecOps}}는 {{개발(Dev)}}·{{보안(Sec)}}·{{운영(Ops)}}을 통합한 보안 내재화 개발 파이프라인이다.`},{s:`{{SCA(Software Composition Analysis)}}는 오픈소스 컴포넌트의 라이선스·취약점을 자동 분석하는 도구이다.`}]},
{topic:`접근 통제 모델 (MAC, DAC, RBAC)`,domain:`SC`,keywords:[`MAC(Mandatory Access Control, 강제적 접근 통제): 시스템(보안 관리자)이 보안 등급에 따라 접근 권한을 강제 부여`,`MAC 모델: BLP(Bell-LaPadula) — 기밀성 중심 (No Read Up, No Write Down)`,`MAC 모델: Biba — 무결성 중심 (No Read Down, No Write Up)`,`DAC(Discretionary Access Control, 임의적 접근 통제): 자원 소유자가 자율적으로 접근 권한 부여`,`DAC 구현: ACL(Access Control List), Capability List`,`DAC 한계: 소유자의 자의적 권한 부여로 보안 취약 → 트로이목마 공격에 취약`],blanks:[{s:`DAC({{임의적 접근 통제}})는 {{자원 소유자}}가 자율적으로 접근 권한을 부여한다.`},{s:`RBAC는 {{역할(Role)}}에 권한을 할당하고, 사용자에게 {{역할을 부여}}하는 방식이다.`},{s:`RBAC는 {{최소 권한 원칙}}과 {{직무 분리(SoD)}} 구현이 용이하다.`},{s:`DAC의 한계: 소유자의 자의적 권한 부여로 {{트로이목마 공격}}에 취약하다.`}]},
