<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZIP-UP 5주차 주간모의고사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;background:#f4f6fa;color:#1e293b;min-height:100vh}
.hdr{background:#fff;border-bottom:2px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:5px;letter-spacing:1px;white-space:nowrap}
.hdr-info{display:flex;flex-direction:column;gap:1px}
.hdr-t{font-size:14px;font-weight:700;color:#3730a3}
.hdr-sub{font-size:10px;color:#64748b}
.hdr-badge{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hdr-year{font-size:13px;font-weight:700;color:#64748b}
.hdr-tag{font-size:9px;background:#eef2ff;color:#4f46e5;padding:2px 7px;border-radius:4px;font-weight:700}
.prog-wrap{background:#fff;padding:10px 20px;border-bottom:1px solid #e2e8f0}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:5px}
.prog-bar{height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:99px;transition:width .4s}
.con{max-width:700px;margin:0 auto;padding:24px 16px 20px}
.home-title{text-align:center;margin:0 0 4px;font-size:22px;font-weight:800;color:#3730a3}
.home-sub{text-align:center;font-size:12px;color:#64748b;margin-bottom:22px;line-height:1.6}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:500px){.day-grid{grid-template-columns:repeat(3,1fr)}}
.day-card{background:#fff;border:2px solid #e2e8f0;border-radius:13px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.day-card:hover{border-color:#4f46e5;box-shadow:0 4px 14px rgba(79,70,229,.12);transform:translateY(-2px)}
.day-card.done{border-color:#10b981;background:#f0fdf4}
.day-lbl{font-size:17px;font-weight:800;color:#3730a3;margin-bottom:3px}
.day-card.done .day-lbl{color:#059669}
.day-theme{font-size:11px;color:#64748b;margin-bottom:8px;line-height:1.45;white-space:pre-line}
.day-score{font-size:12px;font-weight:700}
.day-btn{display:inline-block;margin-top:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s}
.day-btn:hover{opacity:.85}
.day-card.done .day-btn{background:linear-gradient(135deg,#059669,#10b981)}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-meta{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.tSE{background:#dbeafe;color:#1d4ed8}.tCA{background:#dcfce7;color:#166534}.tDB{background:#fee2e2;color:#b91c1c}.tDS{background:#fef3c7;color:#92400e}.tN{background:#f1f5f9;color:#475569}
.back-btn{margin-left:auto;background:#fff;border:1px solid #cbd5e1;color:#475569;padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:#4f46e5;color:#4f46e5}
.q-text{font-size:14px;line-height:1.85;color:#1e293b;margin-bottom:16px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;padding:11px 14px;text-align:left;cursor:pointer;color:#334155;font-size:13px;line-height:1.55;transition:all .18s;display:flex;align-items:flex-start;gap:9px}
.opt:hover:not(.dis){border-color:#4f46e5;background:#eef2ff;color:#1e293b}
.opt-lbl{font-weight:800;min-width:20px;color:#4f46e5}
.opt.ok{border-color:#10b981;background:#f0fdf4;color:#065f46}.opt.ok .opt-lbl{color:#10b981}
.opt.ng{border-color:#ef4444;background:#fef2f2;color:#991b1b}.opt.ng .opt-lbl{color:#ef4444}
.opt.rv{border-color:#10b981;background:#f0fdf4;color:#065f46;opacity:.6}.opt.dis{cursor:default}
.fb{margin-top:12px;padding:12px 14px;border-radius:9px;font-size:12px;line-height:1.7;display:none}
.fb.ok{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.fb.ng{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
.fb-t{font-weight:800;margin-bottom:3px}
.next-row{text-align:right;margin-top:10px}
.next-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:none;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.next-btn:hover{opacity:.88}
.result-card{background:#fff;border:2px solid #c7d2fe;border-radius:16px;padding:36px 24px;text-align:center;box-shadow:0 2px 12px rgba(79,70,229,.08)}
.r-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-denom{font-size:18px;color:#94a3b8}
.r-pct{font-size:13px;color:#64748b;margin:5px 0 12px}
.r-grade{font-size:20px;font-weight:700;margin-bottom:5px;color:#1e293b}
.r-msg{font-size:13px;color:#64748b;margin-bottom:20px}
.r-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.r-btn{border:none;padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.r-btn:hover{opacity:.85}
.r-btn.primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.r-btn.secondary{background:#f1f5f9;border:1px solid #cbd5e1;color:#475569}
.footer{border-top:1px solid #e2e8f0;background:#fff;padding:16px 20px;text-align:center;margin-top:16px}
.footer-name{font-size:12px;color:#475569;margin-bottom:4px;font-weight:500}
.footer-copy{font-size:11px;color:#94a3b8}
</style>
</head>
<body>
<div class="hdr">
  <span class="logo">ZIP-UP</span>
  <div class="hdr-info"><span class="hdr-t" id="hdrT">5주차 주간모의고사</span><span class="hdr-sub">KPC 정보관리기술사 ZIP-UP 심화반</span></div>
  <div class="hdr-badge"><span class="hdr-year">2026</span><span class="hdr-tag">주간모의고사</span></div>
</div>
<div id="progWrap" class="prog-wrap" style="display:none">
  <div class="prog-info"><span id="progTxt"></span><span id="scoreTxt"></span></div>

</div>
<div class="con" id="app"></div>

<script>
const DAYS=[
/* ═══════════════ DAY 1 — 소프트웨어공학 집중 ═══════════════ */
{label:'DAY 1',theme:'소프트웨어공학\n핵심 개념',color:'#4f46e5',qs:[
{a:'SE',t:'ISO/IEC 25010',q:'ISO/IEC 25010의 8대 주특성에 해당하지 않는 것은?',o:['재사용성(Reusability)','이식성(Portability)','보안성(Security)','기능 적합성(Functional Suitability)'],ans:0,exp:'8대 주특성: <b>기능적합성, 성능효율성, 호환성, 사용성, 신뢰성, 보안성, 유지보수성, 이식성.</b> 재사용성은 별도 주특성이 아닙니다.'},
{a:'SE',t:'ISO/IEC 25010',q:'ISO/IEC 25010이 기존 9126 대비 독립 주특성으로 신설한 두 항목은?',o:['신뢰성과 유지보수성','호환성과 보안성','성능효율성과 기능적합성','사용성과 이식성'],ans:1,exp:'9126의 6개 주특성에서 <b>호환성(Compatibility)</b>과 <b>보안성(Security)</b>이 독립 분리되어 총 8대 주특성이 되었습니다.'},
{a:'SE',t:'McCabe 순환 복잡도',q:'제어 흐름 그래프에서 노드(N)=8, 간선(E)=11일 때 McCabe 순환 복잡도 V(G)는?',o:['5','7','3','19'],ans:0,exp:'<b>V(G) = E − N + 2 = 11 − 8 + 2 = 5.</b> V(G)=5는 적절한 복잡도이며 10을 넘으면 리팩토링이 권장됩니다.'},
{a:'SE',t:'상태 전이 테스트',q:'상태 전이 테스트의 핵심 구성 요소로 올바르게 묶인 것은?',o:['노드, 간선, 순환 복잡도','클래스, 객체, 메서드, 속성','입력값, 기대 출력, 동등 클래스','상태(State), 이벤트(Event), 전이(Transition), 액션(Action)'],ans:3,exp:'상태 전이 테스트는 <b>상태-이벤트-전이-액션</b>으로 모델링합니다. 상태 전이 다이어그램이나 상태 전이 테이블로 테스트 케이스를 도출합니다.'},
{a:'SE',t:'기술 부채',q:'기술 부채의 측정 지표인 TDR(Technical Debt Ratio)의 산출 방식으로 옳은 것은?',o:['기술 부채 해소 비용 ÷ 전체 재개발 비용 × 100','테스트 커버리지 ÷ 코드 복잡도 × 100','유지보수 인력 수 ÷ 개발 인력 수 × 100','코드 라인 수 ÷ 결함 수 × 100'],ans:0,exp:'<b>TDR = 부채 해소 비용(Remediation Cost) ÷ 재개발 비용(Development Cost) × 100.</b> SonarQube 등이 이 지표를 자동 산출합니다. 5% 이하가 양호한 수준입니다.'},
{a:'SE',t:'카오스 엔지니어링',q:'카오스 엔지니어링의 원칙으로 옳지 않은 것은?',o:['장애 주입은 반드시 개발 환경에서만 수행해야 한다','프로덕션 환경에서 실험하는 것을 권장한다','정상 상태(Steady State)에 대한 가설을 수립한다','폭발 반경(Blast Radius)을 최소화하여 점진적으로 확대한다'],ans:0,exp:'카오스 엔지니어링은 <b>프로덕션 환경에서 실험하는 것을 권장</b>합니다. 개발 환경만으로는 실제 운영 조건을 재현할 수 없기 때문입니다. 단, 폭발 반경을 최소화합니다.'},
{a:'SE',t:'감리 3단계',q:'정보시스템 감리 3단계를 올바른 순서로 나열한 것은?',o:['예비조사 → 시정조치 확인 → 현장감리','시정조치 확인 → 예비조사 → 현장감리','현장감리 → 예비조사 → 시정조치 확인','예비조사 → 현장감리 → 시정조치 확인'],ans:3,exp:'감리 3단계: <b>①예비조사</b>(문서 검토·계획 수립) → <b>②현장감리</b>(실제 점검·인터뷰·감리조서 작성) → <b>③시정조치 확인</b>(이행 여부 확인).'},
{a:'SE',t:'화이트박스 테스트',q:'화이트박스 테스트에 해당하는 것은?',o:['사용자 시나리오 기반 인수 테스트','탐색적 테스팅과 오류 추정','구문·분기·조건 커버리지 기반 테스트','동등 분할과 경계값 분석'],ans:2,exp:'화이트박스 테스트는 <b>소스 코드 내부 구조 기반</b>으로 구문·분기·조건 커버리지를 측정합니다. 나머지는 블랙박스(①④) 또는 인수 테스트(③)입니다.'},
{a:'SE',t:'SOLID 원칙',q:'SOLID 원칙 중 리스코프 치환 원칙(LSP)의 의미로 옳은 것은?',o:['클래스는 하나의 책임만 가져야 한다','인터페이스를 클라이언트별로 세분화해야 한다','확장에는 열려있고 수정에는 닫혀있어야 한다','상위 타입을 하위 타입으로 치환해도 프로그램의 정확성이 보장되어야 한다'],ans:3,exp:'<b>LSP(Liskov Substitution Principle)</b>: 부모 클래스 자리에 자식 클래스를 넣어도 프로그램이 정상 동작해야 합니다. 위반 시 다형성이 깨져 예기치 않은 오류가 발생합니다.'},
{a:'SE',t:'코드 인스펙션',q:'파간(Fagan) 코드 인스펙션에서 "사전교육(Overview)" 단계의 주요 활동은?',o:['발견된 결함 목록을 정리하고 수정 담당자를 배정한다','저자가 팀원에게 산출물의 구조와 목적을 설명한다','각 검토자가 독립적으로 산출물을 사전 검토한다','진행자가 일정과 참여자를 결정한다'],ans:1,exp:'<b>사전교육(Overview)</b>은 인스펙션 5단계 중 2번째로, 산출물 <b>저자가 팀원에게 배경·구조·목적을 설명</b>하여 효과적인 준비 단계를 돕습니다.'},
{a:'SE',t:'유지보수 4유형',q:"운영 중인 시스템의 OS 업그레이드에 대응하여 소프트웨어를 수정하는 유지보수 유형은?",o:['하자 보수(Corrective)','완전 보수(Perfective)','적응 보수(Adaptive)','예방 보수(Preventive)'],ans:2,exp:'<b>적응 보수(Adaptive)</b>는 OS, 하드웨어, 법·규제 등 <b>외부 환경 변화에 대응</b>하는 유지보수입니다. 하자=버그수정, 완전=기능개선, 예방=잠재결함제거.'},
{a:'SE',t:'레만의 진화 법칙',q:"레만(Lehman)의 '복잡도 증가(Increasing Complexity)' 법칙이 의미하는 것은?",o:['소프트웨어가 진화할수록 내부 구조가 단순해진다','변경이 반복되면 소프트웨어 복잡도가 계속 증가하므로 적극적 관리가 필요하다','복잡한 소프트웨어일수록 사용자 만족도가 높아진다','소프트웨어 규모와 복잡도는 항상 비례한다'],ans:1,exp:'레만의 제2법칙 <b>복잡도 증가</b>: 소프트웨어에 변경이 누적되면 구조적 복잡도가 지속적으로 증가합니다. 리팩토링 등 적극적 관리 없이는 유지보수가 점점 어려워집니다.'},
{a:'CA',t:'C-SCAN',q:'C-SCAN이 SCAN 대비 개선한 문제로 옳은 것은?',o:['한 방향 서비스 후 처음으로 복귀하여 응답 시간 편차를 균등화한다','디스크 캐시를 활용하여 실제 헤드 이동을 제거한다','기아 현상을 방지하여 모든 요청의 공정성을 보장한다','전체 탐색 시간을 줄여 처리량을 극대화한다'],ans:0,exp:'SCAN은 방향 전환 시 양 끝과 중간의 응답 시간 편차가 발생합니다. <b>C-SCAN</b>은 한 방향으로만 서비스하고 끝에서 처음으로 복귀하여 <b>균등한 대기 시간</b>을 제공합니다.'},
{a:'CA',t:'NUMA',q:'NUMA 아키텍처에서 성능 최적화를 위해 가장 중요한 원칙은?',o:['프로세스가 자신의 로컬 메모리에 데이터를 배치하도록 관리한다','모든 메모리를 원격 노드에 배치하여 부하를 분산한다','모든 프로세서가 동일한 메모리 뱅크를 공유한다','캐시를 비활성화하여 메모리 일관성을 보장한다'],ans:0,exp:'NUMA 최적화의 핵심은 <b>데이터 지역성(Data Locality)</b>입니다. 프로세스가 로컬 메모리에서 데이터를 접근하면 원격 접근 대비 지연이 크게 줄어듭니다.'},
{a:'CA',t:'HBM',q:'HBM4에서 도입된 하이브리드 본딩(Hybrid Bonding)의 장점으로 옳은 것은?',o:['전력 소비가 HBM3 대비 10배 증가하지만 대역폭도 10배 늘어난다','단일 다이만으로 충분한 대역폭을 제공하여 적층이 불필요해진다','기존 마이크로 범프 대비 접합 피치를 줄여 연결 밀도와 대역폭을 크게 높인다','TSV(관통 비아) 없이 무선으로 다이 간 통신이 가능하다'],ans:2,exp:'<b>하이브리드 본딩</b>은 구리(Cu) 패드를 직접 접합하여 마이크로 범프 대비 <b>접합 피치를 대폭 축소</b>합니다. 연결 밀도가 높아져 더 많은 신호선을 확보하고 대역폭이 향상됩니다.'},
{a:'DB',t:'B+Tree',q:'B+Tree에서 모든 실제 데이터가 저장되는 위치는?',o:['리프 노드에만 저장되고 내부 노드는 탐색 키만 갖는다','내부 노드에만 저장되고 리프는 포인터만 갖는다','루트 노드에만 저장된다','모든 노드(루트, 내부, 리프)에 분산 저장된다'],ans:0,exp:'B+Tree의 핵심 특성: <b>실제 데이터(레코드 포인터)는 리프 노드에만</b> 저장됩니다. 내부 노드는 탐색 경로(인덱스 키)만 보관하여 더 많은 키를 담을 수 있어 트리 높이가 낮아집니다.'},
{a:'DB',t:'ARIES',q:'ARIES 알고리즘의 3단계 순서로 옳은 것은?',o:['Redo → Undo → Analysis','Undo → Analysis → Redo','Analysis → Redo → Undo','Analysis → Undo → Redo'],ans:2,exp:'ARIES 3단계: <b>①Analysis</b>(로그 스캔으로 Redo/Undo 대상 파악) → <b>②Redo</b>(커밋된 변경 재수행) → <b>③Undo</b>(미완료 트랜잭션 롤백). "분석이 먼저"가 핵심입니다.'},
{a:'DB',t:'TSDB',q:'시계열 데이터베이스(TSDB)의 핵심 특징으로 옳지 않은 것은?',o:['오래된 데이터를 자동 다운샘플링하여 스토리지를 절약한다','복잡한 다중 테이블 조인과 OLTP 트랜잭션 처리에 최적화되어 있다','시간 기반 파티셔닝으로 특정 시간 범위 쿼리를 최적화한다','IoT 센서, 서버 모니터링, 금융 시세 등 시간 축 데이터에 특화되어 있다'],ans:1,exp:'TSDB는 <b>시간 축 데이터의 쓰기/조회에 특화</b>되어 있으며, 복잡한 조인이나 OLTP 트랜잭션 처리에는 적합하지 않습니다. 이 영역은 RDBMS의 역할입니다.'},
{a:'DS',t:'HDFS',q:'HDFS에서 네임노드(NameNode)의 역할로 옳은 것은?',o:['파일의 메타데이터(블록 위치, 디렉터리 구조)를 관리하는 마스터 서버이다','MapReduce 잡을 스케줄링하고 실행한다','실제 데이터 블록을 저장하고 읽기/쓰기 요청을 처리한다','데이터 블록 간 복제를 수행하는 워커 프로세스이다'],ans:0,exp:'<b>네임노드</b>는 HDFS의 마스터로 파일 이름, 블록 위치, 권한 등 <b>메타데이터를 메모리에 관리</b>합니다. 실제 데이터 블록은 데이터노드(DataNode)에 저장됩니다.'},
{a:'DS',t:'MEC',q:'MEC 표준화를 주도하는 국제 기관으로 옳은 것은?',o:['W3C','IETF','ETSI','IEEE'],ans:2,exp:'<b>ETSI MEC ISG</b>가 Multi-access Edge Computing 아키텍처, API, 레퍼런스 구현을 표준화합니다. 초기 "Mobile"에서 "Multi-access"로 범위를 확장했습니다.'}
]},

{label:'DAY 2',theme:'CA/OS · 데이터베이스\n핵심 개념',color:'#059669',qs:[
{a:'CA',t:'C-SCAN',q:'디스크 스케줄링에서 SSTF가 가진 문제점을 해결한 알고리즘은?',o:['SCAN — 양 끝을 오가며 처리하여 기아 현상 방지','FCFS — 도착 순서대로 처리하여 공정성 확보','LOOK — 요청이 있는 경우에만 한 방향으로 탐색한다','SSTF 자체에는 문제가 없으므로 개선 알고리즘이 불필요하다'],ans:0,exp:'SSTF는 가까운 요청만 우선 처리하여 먼 실린더에 <b>기아 현상</b>이 발생합니다. <b>SCAN</b>은 엘리베이터처럼 양 끝을 오가며 모든 요청을 처리하여 이 문제를 해결합니다.'},
{a:'CA',t:'NUMA',q:'NUMA 환경에서 원격 메모리 접근 시 성능 저하가 발생하는 이유는?',o:['원격 노드의 메모리가 항상 잠금(Lock) 상태이기 때문이다','원격 메모리는 항상 디스크에서 읽어와야 하기 때문이다','원격 노드의 CPU가 대신 연산을 수행해야 하기 때문이다','인터커넥트(QPI/UPI 등)를 경유해야 하므로 추가 지연이 발생하기 때문이다'],ans:3,exp:'NUMA에서 원격 접근은 <b>인터커넥트(QPI, UPI 등)</b>를 경유하며 추가 홉이 필요합니다. 로컬 메모리 접근 대비 2~3배 이상 지연이 발생할 수 있습니다.'},
{a:'CA',t:'HBM',q:'HBM이 GPU/AI 가속기 옆에 배치되는 패키징 방식의 명칭으로 옳은 것은?',o:['듀얼 인라인 메모리 모듈(DIMM)','2.5D 인터포저(Interposer) 기반 패키징','소켓 내장 방식(SoC)','PCIe 슬롯 직접 연결'],ans:1,exp:'HBM은 <b>실리콘 인터포저</b> 위에 GPU/AI 칩과 나란히 배치되는 <b>2.5D 패키징</b>을 사용합니다. 인터포저의 미세 배선으로 넓은 버스 폭(1024bit+)을 확보합니다.'},
{a:'CA',t:'FTL',q:'SSD FTL의 웨어 레벨링이 필요한 근본 원인으로 옳은 것은?',o:['NAND 플래시는 읽기 횟수에 제한이 있기 때문이다','NAND 플래시는 블록당 P/E 사이클 한계가 있어 특정 블록의 조기 마모를 방지하기 위해','SSD 컨트롤러의 발열을 균등 분산하기 위해','OS가 논리 주소를 순차적으로만 할당하기 때문이다'],ans:1,exp:'NAND 플래시 블록은 <b>P/E 사이클(약 3,000~10,000회)</b> 한계가 있습니다. 특정 블록에 쓰기가 집중되면 조기 마모되므로, 웨어 레벨링이 <b>모든 블록에 균등 분산</b>시킵니다.'},
{a:'CA',t:'RAID',q:'RAID 5에서 디스크 1개 고장 시 복구에 사용하는 연산은?',o:['XOR 연산으로 나머지 데이터와 패리티 계산','OR 연산으로 패리티에서 원본 추출','AND 연산으로 나머지 디스크 합산','해시 함수로 데이터 재생성'],ans:0,exp:'RAID 5 패리티는 <b>XOR 연산</b>으로 계산됩니다. A⊕B⊕C=P일 때 A가 고장나면 <b>A=B⊕C⊕P</b>로 복구합니다.'},
{a:'CA',t:'파일 할당',q:'연속 할당(Contiguous Allocation)의 장점과 단점으로 옳은 것은?',o:['순차/임의 접근 모두 불가능하지만 단편화가 없다','임의 접근이 빠르지만 외부 단편화가 발생한다','인덱스 블록 오버헤드가 크지만 대용량 파일에 유리하다','순차 접근만 가능하며 포인터 손상 위험이 있다'],ans:1,exp:'연속 할당은 파일이 연속 블록에 저장되어 <b>임의 접근(Direct Access)이 빠르지만</b>, 파일 삭제·생성 반복 시 <b>외부 단편화</b>가 발생합니다.'},
{a:'CA',t:'i-node',q:'유닉스 i-node에 저장되지 않는 정보는?',o:['파일 생성/수정 시간','파일 크기, 소유자, 권한','데이터 블록 포인터(직접·간접)','파일 이름'],ans:3,exp:'i-node에는 메타데이터(크기, 권한, 시간, 블록 포인터)가 저장되지만, <b>파일 이름은 디렉터리 엔트리</b>에 저장됩니다. 디렉터리는 (파일명, i-node번호) 쌍의 목록입니다.'},
{a:'DB',t:'B+Tree',q:'B+Tree가 범위 검색(Range Search)에 유리한 이유는?',o:['내부 노드에도 데이터가 중복 저장되어 있기 때문이다','해시 인덱스와 결합하여 범위를 한정하기 때문이다','리프 노드끼리 링크드 리스트로 연결되어 순차 탐색이 가능하기 때문이다','루트 노드에 모든 데이터의 범위가 요약되어 있기 때문이다'],ans:2,exp:'B+Tree의 <b>리프 노드는 링크드 리스트로 연결</b>됩니다. 시작점을 찾은 후 포인터를 따라 연속 데이터를 순차 스캔하므로 범위 검색에 최적입니다.'},
{a:'DB',t:'ARIES',q:'ARIES에서 WAL(Write-Ahead Logging) 원칙의 의미로 옳은 것은?',o:['로그를 먼저 디스크에 기록한 후 데이터를 변경한다','데이터를 먼저 디스크에 쓰고 그 다음 로그를 기록한다','로그는 메모리에만 유지하고 디스크에 기록하지 않는다','로그와 데이터를 동시에 디스크에 기록한다'],ans:0,exp:'<b>WAL(Write-Ahead Logging)</b>: 데이터 변경 전에 반드시 로그를 먼저 디스크에 기록합니다. 장애 발생 시 로그를 기반으로 Redo/Undo하여 데이터를 복구할 수 있습니다.'},
{a:'DB',t:'MVCC',q:'MVCC에서 수정 시 이전 버전을 보관하는 장소는?',o:['바이너리 로그','임시 테이블스페이스','Undo 영역(Undo Segment)','Redo 로그'],ans:2,exp:'MVCC는 변경 전 값을 <b>Undo 영역</b>에 보관합니다. 읽기 트랜잭션은 자신의 시작 시점에 맞는 버전을 Undo에서 조회하여 <b>락 없이 일관된 읽기</b>가 가능합니다.'},
{a:'DB',t:'격리 수준',q:"'Dirty Read'가 발생할 수 있는 유일한 격리 수준은?",o:['Read Uncommitted','Read Committed','Repeatable Read','Serializable'],ans:0,exp:'<b>Dirty Read</b>는 커밋되지 않은 데이터를 읽는 현상으로, 가장 낮은 <b>Read Uncommitted</b>에서만 발생합니다. Read Committed부터는 커밋된 데이터만 읽습니다.'},
{a:'DB',t:'조인 알고리즘',q:'중첩 루프 조인(NL Join)이 최적의 성능을 발휘하는 조건은?',o:['메모리에 해시 테이블을 올릴 수 있는 경우','두 테이블이 조인 키로 이미 정렬된 경우','드라이빙 테이블 결과가 적고 내부 테이블에 인덱스가 있는 경우','두 테이블 모두 대용량이고 인덱스가 없는 경우'],ans:2,exp:'NL 조인은 <b>외부(드라이빙) 결과가 적고 내부 테이블에 인덱스가 있을 때</b> 최고 성능입니다. 외부 루프 건수만큼 내부 인덱스를 탐색하는 구조입니다.'},
{a:'DB',t:'옵티마이저',q:'옵티마이저 힌트(Hint)의 설명으로 옳은 것은?',o:['DBMS가 자동 생성하는 실행 계획 최적화 규칙이다','인덱스를 자동으로 생성·관리하는 DBMS 기능이다','데이터 통계를 수집하는 백그라운드 프로세스이다','개발자가 SQL에 삽입하여 옵티마이저에 특정 실행 계획을 지시하는 주석이다'],ans:3,exp:'힌트는 SQL에 삽입하는 <b>주석 형태</b>(예: /*+ INDEX(...) */)로, CBO가 비효율적 실행 계획을 수립할 때 <b>개발자가 강제 보정</b>하는 수단입니다.'},
{a:'DB',t:'분산 투명성',q:'데이터의 물리적 저장 위치를 사용자가 몰라도 접근 가능한 투명성은?',o:['병행 투명성','위치 투명성(Location Transparency)','분할 투명성','중복 투명성'],ans:1,exp:'<b>위치 투명성</b>은 데이터가 어느 노드에 있는지 사용자에게 숨깁니다. 분할=분할사실 은닉, 중복=복제사실 은닉, 병행=동시접근 제어 은닉입니다.'},
{a:'DS',t:'Kafka',q:'Kafka에서 Producer와 Consumer의 관계로 옳은 것은?',o:['Producer가 Consumer에게 직접 메시지를 전달한다','Producer는 Topic에 발행하고, Consumer는 Topic을 구독하여 메시지를 가져간다','Consumer가 요청해야만 Producer가 메시지를 생성한다','Producer와 Consumer는 반드시 동일 서버에서 실행되어야 한다'],ans:1,exp:'Kafka는 <b>발행-구독(Pub/Sub) 모델</b>입니다. Producer는 Topic에 메시지를 발행하고, Consumer는 관심 Topic을 구독하여 메시지를 가져갑니다. 양측은 직접 통신하지 않습니다.'},
{a:'DS',t:'MEC',q:'MEC 활용이 가장 적합한 서비스로 묶인 것은?',o:['이메일, 대용량 파일 백업','딥러닝 모델 대규모 학습, 클라우드 렌더팜','야간 배치 처리, ETL 파이프라인','자율주행 실시간 제어, AR/VR, 원격 수술'],ans:3,exp:'MEC는 수 밀리초 이하의 <b>초저지연</b>이 필요한 서비스에 최적입니다. 자율주행, AR/VR, 원격 수술처럼 <b>지연이 사고로 직결</b>되는 영역이 핵심 적용 사례입니다.'},
{a:'DS',t:'온디바이스 AI',q:'양자화(Quantization)에서 FP32→INT8 변환 시 이론적 모델 크기 감소율은?',o:['8배','16배','4배','2배'],ans:2,exp:'FP32(32bit)→INT8(8bit)로 변환하면 파라미터당 메모리가 <b>32÷8=4배 감소</b>합니다. 정수 연산은 FPU 없이 ALU로 처리 가능해 추론 속도도 향상됩니다.'},
{a:'CA',t:'시스템 버스',q:'시스템 버스 3종류를 올바르게 나열한 것은?',o:['전송 버스, 위치 버스, 신호 버스','내부 버스, 외부 버스, 시스템 버스','입력 버스, 출력 버스, 제어 버스','데이터 버스, 주소 버스, 제어 버스'],ans:3,exp:'시스템 버스: <b>①데이터 버스</b>(양방향, 데이터 전송) <b>②주소 버스</b>(단방향, 메모리 위치 지정) <b>③제어 버스</b>(양방향, 읽기/쓰기 신호).'},
{a:'CA',t:'RAID',q:'RAID 6이 RAID 5보다 우수한 점으로 옳은 것은?',o:['동시에 2개 디스크 고장까지 복구할 수 있다','패리티 없이 순수 데이터만 저장하여 용량 효율이 높다','최소 디스크 수가 RAID 5보다 적다','읽기 속도가 2배 빠르다'],ans:0,exp:'RAID 6은 <b>두 개의 독립 패리티(P+Q)</b>를 저장하여 동시 2개 디스크 고장에도 복구 가능합니다. 최소 4개 디스크가 필요하며, RAID 5는 1개 고장까지만 복구합니다.'},
{a:'SE',t:'McCabe 순환 복잡도',q:'McCabe 순환 복잡도 V(G)가 10을 초과할 때 권장되는 조치는?',o:['해당 모듈을 삭제한다','더 많은 분기문을 추가하여 처리 범위를 넓힌다','모듈을 분할하여 복잡도를 낮추는 리팩토링을 수행한다','테스트를 생략하고 배포한다'],ans:2,exp:'V(G) > 10이면 <b>고위험 모듈</b>로 분류됩니다. 모듈을 더 작은 단위로 <b>분할(리팩토링)</b>하여 복잡도를 낮추고, 테스트 용이성을 높이는 것이 권장됩니다.'}
]},
/* ═══════════════ DAY 3 — 디지털서비스 심화 + 혼합 복습 ═══════════════ */
{label:'DAY 3',theme:'디지털서비스 심화\n+ 혼합 복습',color:'#d97706',qs:[
{a:'DS',t:'HDFS',q:'HDFS의 기본 블록 크기가 128MB로 큰 이유로 옳은 것은?',o:['Map 태스크 수를 최대화하기 위해','블록이 클수록 압축률이 높아지기 때문이다','네트워크 암호화 효율을 높이기 위해','네임노드의 메타데이터 부담을 줄이고 디스크 탐색 오버헤드를 최소화하기 위해'],ans:3,exp:'블록을 크게 하면 <b>네임노드가 관리할 메타데이터가 줄어들고</b>, 디스크 탐색(seek) 대비 전송 시간 비율이 높아져 <b>처리 효율이 향상</b>됩니다.'},
{a:'DS',t:'HDFS',q:'HDFS에서 데이터 블록의 기본 복제 계수(Replication Factor)는?',o:['1','5','2','3'],ans:3,exp:'HDFS 기본 복제 계수는 <b>3</b>입니다. 동일 블록을 3개 데이터노드에 분산 저장하여 노드 장애 시에도 데이터 가용성을 보장합니다.'},
{a:'DS',t:'Kafka',q:'Kafka에서 Topic을 여러 Partition으로 나누는 주된 이유는?',o:['메시지를 시간순으로 정렬하기 위해','메시지 중복을 방지하기 위해','병렬 처리를 통한 처리량 향상과 수평 확장을 위해','Consumer 수를 제한하기 위해'],ans:2,exp:'<b>Partition</b>은 Kafka의 병렬 처리 단위입니다. Consumer Group 내 Consumer들이 각 Partition을 담당하여 <b>전체 처리량이 향상</b>됩니다.'},
{a:'DS',t:'Kafka',q:'Kafka가 디스크 기반임에도 높은 처리 성능을 내는 핵심 이유는?',o:['메시지를 디스크에 순차 쓰기(Sequential I/O)로 append하기 때문이다','모든 데이터를 메모리에만 저장하기 때문이다','SSD 전용 파일 시스템을 사용하기 때문이다','각 메시지를 별도 파일에 저장하기 때문이다'],ans:0,exp:'Kafka는 로그 파일 끝에 <b>순차 append</b> 방식으로 기록합니다. 순차 I/O는 디스크 헤드 이동이 최소화되어 랜덤 I/O 대비 <b>수십~수백 배 빠른 성능</b>을 발휘합니다.'},
{a:'DS',t:'온디바이스 AI',q:'프루닝(Pruning)의 동작 방식으로 옳은 것은?',o:['여러 레이어를 하나로 합쳐 연산량을 줄인다','큰 교사 모델의 지식을 작은 학생 모델에 전달한다','영향이 적은 가중치나 뉴런 연결을 0으로 만들어 제거한다','가중치를 낮은 비트수로 변환한다'],ans:2,exp:'프루닝은 중요도가 낮은 <b>가중치를 0으로 만들어 연결을 제거</b>합니다. ①은 양자화, ③은 지식증류, ④는 레이어 융합입니다.'},
{a:'DS',t:'온디바이스 AI',q:'지식 증류(Knowledge Distillation)에서 교사 모델이 학생 모델에 전달하는 것은?',o:['학습 데이터를 필터링하여 전달한다','모델 아키텍처를 축소하여 전달한다','가중치 행렬 전체를 직접 복사한다','출력 확률 분포(소프트 레이블)를 학습 신호로 전달한다'],ans:3,exp:'지식 증류는 교사 모델의 <b>소프트 레이블(클래스 간 확률 분포)</b>을 학습 신호로 사용합니다. 단순 정답(하드 레이블) 대비 클래스 간 관계 정보가 풍부하여 학생 모델의 학습 효율이 높아집니다.'},
{a:'DS',t:'클라우드 네이티브',q:'CNCF가 제시하는 클라우드 네이티브 4대 핵심 기술 요소에 해당하지 않는 것은?',o:['서버리스(Serverless)','마이크로서비스 아키텍처(MSA)','컨테이너(Container)','DevOps'],ans:0,exp:'CNCF 4대 요소: <b>MSA, 컨테이너, CI/CD, DevOps.</b> 서버리스는 관련 기술이지만 4대 핵심 요소에는 포함되지 않습니다.'},
{a:'DS',t:'MSA',q:'컨테이너(Container)가 VM 대비 가벼운 이유로 옳은 것은?',o:['전용 하이퍼바이저를 내장하고 있기 때문이다','호스트 OS 커널을 공유하고 사용자 공간만 격리하기 때문이다','하드웨어를 완전 가상화하여 오버헤드가 없기 때문이다','메모리를 사용하지 않고 디스크에서 직접 실행되기 때문이다'],ans:1,exp:'컨테이너는 <b>호스트 OS 커널을 공유</b>하여 게스트 OS가 불필요합니다. 초 단위 기동(VM은 분 단위)이 가능하고 리소스 오버헤드가 매우 적습니다.'},
{a:'DS',t:'빅데이터 5V',q:"빅데이터 5V 중 'Veracity(진실성)'가 강조하는 것은?",o:['데이터 생성 속도','데이터의 신뢰성과 정확성','데이터 형태의 다양성','데이터에서 추출 가능한 비즈니스 가치'],ans:1,exp:'<b>Veracity</b>는 수집된 데이터의 품질과 정확성입니다. 노이즈, 불완전·편향된 데이터를 처리하여 <b>신뢰할 수 있는 분석 결과</b>를 도출하는 것이 핵심입니다.'},
{a:'SE',t:'SRE',q:"SRE에서 Error Budget의 정의로 옳은 것은?",o:['장애 시 고객에게 지급하는 보상금 예산','SLO 목표치와 100% 사이의 허용 가능한 장애 여유분','연간 발생 허용 버그의 최대 개수','장애 복구에 투입 가능한 인력 수'],ans:1,exp:'<b>Error Budget = 100% − SLO 목표치.</b> 예: SLO 99.9%이면 0.1%(월 약 43분). 소진 시 새 기능 배포를 중단하고 안정화에 집중합니다.'},
{a:'SE',t:'SRE',q:'SLI, SLO, SLA의 관계로 옳은 것은?',o:['SLI, SLO, SLA는 모두 동일한 개념의 다른 명칭이다','SLA 목표치 > SLO 목표치 > SLI 측정치','SLI가 측정 지표이고, SLO는 내부 목표, SLA는 외부 계약이다','SLA는 내부 목표이고 SLO가 외부 계약이다'],ans:2,exp:'<b>SLI</b>(Service Level Indicator)=실제 측정 지표, <b>SLO</b>(Objective)=내부 목표치, <b>SLA</b>(Agreement)=외부 고객과의 계약. SLO > SLA로 설정하여 여유분을 확보합니다.'},
{a:'SE',t:'카오스 엔지니어링',q:'Netflix의 카오스 엔지니어링 도구 명칭으로 옳은 것은?',o:['Bug Bear','Chaos Monkey','Crash Gorilla','Failure Panda'],ans:1,exp:'<b>Chaos Monkey</b>는 Netflix가 개발한 대표적 카오스 엔지니어링 도구로, 프로덕션 환경에서 무작위로 인스턴스를 종료시켜 시스템 복원력을 검증합니다.'},
{a:'CA',t:'파일 할당',q:'색인 할당(Indexed Allocation)에서 대용량 파일을 지원하는 방법은?',o:['다단계 인덱스(Multi-level Index) 또는 연결 인덱스를 사용한다','인덱스 블록 크기를 무제한으로 확장한다','파일마다 별도 파티션을 할당한다','연속 할당으로 전환한다'],ans:0,exp:'인덱스 블록 하나로 참조 가능한 블록 수에 한계가 있으므로, <b>다단계 인덱스</b>나 인덱스 블록 연결 방식으로 대용량 파일을 지원합니다.'},
{a:'CA',t:'i-node',q:'유닉스 i-node에서 대용량 파일을 참조하기 위한 구조는?',o:['파일 크기에 비례하여 i-node 수를 늘린다','연결 리스트로 다음 블록 주소를 현재 블록에 저장한다','직접 블록 포인터만으로 무제한 참조 가능','직접·단일간접·이중간접·삼중간접 포인터를 계층적으로 사용'],ans:3,exp:'i-node는 <b>직접 포인터(12개) + 단일·이중·삼중 간접 포인터</b>를 제공합니다. 소용량은 직접 포인터로 빠르게, 대용량도 간접 포인터로 효율적으로 참조합니다.'},
{a:'CA',t:'PIM',q:'PIM(Processing-In-Memory) 아키텍처의 목적으로 옳은 것은?',o:['GPU를 메모리로 대체하여 비용을 절감한다','CPU 클럭 속도를 높여 연산 성능을 극대화한다','메모리 내부에 연산 유닛을 배치하여 데이터 이동 병목(Memory Wall)을 해소한다','메모리 용량을 무제한으로 확장한다'],ans:2,exp:'PIM은 <b>메모리 근처 또는 내부에 연산 유닛</b>을 배치하여 CPU-메모리 간 데이터 이동을 최소화합니다. 폰 노이만 병목(Memory Wall)을 근본적으로 해결하는 아키텍처입니다.'},
{a:'DB',t:'MVCC',q:"MVCC의 스냅샷 격리에서 발생할 수 있는 'Write Skew' 현상은?",o:['두 트랜잭션이 같은 행을 수정하여 한쪽이 사라지는 현상','두 트랜잭션이 각각 다른 행을 읽고 서로 조건을 충족하는 변경을 하여 일관성이 깨지는 현상','커밋되지 않은 데이터를 읽는 현상','같은 쿼리 실행 시 새 행이 나타나는 현상'],ans:1,exp:'<b>Write Skew</b>: 두 트랜잭션이 서로 다른 행을 읽고 각자 조건에 맞게 변경하면 전체 제약 조건이 위반됩니다. <b>Serializable 격리</b>로만 완전 방지됩니다.'},
{a:'DB',t:'CAP 이론',q:'CAP 이론에서 네트워크 분할(Partition) 발생 시 시스템이 선택해야 하는 트레이드오프는?',o:['일관성(C)과 가용성(A) 중 하나를 포기해야 한다','가용성(A)과 분할 허용성(P)을 동시에 달성할 수 없다','C, A, P 세 가지를 모두 동시에 달성할 수 있다','일관성(C)과 분할 허용성(P) 중 하나를 선택한다'],ans:0,exp:'<b>CAP 이론</b>: 네트워크 분할(P) 발생 시 일관성(C)과 가용성(A)을 동시에 보장할 수 없어 하나를 <b>트레이드오프</b>해야 합니다. CP 시스템(일관성 우선), AP 시스템(가용성 우선)으로 구분됩니다.'},
{a:'DB',t:'ARIES',q:'ARIES Redo 단계에서 수행하는 작업으로 옳은 것은?',o:['커밋된 트랜잭션의 변경 사항을 재수행하여 디스크를 장애 시점으로 복원한다','미완료 트랜잭션의 변경을 취소한다','로그를 스캔하여 Redo/Undo 대상을 파악한다','체크포인트를 생성하여 로그를 절삭한다'],ans:0,exp:'Redo 단계는 <b>커밋된 모든 변경을 로그 순서대로 재수행</b>하여 데이터를 장애 직전 상태로 복원합니다. ①은 Undo 단계, ②는 Analysis 단계의 역할입니다.'},
{a:'DS',t:'MEC',q:'MEC와 중앙 클라우드를 비교한 설명으로 옳은 것은?',o:['MEC는 지연 시간이 짧은 반면 처리 규모는 중앙 클라우드 대비 제한적이다','MEC는 AI 대규모 학습에 최적화되어 있다','MEC가 중앙 클라우드보다 더 많은 컴퓨팅 파워를 보유한다','중앙 클라우드가 MEC보다 항상 낮은 지연 시간을 제공한다'],ans:0,exp:'MEC=<b>초저지연 실시간 처리</b>(자원 제한적), 중앙 클라우드=<b>대규모 배치 분석</b>(풍부한 자원). 두 아키텍처는 상호보완적으로 활용됩니다.'},
{a:'SE',t:'SRE',q:'SRE에서 SLO를 SLA보다 높게 설정하는 이유는?',o:['SLA 위반 시 법적 처벌을 피하기 위해','SLA 위반 패널티 전에 미리 대응할 수 있는 여유분(Error Budget)을 확보하기 위해','SLO가 낮으면 서비스를 제공할 수 없기 때문이다','SLA는 측정이 불가능하므로 SLO로 대체한다'],ans:1,exp:'SLO(내부 목표)를 SLA(외부 협약)보다 높게 설정하면 <b>SLA 위반 전에 대응할 여유분(Error Budget)</b>이 생깁니다. 예: SLO 99.95%, SLA 99.9%이면 0.05% 여유가 있습니다.'}
]},
/* ═══════════════ DAY 4 — 응용·심화 통합 ═══════════════ */
{label:'DAY 4',theme:'응용·심화\n통합 문제',color:'#dc2626',qs:[
{a:'SE',t:'ISO/IEC 25010',q:'ISO/IEC 25010에서 "호환성(Compatibility)" 주특성의 부특성으로 옳은 것은?',o:['가용성(Availability)과 내결함성(Fault Tolerance)','공존성(Co-existence)과 상호운용성(Interoperability)','적합성 인식(Appropriateness Recognizability)과 학습성(Learnability)','시간 효율성(Time Behaviour)과 자원 활용성(Resource Utilization)'],ans:1,exp:'호환성의 부특성: <b>공존성</b>(다른 소프트웨어와 자원을 공유하며 정상 동작)과 <b>상호운용성</b>(다른 시스템과 정보를 교환하며 동작). ①은 신뢰성, ③은 사용성, ④는 성능효율성입니다.'},
{a:'SE',t:'기술 부채',q:'기술 부채 해소를 위한 3R 전략에 해당하지 않는 것은?',o:['역공학(Reverse Engineering)','재구매(Repurchase)','재사용(Reuse)','재공학(Re-engineering)'],ans:1,exp:'레거시 기술 부채 해소를 위한 <b>3R: 역공학(Reverse), 재공학(Re-engineering), 재사용(Reuse).</b> 재구매는 3R에 포함되지 않습니다.'},
{a:'SE',t:'상태 전이 테스트',q:'상태 전이 테스트에서 N-스위치 커버리지(N-switch Coverage)의 의미로 옳은 것은?',o:['N개 상태만 선택적으로 테스트하는 기준이다','N번 연속 전이되는 경로를 모두 커버하는 테스트 기준이다','N개의 스위치를 물리적으로 테스트하는 것이다','스위치 하드웨어의 처리 속도를 측정하는 기준이다'],ans:1,exp:'<b>N-스위치 커버리지</b>: 0-스위치는 각 전이를 한 번씩, 1-스위치는 두 전이 연속 경로를 모두 커버합니다. N이 높을수록 테스트 강도가 증가합니다.'},
{a:'SE',t:'감리 + PMO',q:'정보시스템 감리와 PMO(Project Management Office)의 차이로 옳은 것은?',o:['감리는 상시, PMO는 특정 시점에만 수행한다','감리와 PMO는 동일한 역할이다','감리는 제3자 독립 관점의 점검, PMO는 발주자 대리 관점의 프로젝트 관리이다','PMO가 감리보다 법적 권한이 항상 높다'],ans:2,exp:'<b>감리</b>=독립적 제3자가 사업의 적정성을 점검, <b>PMO</b>=발주자를 대리하여 프로젝트 관리 역량을 보완. 감리는 검증(Verification), PMO는 관리(Management) 역할입니다.'},
{a:'SE',t:'화이트박스 테스트',q:'DO-178C DAL A 등급에서 요구하는 커버리지 기준은?',o:['구문 커버리지','분기 커버리지','경로 커버리지','MC/DC(Modified Condition/Decision Coverage)'],ans:3,exp:'DO-178C DAL A는 <b>MC/DC</b>를 요구합니다. 각 조건이 독립적으로 결과에 영향을 미치는지 확인하며, 분기 커버리지보다 강하고 경로 커버리지보다 실용적입니다.'},
{a:'CA',t:'FTL',q:'FTL의 논리-물리 주소 매핑이 필요한 근본 원인은?',o:['NAND는 덮어쓰기가 불가능하여 실제 쓰기 위치가 수시로 변경되므로 OS에 일관된 주소를 제공하기 위해','HDD와 동일한 주소 체계를 사용하기 위해','캐시와 디스크 간 주소를 통일하기 위해','SSD에 논리적 섹터 개념이 없기 때문이다'],ans:0,exp:'NAND는 <b>덮어쓰기 불가</b> 특성으로 데이터 위치가 수시로 변합니다. FTL이 <b>LBA→PBA 매핑</b>을 관리하여 OS는 HDD처럼 일관되게 SSD를 사용합니다.'},
{a:'CA',t:'RAID',q:"RAID 5의 'Write Penalty' 원인으로 옳은 것은?",o:['미러링을 위해 동일 데이터를 두 번 쓰기 때문이다','데이터 변경 시 기존 데이터와 기존 패리티를 추가로 읽어 패리티를 재계산해야 하기 때문이다','쓰기 전 디스크 전체를 초기화해야 하기 때문이다','순차적으로만 쓰기가 가능하기 때문이다'],ans:1,exp:'RAID 5 Write Penalty: 1번 쓰기에 <b>4번 I/O</b>(기존 데이터 읽기 + 기존 패리티 읽기 + 새 데이터 쓰기 + 새 패리티 쓰기)가 발생합니다.'},
{a:'CA',t:'HBM + 메모리 월',q:"'메모리 월(Memory Wall)' 문제의 핵심 원인으로 옳은 것은?",o:['메모리 용량이 부족하여 스왑이 발생하는 것이다','CPU 연산 속도와 메모리 대역폭 간의 격차가 지속적으로 확대되는 것이다','메모리 가격이 높아 대용량 장착이 어려운 것이다','메모리 셀의 물리적 수명이 짧은 것이다'],ans:1,exp:'<b>메모리 월</b>은 CPU 성능은 매년 급증하지만 메모리 대역폭은 그에 미치지 못해 <b>데이터 전송이 병목</b>이 되는 현상입니다. HBM, PIM 등이 이를 해결하려는 기술입니다.'},
{a:'CA',t:'파일 할당',q:'연결 할당(Linked Allocation)의 단점으로 옳은 것은?',o:['임의 접근이 어렵고 포인터 손상 시 데이터 유실 위험이 있다','파일 크기 변경이 불가능하다','외부 단편화가 심하다','인덱스 블록 관리 오버헤드가 크다'],ans:0,exp:'연결 할당은 <b>순차 접근만 가능</b>하며, 중간 포인터 손상 시 이후 블록 전체에 접근 불가능합니다. FAT(File Allocation Table)이 이 단점을 보완합니다.'},
{a:'DB',t:'B+Tree',q:'B+Tree에서 노드가 꽉 찬 상태에서 새 키를 삽입할 때 발생하는 현상은?',o:['삽입이 실패하고 오류를 반환한다','해당 노드를 분열(Split)하고 중간 키를 부모로 올린다','전체 트리를 재구성한다','리프 노드의 링크만 갱신한다'],ans:1,exp:'B+Tree는 <b>노드 분열(Split)</b>로 균형을 유지합니다. 꽉 찬 노드에 삽입하면 두 노드로 분열되고 중간 키가 부모로 올라갑니다. 트리 높이는 O(log N)으로 유지됩니다.'},
{a:'DB',t:'격리 수준',q:"'Phantom Read'를 완전히 방지하는 최소 격리 수준은?",o:['Read Committed','Repeatable Read','Serializable','Read Uncommitted'],ans:2,exp:'<b>Phantom Read</b>는 같은 범위 쿼리 실행 시 새 행이 나타나는 현상입니다. 표준 SQL 기준으로 <b>Serializable</b>에서만 완전 방지됩니다.'},
{a:'DB',t:'조인 알고리즘',q:'해시 조인(Hash Join)의 2단계를 올바르게 나열한 것은?',o:['Build Phase → Probe Phase','Scan Phase → Filter Phase','Index Phase → Lookup Phase','Sort Phase → Merge Phase'],ans:0,exp:'해시 조인: <b>①Build Phase</b>(작은 테이블을 해시 테이블로 메모리에 적재) → <b>②Probe Phase</b>(큰 테이블을 순차 스캔하며 해시 테이블에서 매칭 탐색).'},
{a:'DB',t:'옵티마이저',q:'옵티마이저 힌트 사용 시 가장 주의해야 할 부작용은?',o:['트랜잭션 격리 수준이 자동 변경된다','데이터 분포 변경 시 힌트가 오히려 성능을 저하시킬 수 있다','힌트는 DDL에서만 사용 가능하다','SQL 문법 오류가 발생할 수 있다'],ans:1,exp:'힌트는 특정 시점 데이터 분포 기준으로 작성됩니다. <b>대량 변경 후 통계가 갱신되면 힌트가 비효율적</b>일 수 있어 정기적 재검토가 필요합니다.'},
{a:'DB',t:'분산 투명성',q:'분산 DB의 이기종 DBMS 차이를 숨겨 통일된 접근을 가능하게 하는 투명성은?',o:['위치 투명성','중복 투명성','지역사상 투명성(Local Mapping Transparency)','분할 투명성'],ans:2,exp:'<b>지역사상 투명성</b>은 각 노드의 이기종 DBMS(Oracle, MySQL 등)나 스키마 차이를 숨겨 사용자가 단일 DBMS처럼 접근할 수 있게 합니다.'},
{a:'DS',t:'Kafka',q:'Kafka Consumer Group에 대한 설명으로 옳은 것은?',o:['같은 그룹 내 모든 Consumer가 동일 메시지를 중복 수신한다','Consumer Group 수는 Partition 수보다 반드시 많아야 한다','같은 그룹 내에서 각 Partition은 하나의 Consumer에게만 할당된다','Consumer Group은 Kafka 3.0 이후 폐지되었다'],ans:2,exp:'<b>Consumer Group</b>은 수평 확장 메커니즘입니다. 그룹 내 각 Consumer는 고유 Partition을 담당하여 메시지 <b>중복 없이 병렬 처리</b>합니다.'},
{a:'DS',t:'온디바이스 AI',q:'구조적 프루닝(Structured Pruning)이 비구조적 프루닝보다 GPU 가속 효과가 좋은 이유는?',o:['랜덤하게 가중치를 제거하기 때문이다','뉴런/필터 단위로 제거하여 실제 행렬 크기가 줄어들므로','GPU는 0 값만 연산하도록 특화되어 있어서','그래디언트가 0인 파라미터를 제거하기 때문이다'],ans:1,exp:'<b>구조적 프루닝</b>은 뉴런·채널·레이어 전체를 제거하여 행렬 차원 자체가 줄어듭니다. 비구조적 프루닝은 희소 행렬을 생성하므로 일반 GPU에서 속도 향상이 제한적입니다.'},
{a:'DS',t:'클라우드 네이티브',q:'Continuous Delivery와 Continuous Deployment의 차이로 옳은 것은?',o:['CI와 CD는 반드시 별개 도구를 사용해야 한다','Deployment는 수동 배포, Delivery는 자동 배포이다','두 개념은 완전히 동일하다','Delivery는 릴리즈 준비 자동화까지, Deployment는 프로덕션 배포까지 자동화한다'],ans:3,exp:'<b>Continuous Delivery</b>=배포 가능 상태 유지(실제 배포는 수동 승인), <b>Continuous Deployment</b>=승인 없이 프로덕션까지 자동 배포. Deployment가 더 높은 자동화 수준입니다.'},
{a:'SE',t:'결함 생명주기',q:"결함 생명주기에서 'Deferred(이연)' 상태의 의미는?",o:['결함이 수정되어 재테스트를 기다리는 상태','결함은 인정하지만 현재 릴리즈에서 수정하지 않고 다음 버전으로 미루기로 한 상태','중복 결함으로 판정된 상태','결함 리포트 자체가 취소된 상태'],ans:1,exp:'<b>Deferred</b>: 결함은 인정하지만 우선순위·일정·비용 이유로 현재 릴리즈에서 수정하지 않고 <b>향후 버전으로 이연</b>합니다. Rejected(결함 아님)와는 다릅니다.'},
{a:'SE',t:'McCabe 순환 복잡도',q:"McCabe 순환 복잡도의 소스 코드 레벨 계산법은?",o:['코드 줄 수(LOC) ÷ 10','분기문(if, while, for, case 등) 수 + 1','함수 호출 깊이의 최대값','클래스 간 결합도의 합'],ans:1,exp:'소스 코드에서 V(G) = <b>분기문 수(if, while, for, case, &&, || 등) + 1</b>로도 계산할 수 있습니다. 그래프 수식 E−N+2와 동일한 결과를 줍니다.'},
{a:'DS',t:'MSA',q:'쿠버네티스(Kubernetes)의 핵심 역할로 옳은 것은?',o:['단일 컨테이너 이미지를 빌드하는 도구이다','대규모 컨테이너의 배포, 스케일링, 관리를 자동화하는 오케스트레이션 플랫폼이다','서버리스 함수를 실행하는 FaaS 플랫폼이다','가상 머신을 생성·관리하는 하이퍼바이저이다'],ans:1,exp:'<b>쿠버네티스(K8s)</b>는 컨테이너의 <b>자동 배포, 수평 스케일링, 셀프 힐링, 로드 밸런싱</b>을 관리하는 오케스트레이션 플랫폼입니다. Docker가 빌드, K8s가 운영을 담당합니다.'}
]},

{label:'DAY 5',theme:'종합 복습\n최종 마무리',color:'#7c3aed',qs:[

{a:'DS',t:'MSA',q:'MSA 환경에서 분산 트랜잭션 일관성을 보장하는 Saga 패턴의 동작 방식은?',o:['2PC(2-Phase Commit)와 동일하게 전역 트랜잭션 매니저가 조율한다','분산 락을 걸어 모든 서비스의 일관성을 보장한다','모든 서비스가 동시에 커밋 또는 롤백한다','각 서비스의 로컬 트랜잭션을 순차 실행하고, 실패 시 보상 트랜잭션(Compensating Transaction)으로 롤백한다'],ans:3,exp:'<b>Saga 패턴</b>은 로컬 트랜잭션 체인으로 구성됩니다. 중간 단계 실패 시 이전 완료 트랜잭션을 <b>보상 트랜잭션</b>으로 논리적 롤백합니다. MSA에서 2PC의 대안입니다.'},

let dayScores={};let curDay=-1,curQ=-1,score=0,answered=false;
function atag(a){const m={SE:'tSE',CA:'tCA',DB:'tDB',DS:'tDS'},l={SE:'소프트웨어공학',CA:'CA/OS',DB:'데이터베이스',DS:'디지털서비스'};return`<span class="tag ${m[a]||'tSE'}">${l[a]||a}</span>`;}
async function loadScores(){try{for(let i=0;i<5;i++){const r=await window.storage.get('quiz5m_day'+(i+1));if(r)dayScores[i]=JSON.parse(r.value);}}catch(e){}renderHome();}
async function saveScore(idx,sc){dayScores[idx]={score:sc,total:20};try{await window.storage.set('quiz5m_day'+(idx+1),JSON.stringify(dayScores[idx]));}catch(e){}}
function renderHome(){document.getElementById('hdrT').textContent='5주차 주간모의고사';document.getElementById('progWrap').style.display='none';
const app=document.getElementById('app');app.innerHTML=`<div class="home-title">5주차 주간모의고사</div>
<div class="home-sub">소프트웨어공학 · CA/OS · 데이터베이스 · 디지털서비스 | 각 20문항 · 4지선다 · 즉시 정답 확인</div>
<div class="day-grid">${DAYS.map((d,i)=>{const ds=dayScores[i];const done=!!ds;const pct=done?Math.round(ds.score/20*100):null;
return`<div class="day-card${done?' done':''}" onclick="startDay(${i})"><div class="day-lbl">${d.label}</div><div class="day-theme">${d.theme}</div>${done?`<div class="day-score" style="color:#059669">${ds.score}/20 (${pct}%)</div>`:'<div class="day-score" style="color:#94a3b8">미완료</div>'}<button class="day-btn">${done?'다시 풀기':'시작하기'}</button></div>`;}).join('')}</div>`;}
function startDay(idx){curDay=idx;curQ=0;score=0;answered=false;document.getElementById('hdrT').textContent=DAYS[idx].label;renderQ();}
function renderQ(){const pw=document.getElementById('progWrap');pw.style.display='block';document.getElementById('progTxt').textContent=`${curQ+1} / 20`;document.getElementById('scoreTxt').textContent=`점수: ${score}`;document.getElementById('progFill').style.width=`${((curQ+1)/20)*100}%`;
const q=DAYS[curDay].qs[curQ];document.getElementById('app').innerHTML=`<div class="q-card"><div class="q-meta">${atag(q.a)}<span class="tag tN">Q${curQ+1}</span><span class="tag tN">${q.t}</span><button class="back-btn" onclick="renderHome()">← 목록</button></div><div class="q-text">${q.q}</div><div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" id="o${i}" onclick="choose(${i})"><span class="opt-lbl">${['①','②','③','④'][i]}</span><span>${o}</span></button>`).join('')}</div><div class="fb" id="fb"></div></div><div class="next-row"><button class="next-btn" id="nxt" onclick="nextQ()">${curQ+1<20?'다음 문제 →':'결과 보기 →'}</button></div>`;answered=false;}
function choose(idx){if(answered)return;answered=true;const q=DAYS[curDay].qs[curQ];for(let i=0;i<4;i++){const b=document.getElementById('o'+i);b.classList.add('dis');if(i===q.ans)b.classList.add(idx===q.ans?'ok':'rv');}
const fb=document.getElementById('fb');if(idx===q.ans){score++;document.getElementById('o'+idx).classList.add('ok');fb.className='fb ok';fb.innerHTML=`<div class="fb-t">✅ 정답!</div>${q.exp}`;}else{document.getElementById('o'+idx).classList.add('ng');fb.className='fb ng';fb.innerHTML=`<div class="fb-t">❌ 오답 — 정답: ${'①②③④'[q.ans]}</div>${q.exp}`;}
fb.style.display='block';document.getElementById('nxt').style.display='inline-block';document.getElementById('scoreTxt').textContent=`점수: ${score}`;}
function nextQ(){curQ++;if(curQ>=20){showResult();}else{renderQ();}}
function showResult(){saveScore(curDay,score);document.getElementById('progWrap').style.display='none';const pct=Math.round(score/20*100);
const grade=pct>=90?'🏆 최우수':pct>=75?'🥇 우수':pct>=60?'🥈 보통':'🥉 분발 필요';
const msg=pct>=90?'완벽에 가까운 이해도입니다!':pct>=75?'핵심 개념을 잘 파악하고 있습니다.':pct>=60?'부족한 영역을 교재로 복습해보세요.':'개념 정리가 더 필요합니다. 다시 도전!';
document.getElementById('app').innerHTML=`<div class="result-card"><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">${DAYS[curDay].label} 결과</div><div><span class="r-score">${score}</span><span class="r-denom"> / 20</span></div><div class="r-pct">정답률 ${pct}%</div><div class="r-grade">${grade}</div><div class="r-msg">${msg}</div><div class="r-btns"><button class="r-btn primary" onclick="startDay(${curDay})">다시 풀기</button><button class="r-btn secondary" onclick="renderHome()">목록으로</button>${curDay<4?`<button class="r-btn primary" onclick="startDay(${curDay+1})">다음 날 →</button>`:''}</div></div>`;}
if(typeof window.storage!=='undefined'){loadScores();}else{renderHome();}
</script>
</body>
