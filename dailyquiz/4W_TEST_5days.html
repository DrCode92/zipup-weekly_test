{topic:`망분리 (물리적 망분리와 논리적 망분리)`,domain:`SC`,keywords:[`물리적 망분리: 내부망·외부망 각각 별도의 PC, 네트워크 장비를 구축 — 완전한 물리적 분리`,`논리적 망분리: 하나의 물리적 인프라에서 가상화 기술로 망을 분리`,`논리적 망분리 방식: VDI(Virtual Desktop Infrastructure) — 서버에서 가상 데스크톱 제공`,`논리적 망분리 방식: SBC(Server-Based Computing) — 서버에서 애플리케이션 실행, 화면만 전송`,`물리적 망분리 장점: 보안 강도 최상 / 단점: 높은 구축·운영 비용, 업무 불편`,`논리적 망분리 장점: 비용 절감, 유연성 / 단점: 가상화 취약점, 하이퍼바이저 해킹 위험`],blanks:[{s:`물리적 망분리는 내부망·외부망 각각 {{별도의 PC, 네트워크 장비}}를 구축하는 방식이다.`},{s:`논리적 망분리의 두 방식: {{VDI(Virtual Desktop Infrastructure)}}와 {{SBC(Server-Based Computing)}}.`},{s:`물리적 망분리의 장점은 {{보안 강도 최상}}이고, 단점은 {{높은 구축·운영 비용}}이다.`},{s:`논리적 망분리의 위험: {{가상화 취약점}}과 {{하이퍼바이저 해킹}} 위험이 존재한다.`}]},
{topic:`침해사고 대응 7단계 절차`,domain:`SC`,keywords:[`침해사고: 해킹, 악성코드 감염, DDoS 등으로 정보 시스템의 기밀성·무결성·가용성이 침해된 사건`,`7단계: ①사전 준비 → ②탐지/식별 → ③초기 대응 → ④대응 전략 수립 → ⑤조사/분석 → ⑥복구/해결 → ⑦사후 보고/완료`,`①사전 준비: 대응 팀(CERT/CSIRT) 구성, 대응 절차 매뉴얼, 도구·장비 확보`,`②탐지/식별: IDS/IPS, SIEM, 로그 분석으로 이상 징후 탐지 및 사고 유형 식별`,`③초기 대응: 피해 확산 방지를 위한 네트워크 격리, 증거 보전(포렌식 이미징)`,`④대응 전략 수립: 사고 범위·영향도 평가, 법적 조치 필요 여부 판단`],blanks:[{s:`침해사고 대응 7단계: ①{{사전 준비}} → ②{{탐지/식별}} → ③{{초기 대응}} → ④{{대응 전략 수립}} → ⑤{{조사/분석}} → ⑥{{복구/해결}} → ⑦{{사후 보고/완료}}.`},{s:`②탐지/식별 단계에서 {{IDS/IPS}}, {{SIEM}}, 로그 분석으로 이상 징후를 탐지한다.`},{s:`③초기 대응 단계의 핵심: {{네트워크 격리}}와 {{증거 보전(포렌식 이미징)}}.`},{s:`⑤조사/분석 단계에서 {{디지털 포렌식}}으로 공격 경로와 원인을 규명한다.`}]},
{topic:`BGP (Border Gateway Protocol)`,domain:`NW`,keywords:[`경로 벡터(Path Vector) 방식: AS 경유 경로 전체를 교환하여 루핑(Looping) 방지`,`BGP 특성: 정책 기반 라우팅 — ISP 간 비즈니스 관계(고객/제공자/피어)에 따른 경로 선택`,`BGP 메시지: OPEN, UPDATE, KEEPALIVE, NOTIFICATION`,`AS-PATH 속성: 경유하는 AS 번호를 순서대로 기록 — 경로 선택과 루프 탐지에 활용`,`eBGP(External BGP): 서로 다른 AS 간 라우팅, iBGP(Internal BGP): 같은 AS 내부 라우팅`,`BGP Hijacking: 잘못된 경로 정보를 주입하여 트래픽을 가로채는 공격`],blanks:[{s:`BGP는 {{자율 시스템(AS)}} 간 라우팅을 수행하는 {{외부 게이트웨이 프로토콜(EGP)}}이다.`},{s:`BGP는 {{경로 벡터(Path Vector)}} 방식으로 AS 경유 경로 전체를 교환하여 {{루핑}}을 방지한다.`},{s:`BGP 4가지 메시지: {{OPEN}}, {{UPDATE}}, {{KEEPALIVE}}, {{NOTIFICATION}}.`},{s:`{{AS-PATH}} 속성은 경유하는 AS 번호를 순서대로 기록하여 경로 선택과 루프 탐지에 활용된다.`}]},
{topic:`IPSec VPN 아키텍처`,domain:`NW`,keywords:[`3대 핵심 프로토콜: AH(Authentication Header), ESP(Encapsulating Security Payload), IKE(Internet Key Exchange)`,`AH: 인증·무결성 보장 (암호화 없음)`,`ESP: 인증·무결성 + 기밀성(암호화) 보장 — 실무에서 가장 많이 사용`,`IKE(Internet Key Exchange): SA(Security Association) 설정을 위한 자동 키 교환 프로토콜`,`전송 모드(Transport Mode): IP 페이로드만 암호화 — 호스트 간 통신`,`터널 모드(Tunnel Mode): IP 헤더를 포함한 전체 패킷 암호화 + 새 IP 헤더 추가 — VPN 게이트웨이 간 통신`],blanks:[{s:`IPSec의 3대 프로토콜: {{AH(Authentication Header)}}, {{ESP(Encapsulating Security Payload)}}, {{IKE(Internet Key Exchange)}}.`},{s:`AH는 {{인증·무결성}}만 보장하고, ESP는 추가로 {{기밀성(암호화)}}을 제공한다.`},{s:`전송 모드는 {{IP 페이로드만}} 암호화하고, 터널 모드는 {{전체 패킷}}을 암호화한다.`},{s:`{{SA(Security Association)}}는 보안 파라미터를 합의하는 {{단방향}} 논리적 연결이다.`}]},
{topic:`Wi-Fi 7과 MLO (Multi-Link Operation)`,domain:`NW`,keywords:[`MLO(Multi-Link Operation): 2.4GHz, 5GHz, 6GHz 대역을 동시에 묶어 사용하는 핵심 기술`,`MLO 장점: 대역폭 증가, 지연 감소(Low Latency), 링크 장애 시 자동 페일오버`,`4K-QAM(4096-QAM): 한 심볼에 12비트 전송 → Wi-Fi 6의 1024-QAM(10비트) 대비 20% 처리량 증가`,`320MHz 채널 폭: Wi-Fi 6E(160MHz)의 2배 — 최대 46Gbps 이론 속도`,`CMU-MIMO: 좌표 다중 사용자 MIMO — 더 많은 사용자 동시 접속 지원`,`적용 사례: AR/VR 스트리밍, 클라우드 게이밍, 산업용 IoT 초저지연 통신`],blanks:[{s:`Wi-Fi 7의 표준명은 {{IEEE 802.11be}}이며, {{EHT(Extremely High Throughput)}}로 불린다.`},{s:`MLO({{Multi-Link Operation}})는 {{2.4GHz}}, {{5GHz}}, {{6GHz}} 대역을 동시에 묶어 사용한다.`},{s:`Wi-Fi 7은 {{4K-QAM(4096-QAM)}}으로 한 심볼에 {{12비트}}를 전송한다.`},{s:`Wi-Fi 7의 최대 채널 폭은 {{320MHz}}로, Wi-Fi 6E({{160MHz}})의 2배이다.`}]},
{topic:`네트워크 계층별 암호화 (IPsec, TLS)`,domain:`NW`,keywords:[`L3(네트워크 계층) — IPsec: IP 패킷 단위 인증·암호화, VPN 구현의 핵심`,`L4(전송 계층) — TLS(Transport Layer Security): 세션 기반 암호화, HTTPS의 기반`,`L7(응용 계층) — HTTPS, SSH, S/MIME 등 애플리케이션별 보안 프로토콜`,`TLS 1.3의 개선: 불필요한 암호 스위트 제거, 1-RTT 핸드셰이크(기존 2-RTT), 0-RTT 재개(Resumption)`,`TLS 핸드셰이크: 클라이언트 Hello → 서버 Hello → 인증서 교환 → 키 교환 → 암호화 통신`,`TLS 1.3에서 제거된 것: RSA 키 교환(전방향 비밀성 미보장), SHA-1, RC4, CBC 모드 등`],blanks:[{s:`L3 암호화: {{IPsec}} — IP 패킷 단위 인증·암호화.`},{s:`L4 암호화: {{TLS(Transport Layer Security)}} — 세션 기반 암호화, {{HTTPS}}의 기반.`},{s:`TLS 1.3의 핸드셰이크 개선: 기존 {{2-RTT}}에서 {{1-RTT}}로 단축.`},{s:`TLS 1.3에서는 {{RSA 키 교환}}이 제거되고 {{ECDHE}}만 허용하여 {{PFS(전방향 비밀성)}}를 보장한다.`}]},
{topic:`디지털 제품 여권(DPP)과 글로벌 규제 대응`,domain:`MG`,keywords:[`공급망 규제 강화 배경: ESG 정보 공시 의무화, CBAM(탄소국경조정메커니즘), 공급망 실사법`,`DPP 구현 아키텍처: 블록체인 분산원장 + IoT 센서 + 클라우드 데이터 레이크`,`블록체인 활용: 제조·물류·유통 과정의 데이터 위변조 방지, 스마트 계약으로 자동 검증`,`국내 기업 대응: 제조 데이터 디지털 전환, 탄소 발자국 측정 시스템 구축, GS1 표준 준수`,`CBAM(Carbon Border Adjustment Mechanism): EU가 수입품에 부과하는 탄소국경세`,`탄소발자국(Carbon Footprint): 제품 생산·유통·사용·폐기 전 과정의 온실가스 배출량`],blanks:[{s:`공급망 규제 강화 배경: {{ESG 정보 공시 의무화}}, {{CBAM}}, {{공급망 실사법}}.`},{s:`DPP 구현 아키텍처: {{블록체인 분산원장}} + {{IoT 센서}} + {{클라우드 데이터 레이크}}.`},{s:`CBAM({{Carbon Border Adjustment Mechanism}})은 EU가 수입품에 부과하는 {{탄소국경세}}이다.`},{s:`블록체인은 제조·물류 과정의 {{데이터 위변조}}를 방지하고, {{스마트 계약}}으로 자동 검증한다.`}]},
{topic:`IT 투자 타당성 분석 (ROI, NPV, IRR)`,domain:`MG`,keywords:[`ROI(Return on Investment, 투자 수익률) = (순이익 ÷ 투자비용) × 100`,`ROI 장점: 직관적이고 이해 쉬움 / 단점: 화폐의 시간가치 미반영, 투자 기간 무시`,`NPV(Net Present Value, 순현재가치): 미래 현금흐름을 할인율로 현재가치화한 후 투자비를 차감`,`NPV > 0이면 투자 가치 있음, NPV가 가장 큰 대안을 선택`,`IRR(Internal Rate of Return, 내부수익률): NPV=0이 되는 할인율 — IRR > 요구수익률이면 투자`,`화폐의 시간가치(Time Value of Money): 현재의 1원은 미래의 1원보다 가치가 크다는 원칙`],blanks:[{s:`ROI({{투자 수익률}}) = ({{순이익}} ÷ {{투자비용}}) × 100.`},{s:`NPV({{순현재가치}})는 미래 현금흐름을 {{할인율}}로 현재가치화한 후 투자비를 차감한 값이다.`},{s:`NPV > {{0}}이면 투자 가치가 있으며, NPV가 {{가장 큰}} 대안을 선택한다.`},{s:`IRR({{내부수익률}})은 {{NPV=0}}이 되는 할인율이며, IRR > {{요구수익률}}이면 투자한다.`}]},
{topic:`디지털 제품 여권 (DPP, Digital Product Passport)`,domain:`MG`,keywords:[`법적 근거: EU 에코디자인 규정(ESPR, Ecodesign for Sustainable Products Regulation)`,`도입 목적: 순환경제(Circular Economy) 실현 — 자원 효율성, 재활용률 향상, 탄소 배출 감축`,`기록 정보: 탄소발자국(Carbon Footprint), 원산지, 재활용 비율, 유해물질 함량, 수리 정보`,`기술 기반: 블록체인(데이터 위변조 방지·투명성), IoT(실시간 추적), QR코드/NFC(소비자 접근)`,`적용 대상: 배터리(2027년 의무화 예정), 섬유, 전자제품 등 단계적 확대`,`ESG 정보 공시와 연계: 기업의 환경·사회·지배구조 데이터 투명성 강화`],blanks:[{s:`DPP는 제품의 {{원재료부터 폐기까지}} 전 {{생애주기 정보}}를 디지털화한 전자 기록이다.`},{s:`법적 근거: EU {{에코디자인 규정(ESPR)}} — {{순환경제(Circular Economy)}} 실현이 목적이다.`},{s:`기록 정보: {{탄소발자국}}, {{원산지}}, {{재활용 비율}}, 유해물질 함량, 수리 정보.`},{s:`기술 기반: {{블록체인}}(위변조 방지), {{IoT}}(실시간 추적), {{QR코드/NFC}}(소비자 접근).`}]}
]},
{label:`DAY 5`,
qs:[
{a:"AI",t:`연관규칙`,q:`신뢰도(Confidence) = P(B|A)의 산출 방식으로 옳은 것은?`,o:[`Support(A∩B) ÷ Support(B)`,`Support(A) ÷ Support(B)`,`Support(A) × Support(B)`,`Support(A∩B) ÷ Support(A)`],ans:3,exp:`<b>신뢰도(Confidence) = Support(A∩B) ÷ Support(A) = P(B|A)</b> — A를 구매한 거래 중 B도 함께 구매한 비율입니다.`},
{a:"AI",t:`ROC/AUC`,q:`클래스 불균형 데이터에서 정확도(Accuracy)보다 더 적합한 평가 지표는?`,o:[`MSE(평균 제곱 오차)`,`MAE(평균 절대 오차)`,`R-Square(결정계수)`,`F1-Score 또는 AUC`],ans:3,exp:`클래스 불균형 시: 정확도(Accuracy)보다 <b>F1-Score</b>나 <b>AUC</b>가 더 적합한 평가 지표입니다.`},
{a:"AI",t:`K-Means DBSCAN`,q:`실루엣 계수(Silhouette Coefficient)의 해석으로 옳은 것은?`,o:[`0에 가까울수록 잘 분리됨`,`-1에 가까울수록 잘 분리됨`,`1에 가까울수록 잘 분리됨`,`2에 가까울수록 잘 분리됨`],ans:2,exp:`<b>실루엣 계수</b>: -1~1 범위로, <b>1에 가까울수록 잘 분리</b>됨, 0이면 경계, -1이면 잘못 분류됨을 의미합니다.`},
{a:"AI",t:`ARIMA`,q:`Box-Jenkins 방법론의 3단계 순서로 옳은 것은?`,o:[`진단 → 추정 → 식별`,`식별 → 추정 → 진단`,`식별 → 진단 → 추정`,`추정 → 식별 → 진단`],ans:1,exp:`Box-Jenkins 방법론: <b>①식별(Identification)</b> → <b>②추정(Estimation)</b> → <b>③진단(Diagnostic)</b>입니다.`},
{a:"AI",t:`SVM`,q:`원-클래스 SVM(One-Class SVM)의 주요 활용 분야는?`,o:[`시계열 예측`,`이상치 탐지`,`이미지 생성`,`다중 클래스 분류`],ans:1,exp:`<b>원-클래스 SVM(One-Class SVM)</b>: 정상 데이터만으로 경계를 학습하여 <b>이상치 탐지</b>에 활용됩니다.`},
{a:"AI",t:`Scaling Law`,q:`추론 예산(Inference Budget) 개념의 핵심은?`,o:[`GPU 메모리를 문제별로 재분배하는 것`,`학습 데이터의 양을 동적으로 조절하는 것`,`문제 난이도에 따라 추론 연산량을 동적 할당하는 것`,`모델 파라미터 수를 실시간으로 변경하는 것`],ans:2,exp:`<b>추론 예산(Inference Budget)</b>: <b>문제 난이도에 따라 추론 연산량을 동적 할당</b>합니다. 쉬운 문제에는 적은 연산, 어려운 문제에는 많은 연산을 투입합니다.`},
{a:"AI",t:`데이터 전처리`,q:`교차 검증(K-Fold Cross-Validation)의 목적으로 옳은 것은?`,o:[`피처의 차원을 축소한다`,`학습 속도를 높이기 위해 데이터를 분할한다`,`결측치를 보간하여 데이터 품질을 높인다`,`모델의 일반화 성능을 안정적으로 평가한다`],ans:3,exp:`<b>K-Fold 교차 검증</b>: 데이터를 K개 폴드로 나누어 번갈아 학습·검증하여 <b>모델의 일반화 성능</b>을 안정적으로 평가합니다.`},
{a:"AI",t:`GAN vs Diffusion`,q:`DDPM(Denoising Diffusion Probabilistic Model)이 속하는 모델 분류는?`,o:[`Flow-based Model(흐름 기반 모델)`,`GAN(생성적 적대 신경망)`,`VAE(변분 오토인코더)`,`Diffusion Model(확산 모델)`],ans:3,exp:`<b>DDPM</b>은 대표적인 <b>확산 모델(Diffusion Model)</b> 프레임워크입니다. Stable Diffusion, DALL-E의 기반 기술입니다.`},
{a:"SC",t:`접근 통제`,q:`ABAC(Attribute-Based Access Control)의 특징으로 옳은 것은?`,o:[`시간, 위치, 부서 등 속성 기반으로 동적 접근을 제어한다`,`역할(Role)에 권한을 할당한다`,`자원 소유자가 자율적으로 권한을 부여한다`,`보안 등급에 따라 강제적으로 접근을 통제한다`],ans:0,exp:`<b>ABAC(Attribute-Based Access Control)</b>: <b>속성(시간, 위치, 부서 등)</b> 기반의 <b>동적 접근 통제</b>로, RBAC의 진화된 형태입니다.`},
{a:"SC",t:`침해사고`,q:`CERT/CSIRT의 역할로 옳은 것은?`,o:[`침해사고 대응 팀으로서 보안 사고에 대응한다`,`소프트웨어 품질을 인증한다`,`정보화 사업의 투자 타당성을 분석한다`,`네트워크 설계를 최적화한다`],ans:0,exp:`<b>CERT(Computer Emergency Response Team)</b> / <b>CSIRT</b>: <b>침해사고 대응 팀</b>으로서 사이버 보안 사고에 체계적으로 대응합니다.`},
{a:"SC",t:`망분리`,q:`망연계 솔루션의 목적으로 옳은 것은?`,o:[`망 간 자료를 안전하게 전송한다`,`모든 사용자에게 동일한 네트워크를 제공한다`,`물리적 망분리를 논리적으로 전환한다`,`내부망과 외부망을 완전히 차단한다`],ans:0,exp:`<b>망연계 솔루션</b>: 분리된 <b>망 간 자료 전송</b> 시 스트림/파일 방식으로 <b>안전하게 연계</b>하는 시스템입니다.`},
{a:"SC",t:`크리덴셜 스터핑`,q:`FDS에서 머신러닝 활용의 장점으로 옳은 것은?`,o:[`행동 패턴 학습으로 신종 패턴 탐지와 오탐률 감소`,`인터넷 연결 없이도 작동한다`,`모든 거래를 차단하여 사기를 원천 방지한다`,`룰 설정이 불필요해진다`],ans:0,exp:`FDS에서 ML 활용: <b>행동 패턴 학습</b>으로 <b>신종 패턴 탐지</b>와 <b>오탐률(False Positive) 감소</b>를 달성합니다.`},
{a:"SC",t:`SW 공급망`,q:`SLSA(Supply-chain Levels for Software Artifacts)의 목적은?`,o:[`소프트웨어 라이선스를 관리한다`,`개발자 생산성을 측정한다`,`코드 품질을 자동 평가한다`,`소프트웨어 공급망의 무결성을 보장하는 보안 프레임워크`],ans:3,exp:`<b>SLSA(Supply-chain Levels for Software Artifacts)</b>: <b>소프트웨어 공급망의 무결성</b>을 보장하기 위한 보안 프레임워크입니다.`},
{a:"NW",t:`BGP`,q:`BGP의 4가지 메시지 유형에 해당하지 않는 것은?`,o:[`KEEPALIVE`,`HELLO`,`UPDATE`,`OPEN`],ans:1,exp:`BGP 4가지 메시지: <b>OPEN, UPDATE, KEEPALIVE, NOTIFICATION</b>입니다. <b>HELLO</b>는 OSPF의 메시지입니다.`},
{a:"NW",t:`네트워크 암호화`,q:`전방향 비밀성(PFS)의 의미로 옳은 것은?`,o:[`암호화 속도가 일정하게 유지되는 속성`,`세션키 유출 시에도 이전 세션 데이터가 보호되는 속성`,`모든 방향의 트래픽을 동시에 암호화하는 기능`,`미래의 암호 알고리즘을 예측하여 적용하는 기법`],ans:1,exp:`<b>전방향 비밀성(PFS, Perfect Forward Secrecy)</b>: <b>세션키가 유출되더라도 이전 세션 데이터가 보호</b>되는 속성입니다.`},
{a:"NW",t:`Wi-Fi 진화`,q:`WPA3에서 도입된 인증 방식으로 옳은 것은?`,o:[`EAP-TLS`,`PSK(Pre-Shared Key)`,`SAE(Simultaneous Authentication of Equals)`,`RADIUS`],ans:2,exp:`<b>WPA3</b>: <b>SAE(Simultaneous Authentication of Equals)</b> 방식을 도입하여 오프라인 사전 공격을 방어합니다.`},
{a:"NW",t:`IPSec`,q:`SA(Security Association)의 특성으로 옳은 것은?`,o:[`단방향 논리적 연결이며 SPI로 식별한다`,`양방향 통신을 하나의 SA로 처리한다`,`암호화 없이 인증만 제공한다`,`UDP 프로토콜 위에서만 동작한다`],ans:0,exp:`<b>SA(Security Association)</b>: <b>단방향 논리적 연결</b>이며, <b>SPI(Security Parameter Index)</b>로 식별합니다.`},
{a:"MG",t:`DPP`,q:`DPP에서 배터리 분야의 의무화 예정 시기는?`,o:[`2025년`,`2027년`,`2030년`,`2035년`],ans:1,exp:`배터리 분야는 <b>2027년</b> DPP 의무화가 예정되어 있으며, 이후 섬유·전자제품 등으로 단계적 확대됩니다.`},
{a:"MG",t:`ITIL 4`,q:`ITIL 4의 지도 원칙에 해당하지 않는 것은?`,o:[`최적화·자동화`,`피드백으로 반복 개선`,`최대 복잡성 추구`,`가치에 집중`],ans:2,exp:`ITIL 4 지도 원칙: 가치 집중, 현재에서 출발, 피드백 반복, 협업·가시성, 전체적 사고, <b>단순·실용</b>, 최적화·자동화. '최대 복잡성 추구'는 원칙이 아닙니다.`},
{a:"MG",t:`ROI, NPV, IRR`,q:`TCO(Total Cost of Ownership)에 포함되는 비용 범위로 옳은 것은?`,o:[`라이선스 비용만`,`도입과 운영 비용만`,`도입·운영·유지보수·폐기까지 전체 소유 비용`,`도입 비용만`],ans:2,exp:`<b>TCO(Total Cost of Ownership)</b>: <b>도입·운영·유지보수·폐기까지 전체 소유 비용</b>을 포함합니다.`}
],
topics:[
{topic:`연관규칙 학습 (Apriori 알고리즘)`,domain:`AI`,keywords:[`Apriori 원리: 빈발 항목집합의 모든 부분집합도 빈발해야 함 (하향 폐쇄 성질, Downward Closure Property)`,`지지도(Support) = 전체 거래 중 A∩B 포함 거래 비율`,`신뢰도(Confidence) = P(B|A) = Support(A∩B) ÷ Support(A)`,`향상도(Lift) = Confidence ÷ Support(B) — Lift>1이면 양의 연관성`,`Apriori 알고리즘 동작: 후보 생성(Candidate Generation) → 가지치기(Pruning) → 지지도 검증 반복`,`한계: 후보 생성 시 조합 폭발 → FP-Growth 알고리즘으로 개선 (Frequent Pattern Tree 사용, 후보 생성 불필요)`],blanks:[{s:`연관규칙의 3대 평가 지표: {{지지도(Support)}}, {{신뢰도(Confidence)}}, {{향상도(Lift)}}.`},{s:`지지도(Support) = 전체 거래 중 {{A∩B 포함 거래}} 비율.`},{s:`신뢰도(Confidence) = {{P(B|A)}} = {{Support(A∩B)}} ÷ {{Support(A)}}.`},{s:`향상도(Lift) = {{Confidence}} ÷ {{Support(B)}}이며, {{Lift>1}}이면 양의 연관성을 의미한다.`}]},
{topic:`분류 모델 성능 평가 (ROC 곡선과 AUC)`,domain:`AI`,keywords:[`F1-Score = 2×(Precision×Recall) ÷ (Precision+Recall) — 정밀도와 재현율의 조화 평균`,`ROC 곡선: X축 FPR(위양성률), Y축 TPR(재현율)로 임계값 변화에 따른 성능 시각화`,`AUC(Area Under Curve): ROC 곡선 아래 면적 — 1에 가까울수록 우수한 모델`,`AUC=0.5이면 랜덤 분류기 수준 (대각선), AUC=1이면 완벽한 분류`,`FPR(위양성률) = FP ÷ (FP+TN) — 실제 음성 중 양성으로 오분류한 비율`,`정밀도-재현율 트레이드오프: 임계값을 높이면 정밀도↑ 재현율↓`],blanks:[{s:`정밀도(Precision) = {{TP}} ÷ ({{TP+FP}}), 재현율(Recall) = {{TP}} ÷ ({{TP+FN}}).`},{s:`F1-Score = {{2×(Precision×Recall)}} ÷ {{(Precision+Recall)}}로, 정밀도와 재현율의 {{조화 평균}}이다.`},{s:`ROC 곡선의 X축은 {{FPR(위양성률)}}, Y축은 {{TPR(재현율)}}이다.`},{s:`AUC가 {{0.5}}이면 랜덤 분류기 수준이고, {{1}}에 가까울수록 우수한 모델이다.`}]},
{topic:`K-Means 군집화와 DBSCAN 알고리즘`,domain:`AI`,keywords:[`엘보우 기법(Elbow Method): K값에 따른 SSE(Sum of Squared Errors) 변화로 최적 K 결정`,`DBSCAN: 밀도 기반 군집화 — 밀집 영역을 하나의 군집으로 연결`,`DBSCAN 파라미터: ε(Epsilon, 탐색 반경)과 MinPts(최소 이웃 수)`,`DBSCAN 포인트 유형: 핵심 포인트(Core), 경계 포인트(Border), 노이즈 포인트(Noise)`,`DBSCAN 장점: K 사전 지정 불필요, 비구형 군집 탐지 가능, 노이즈 자동 탐지`,`실루엣 계수(Silhouette Coefficient): -1~1 범위로 군집 품질 평가, 1에 가까울수록 잘 분리됨`],blanks:[{s:`K-Means는 {{거리 기반}} 군집화이고, DBSCAN은 {{밀도 기반}} 군집화이다.`},{s:`K-Means 동작: ①{{중심점 초기화}} → ②{{가장 가까운 중심에 할당}} → ③{{중심 재계산}} → 수렴까지 반복.`},{s:`K-Means의 한계: {{비구형 데이터}}에 부적합, {{K값 사전 지정}} 필요, {{이상치에 민감}}.`},{s:`DBSCAN의 두 핵심 파라미터: {{ε(Epsilon, 탐색 반경)}}과 {{MinPts(최소 이웃 수)}}.`}]},
{topic:`시계열 분석과 ARIMA 모델`,domain:`AI`,keywords:[`정상성(Stationarity): 평균, 분산, 자기공분산이 시간에 따라 일정한 성질`,`비정상 시계열 → 차분(Differencing)으로 정상화 후 분석`,`ARIMA = AR(자기회귀) + I(차분, 적분) + MA(이동평균)의 결합 모델`,`AR(p): 과거 p개 시점의 자기 값으로 현재 값을 예측`,`MA(q): 과거 q개 시점의 오차(잔차)로 현재 값을 보정`,`I(d): d회 차분(Differencing)으로 비정상 시계열을 정상화`],blanks:[{s:`ARIMA는 {{AR(자기회귀)}} + {{I(차분/적분)}} + {{MA(이동평균)}}의 결합 모델이다.`},{s:`ARIMA(p,d,q)에서 p={{AR 차수}}, d={{차분 횟수}}, q={{MA 차수}}를 의미한다.`},{s:`정상성(Stationarity)이란 {{평균}}, {{분산}}, {{자기공분산}}이 시간에 따라 일정한 성질이다.`},{s:`비정상 시계열은 {{차분(Differencing)}}을 통해 정상화한 후 분석한다.`}]},
{topic:`합성곱 신경망(CNN)의 풀링(Pooling) 계층`,domain:`AI`,keywords:[`평균 풀링(Average Pooling): 영역 내 평균값 계산 — 전체적인 특성 정보를 보존`,`공간 불변성(Spatial Invariance): 입력의 위치가 변해도 동일한 특성을 인식`,`풀링 윈도우 크기와 스트라이드(Stride)로 다운샘플링 비율 조절`,`합성곱 계층의 필터(커널)는 학습 가능한 파라미터, 풀링은 학습 파라미터 없음`,`글로벌 평균 풀링(GAP, Global Average Pooling): FC 계층 대체 → 파라미터 수 대폭 감소`,`최근 트렌드: 스트라이드 합성곱(Strided Convolution)으로 풀링 대체하는 사례 증가`],blanks:[{s:`최대 풀링(Max Pooling)은 영역 내 {{최댓값}}을 선택하고, 평균 풀링(Average Pooling)은 {{평균값}}을 계산한다.`},{s:`풀링이 제공하는 {{공간 불변성(Spatial Invariance)}}은 입력 위치가 변해도 동일한 특성을 인식하게 한다.`},{s:`합성곱 계층의 필터는 {{학습 가능한 파라미터}}이지만, 풀링 계층은 {{학습 파라미터가 없다}}.`},{s:`글로벌 평균 풀링({{GAP}})은 {{FC(완전연결) 계층}}을 대체하여 파라미터 수를 대폭 감소시킨다.`}]},
{topic:`테스트 타임 컴퓨팅 (Test-Time Compute)`,domain:`AI`,keywords:[`핵심 기법: 사고의 사슬(Chain-of-Thought, CoT) — 중간 추론 과정을 명시적으로 생성`,`OpenAI o1 모델: CoT를 내재화하여 수학, 코딩, 과학 추론에서 전문가급 성능 달성`,`강화학습(RL) 기반 훈련: CoT 품질을 보상 함수로 최적화`,`Self-Consistency: 여러 추론 경로를 생성하고 다수결로 최종 답변 선택`,`트레이드오프: 추론 시간 증가 → 비용/지연 상승, 실시간 서비스에 부적합할 수 있음`,`Scaling Law의 새 차원: 모델 크기뿐 아니라 추론 연산량도 성능 향상의 축`],blanks:[{s:`핵심 기법인 {{사고의 사슬(Chain-of-Thought, CoT)}}은 {{중간 추론 과정}}을 명시적으로 생성한다.`},{s:`OpenAI {{o1}} 모델은 CoT를 내재화하여 {{수학, 코딩, 과학 추론}}에서 전문가급 성능을 달성했다.`},{s:`기존 Scaling Law가 {{모델 크기}}에 집중했다면, 새 패러다임은 {{추론 연산량}}도 성능 향상의 축으로 확장한다.`},{s:`Self-Consistency 기법은 {{여러 추론 경로}}를 생성하고 {{다수결}}로 최종 답변을 선택한다.`}]},
{topic:`회귀 분석과 다중공선성`,domain:`AI`,keywords:[`다중공선성(Multicollinearity): 독립변수 간 높은 상관관계로 회귀계수 추정이 불안정해지는 현상`,`VIF(Variance Inflation Factor, 분산팽창인수): 다중공선성 정량 측정 — VIF≥10이면 심각`,`다중공선성 해결: 변수 제거, 주성분 분석(PCA), 릿지 회귀(Ridge Regression, L2 정규화)`,`R-Square(결정계수): 회귀 모델의 설명력 — 1에 가까울수록 높은 설명력`,`Adjusted R-Square: 독립변수 수를 보정한 결정계수 — 변수 추가에 따른 과대평가 방지`,`RMSE(Root Mean Square Error): 예측값과 실측값 차이의 평균적 크기`],blanks:[{s:`다중공선성은 {{독립변수 간 높은 상관관계}}로 인해 {{회귀계수 추정}}이 불안정해지는 현상이다.`},{s:`VIF({{Variance Inflation Factor}})가 {{10}} 이상이면 심각한 다중공선성으로 판단한다.`},{s:`다중공선성 해결 방법: {{변수 제거}}, {{PCA(주성분 분석)}}, {{릿지 회귀(Ridge, L2 정규화)}}.`},{s:`R-Square({{결정계수}})는 {{1}}에 가까울수록 모델의 설명력이 높음을 의미한다.`}]},
{topic:`SVM (서포트 벡터 머신)`,domain:`AI`,keywords:[`하드 마진(Hard Margin): 이상치 허용 없이 완벽 분리 — 오버피팅(과적합) 위험`,`소프트 마진(Soft Margin): 슬랙 변수(ξ)로 일부 오분류 허용 — C 파라미터로 패널티 조절`,`커널 트릭(Kernel Trick): 저차원 데이터를 고차원 공간으로 매핑하여 비선형 분류 가능`,`대표 커널 함수: 선형(Linear), 다항식(Polynomial), RBF(Radial Basis Function, 가우시안)`,`SVM의 장점: 고차원 데이터에 강건, 일반화 성능 우수 (구조적 위험 최소화)`,`SVM의 한계: 대규모 데이터셋에서 학습 시간이 오래 걸림, 커널·하이퍼파라미터 선택 어려움`],blanks:[{s:`{{서포트 벡터(Support Vector)}}는 결정 경계에 {{가장 가까운}} 데이터 포인트들이다.`},{s:`하드 마진은 {{오버피팅}} 위험이 있으므로, {{슬랙 변수(ξ)}}를 도입한 {{소프트 마진}}을 사용한다.`},{s:`{{커널 트릭(Kernel Trick)}}은 데이터를 {{고차원 공간}}으로 매핑하여 비선형 분류를 가능하게 한다.`},{s:`대표 커널 함수: {{선형(Linear)}}, {{다항식(Polynomial)}}, {{RBF(가우시안)}}.`}]},
{topic:`접근 통제 모델 (MAC, DAC, RBAC)`,domain:`SC`,keywords:[`MAC 모델: Biba — 무결성 중심 (No Read Down, No Write Up)`,`DAC(Discretionary Access Control, 임의적 접근 통제): 자원 소유자가 자율적으로 접근 권한 부여`,`DAC 구현: ACL(Access Control List), Capability List`,`DAC 한계: 소유자의 자의적 권한 부여로 보안 취약 → 트로이목마 공격에 취약`,`RBAC(Role-Based Access Control, 역할 기반 접근 통제): 역할(Role)에 권한을 할당하고, 사용자에게 역할을 부여`,`RBAC 장점: 최소 권한 원칙(Least Privilege), 직무 분리(SoD, Separation of Duties) 구현 용이`],blanks:[{s:`MAC({{강제적 접근 통제}})는 {{시스템(보안 관리자)}}이 보안 등급에 따라 접근 권한을 강제 부여한다.`},{s:`BLP 모델: 기밀성 중심 — {{No Read Up}}, {{No Write Down}}.`},{s:`Biba 모델: 무결성 중심 — {{No Read Down}}, {{No Write Up}}.`},{s:`DAC({{임의적 접근 통제}})는 {{자원 소유자}}가 자율적으로 접근 권한을 부여한다.`}]},
{topic:`망분리 (물리적 망분리와 논리적 망분리)`,domain:`SC`,keywords:[`논리적 망분리 방식: VDI(Virtual Desktop Infrastructure) — 서버에서 가상 데스크톱 제공`,`논리적 망분리 방식: SBC(Server-Based Computing) — 서버에서 애플리케이션 실행, 화면만 전송`,`물리적 망분리 장점: 보안 강도 최상 / 단점: 높은 구축·운영 비용, 업무 불편`,`논리적 망분리 장점: 비용 절감, 유연성 / 단점: 가상화 취약점, 하이퍼바이저 해킹 위험`,`적용 대상: 공공기관(전자정부법), 금융기관(전자금융감독규정) 의무 적용`,`최근 트렌드: 제로 트러스트 기반 논리적 망분리 완화 — 클라우드 환경 대응`],blanks:[{s:`논리적 망분리의 두 방식: {{VDI(Virtual Desktop Infrastructure)}}와 {{SBC(Server-Based Computing)}}.`},{s:`물리적 망분리의 장점은 {{보안 강도 최상}}이고, 단점은 {{높은 구축·운영 비용}}이다.`},{s:`논리적 망분리의 위험: {{가상화 취약점}}과 {{하이퍼바이저 해킹}} 위험이 존재한다.`},{s:`공공기관은 {{전자정부법}}, 금융기관은 {{전자금융감독규정}}에 의해 망분리가 의무이다.`}]},
{topic:`침해사고 대응 7단계 절차`,domain:`SC`,keywords:[`①사전 준비: 대응 팀(CERT/CSIRT) 구성, 대응 절차 매뉴얼, 도구·장비 확보`,`②탐지/식별: IDS/IPS, SIEM, 로그 분석으로 이상 징후 탐지 및 사고 유형 식별`,`③초기 대응: 피해 확산 방지를 위한 네트워크 격리, 증거 보전(포렌식 이미징)`,`④대응 전략 수립: 사고 범위·영향도 평가, 법적 조치 필요 여부 판단`,`⑤조사/분석: 디지털 포렌식으로 공격 경로·원인 규명, 타임라인 재구성`,`⑥복구/해결: 시스템 재설치·패치, 백업 복원, 정상 서비스 재개`],blanks:[{s:`②탐지/식별 단계에서 {{IDS/IPS}}, {{SIEM}}, 로그 분석으로 이상 징후를 탐지한다.`},{s:`③초기 대응 단계의 핵심: {{네트워크 격리}}와 {{증거 보전(포렌식 이미징)}}.`},{s:`⑤조사/분석 단계에서 {{디지털 포렌식}}으로 공격 경로와 원인을 규명한다.`},{s:`증거 보전의 3원칙: {{무결성(Hash)}}, {{연계 보관성(Chain of Custody)}}, {{적법성}}.`}]},
{topic:`CTEM (지속적 위협 노출 관리)`,domain:`SC`,keywords:[`①범위 설정: 비즈니스 자산과 공격 표면(Attack Surface) 식별`,`②발견: 자산의 취약점, 구성 오류, 위협 인텔리전스 수집`,`③우선순위화: 실제 악용 가능성과 비즈니스 영향도에 따른 리스크 순위 결정`,`④검증: 침투 테스트(Pentest), BAS(Breach and Attack Simulation)로 실제 악용 가능성 검증`,`⑤동원: 보안팀·IT팀·경영진 협력하여 수정 조치 실행`,`공격 표면 관리(ASM, Attack Surface Management): CTEM의 핵심 구성요소`],blanks:[{s:`CTEM 5단계: ①{{범위 설정(Scoping)}} → ②{{발견(Discovery)}} → ③{{우선순위화(Prioritization)}} → ④{{검증(Validation)}} → ⑤{{동원(Mobilization)}}.`},{s:`기존 취약점 관리(VM)는 {{패치 중심}}이지만, CTEM은 {{비즈니스 리스크 기준}}으로 우선순위를 결정한다.`},{s:`검증 단계에서 {{침투 테스트}}와 {{BAS(Breach and Attack Simulation)}}로 악용 가능성을 확인한다.`},{s:`{{공격 표면 관리(ASM, Attack Surface Management)}}는 CTEM의 핵심 구성요소이다.`}]},
{topic:`PKI와 양자내성암호(PQC)`,domain:`SC`,keywords:[`PKI 구성요소: CA(인증기관), RA(등록기관), CRL(인증서 폐지 목록), OCSP(온라인 인증서 상태 프로토콜)`,`디지털 인증서: X.509 표준 — 공개키, 소유자 정보, CA 서명 포함`,`양자 위협: 쇼어 알고리즘(Shor's Algorithm)으로 RSA, ECC 등 현행 공개키 암호가 해독 가능`,`PQC(Post-Quantum Cryptography, 양자내성암호): 양자 컴퓨터로도 해독 불가능한 차세대 암호 체계`,`NIST PQC 표준화: CRYSTALS-Kyber(키캡슐화), CRYSTALS-Dilithium(전자서명) 등 선정`,`격자 기반 암호(Lattice-based Cryptography): PQC의 주류 — 격자 문제의 계산 난이도 활용`],blanks:[{s:`PKI 구성요소: {{CA(인증기관)}}, {{RA(등록기관)}}, {{CRL(인증서 폐지 목록)}}, {{OCSP}}.`},{s:`양자 컴퓨터의 {{쇼어 알고리즘(Shor's Algorithm)}}으로 RSA, ECC 등 현행 공개키 암호가 해독 가능해진다.`},{s:`NIST PQC 표준: {{CRYSTALS-Kyber}}(키캡슐화)와 {{CRYSTALS-Dilithium}}(전자서명).`},{s:`PQC의 주류 방식인 {{격자 기반 암호(Lattice-based)}}는 격자 문제의 {{계산 난이도}}를 활용한다.`}]},
{topic:`Wi-Fi 7과 MLO (Multi-Link Operation)`,domain:`NW`,keywords:[`4K-QAM(4096-QAM): 한 심볼에 12비트 전송 → Wi-Fi 6의 1024-QAM(10비트) 대비 20% 처리량 증가`,`320MHz 채널 폭: Wi-Fi 6E(160MHz)의 2배 — 최대 46Gbps 이론 속도`,`CMU-MIMO: 좌표 다중 사용자 MIMO — 더 많은 사용자 동시 접속 지원`,`적용 사례: AR/VR 스트리밍, 클라우드 게이밍, 산업용 IoT 초저지연 통신`,`6GHz 대역: Wi-Fi 6E에서 도입, Wi-Fi 7에서 MLO와 결합하여 본격 활용`,`이전 세대와의 호환성: 레거시 기기와 하위 호환 유지`],blanks:[{s:`MLO({{Multi-Link Operation}})는 {{2.4GHz}}, {{5GHz}}, {{6GHz}} 대역을 동시에 묶어 사용한다.`},{s:`Wi-Fi 7은 {{4K-QAM(4096-QAM)}}으로 한 심볼에 {{12비트}}를 전송한다.`},{s:`Wi-Fi 7의 최대 채널 폭은 {{320MHz}}로, Wi-Fi 6E({{160MHz}})의 2배이다.`},{s:`MLO의 3대 장점: {{대역폭 증가}}, {{지연 감소}}, 링크 장애 시 {{자동 페일오버}}.`}]},
{topic:`네트워크 계층별 암호화 (IPsec, TLS)`,domain:`NW`,keywords:[`L7(응용 계층) — HTTPS, SSH, S/MIME 등 애플리케이션별 보안 프로토콜`,`TLS 1.3의 개선: 불필요한 암호 스위트 제거, 1-RTT 핸드셰이크(기존 2-RTT), 0-RTT 재개(Resumption)`,`TLS 핸드셰이크: 클라이언트 Hello → 서버 Hello → 인증서 교환 → 키 교환 → 암호화 통신`,`TLS 1.3에서 제거된 것: RSA 키 교환(전방향 비밀성 미보장), SHA-1, RC4, CBC 모드 등`,`전방향 비밀성(PFS, Perfect Forward Secrecy): 세션키 유출 시에도 이전 세션 데이터 보호`,`TLS 1.3은 ECDHE(타원곡선 Diffie-Hellman) 키 교환만 허용 → PFS 보장`],blanks:[{s:`L4 암호화: {{TLS(Transport Layer Security)}} — 세션 기반 암호화, {{HTTPS}}의 기반.`},{s:`TLS 1.3의 핸드셰이크 개선: 기존 {{2-RTT}}에서 {{1-RTT}}로 단축.`},{s:`TLS 1.3에서는 {{RSA 키 교환}}이 제거되고 {{ECDHE}}만 허용하여 {{PFS(전방향 비밀성)}}를 보장한다.`},{s:`전방향 비밀성(PFS)은 세션키 유출 시에도 {{이전 세션 데이터}}를 보호하는 속성이다.`}]},
{topic:`6G NTN (Non-Terrestrial Network)`,domain:`NW`,keywords:[`3GPP Release 17: NTN 표준 최초 도입 — 5G NR 기반 위성 통신 지원`,`위성 궤도 유형: LEO(저궤도, 500~2000km), MEO(중궤도), GEO(정지궤도, 35,786km)`,`LEO 위성의 장점: 저지연(20~40ms RTT), 단점: 빠른 이동 속도로 도플러 시프트 발생`,`도플러 시프트 보상: 주파수 사전 보상, 빔 핸드오버 기술로 연속 통신 보장`,`HAPS(High Altitude Platform Station): 고도 20km 성층권에 배치하는 준위성 플랫폼`,`NTN-TN 융합: 지상 기지국과 위성을 통합 관리하는 하이브리드 네트워크 아키텍처`],blanks:[{s:`3GPP {{Release 17}}에서 NTN 표준이 최초 도입되어 {{5G NR}} 기반 위성 통신을 지원한다.`},{s:`LEO(저궤도) 위성의 장점은 {{저지연(20~40ms RTT)}}이고, 단점은 {{도플러 시프트}} 발생이다.`},{s:`HAPS({{High Altitude Platform Station}})는 고도 {{20km}} 성층권에 배치하는 준위성 플랫폼이다.`},{s:`6G 비전: {{지상·해상·공중·우주}}를 아우르는 '{{초공간}}' 통신 커버리지.`}]},
{topic:`Wi-Fi 진화 (Wi-Fi 6 → 6E → 7)`,domain:`NW`,keywords:[`Wi-Fi 6E: 6GHz 대역 확장(최대 1200MHz 추가 스펙트럼) → 채널 혼잡 해소`,`Wi-Fi 7 (802.11be, EHT): MLO, 4K-QAM, 320MHz 채널 폭의 3대 혁신`,`MLO: 여러 주파수 대역을 동시에 묶어 사용 → 처리량 증가 + 지연 감소`,`4K-QAM(4096-QAM): 한 심볼에 12비트 → Wi-Fi 6(1024-QAM, 10비트) 대비 20% 효율 증가`,`TWT(Target Wake Time): Wi-Fi 6에서 도입된 IoT 기기 전력 절약 기술`,`WPA3: 최신 Wi-Fi 보안 프로토콜 — SAE(Simultaneous Authentication of Equals) 방식 도입`],blanks:[{s:`OFDMA는 하나의 채널을 {{RU(Resource Unit)}} 단위로 여러 사용자에게 분배하는 기술이다.`},{s:`Wi-Fi 6E는 {{6GHz 대역}}을 확장하여 최대 {{1200MHz}} 추가 스펙트럼을 제공한다.`},{s:`Wi-Fi 7의 3대 혁신: {{MLO}}, {{4K-QAM}}, {{320MHz 채널 폭}}.`},{s:`TWT({{Target Wake Time}})는 Wi-Fi 6에서 도입된 {{IoT 기기}} 전력 절약 기술이다.`}]},
{topic:`IT 투자 타당성 분석 (ROI, NPV, IRR)`,domain:`MG`,keywords:[`NPV(Net Present Value, 순현재가치): 미래 현금흐름을 할인율로 현재가치화한 후 투자비를 차감`,`NPV > 0이면 투자 가치 있음, NPV가 가장 큰 대안을 선택`,`IRR(Internal Rate of Return, 내부수익률): NPV=0이 되는 할인율 — IRR > 요구수익률이면 투자`,`화폐의 시간가치(Time Value of Money): 현재의 1원은 미래의 1원보다 가치가 크다는 원칙`,`할인율(Discount Rate): 미래 현금흐름을 현재가치로 변환하는 이자율`,`TCO(Total Cost of Ownership): 도입·운영·유지보수·폐기까지 전체 소유 비용`],blanks:[{s:`NPV({{순현재가치}})는 미래 현금흐름을 {{할인율}}로 현재가치화한 후 투자비를 차감한 값이다.`},{s:`NPV > {{0}}이면 투자 가치가 있으며, NPV가 {{가장 큰}} 대안을 선택한다.`},{s:`IRR({{내부수익률}})은 {{NPV=0}}이 되는 할인율이며, IRR > {{요구수익률}}이면 투자한다.`},{s:`ROI의 단점: {{화폐의 시간가치}} 미반영, {{투자 기간}} 무시.`}]},
{topic:`디지털 제품 여권 (DPP, Digital Product Passport)`,domain:`MG`,keywords:[`기록 정보: 탄소발자국(Carbon Footprint), 원산지, 재활용 비율, 유해물질 함량, 수리 정보`,`기술 기반: 블록체인(데이터 위변조 방지·투명성), IoT(실시간 추적), QR코드/NFC(소비자 접근)`,`적용 대상: 배터리(2027년 의무화 예정), 섬유, 전자제품 등 단계적 확대`,`ESG 정보 공시와 연계: 기업의 환경·사회·지배구조 데이터 투명성 강화`,`국내 수출 기업 영향: EU 시장 진출 시 DPP 준수 필수 — 공급망 데이터 디지털화 필요`,`GS1 표준: 제품 식별 코드(GTIN), 데이터 교환 포맷 표준화`],blanks:[{s:`법적 근거: EU {{에코디자인 규정(ESPR)}} — {{순환경제(Circular Economy)}} 실현이 목적이다.`},{s:`기록 정보: {{탄소발자국}}, {{원산지}}, {{재활용 비율}}, 유해물질 함량, 수리 정보.`},{s:`기술 기반: {{블록체인}}(위변조 방지), {{IoT}}(실시간 추적), {{QR코드/NFC}}(소비자 접근).`},{s:`배터리 분야는 {{2027년}} DPP 의무화가 예정되어 있다.`}]},
{topic:`ITIL 4 서비스 가치 체계(SVS)`,domain:`MG`,keywords:[`SVS 구성요소: ①기회/수요 → ②서비스 가치 사슬(SVC) → ③지도 원칙 → ④거버넌스 → ⑤지속적 개선 → ⑥관리 관행(Practice)`,`서비스 가치 사슬(SVC): 계획(Plan), 개선(Improve), 참여(Engage), 설계·전환(Design & Transition), 획득·구축(Obtain/Build), 전달·지원(Deliver & Support)`,`ITIL 4 지도 원칙 7가지: 가치에 집중, 현재 위치에서 출발, 피드백으로 반복 개선, 협업·가시성, 전체적 사고, 단순·실용, 최적화·자동화`,`4차원 모델: 조직과 사람, 정보와 기술, 파트너와 공급자, 가치 흐름과 프로세스`,`ITIL v3 라이프사이클: 전략→설계→전환→운영→지속적 개선 (수직적 제공 모델)`,`DevOps/Agile 수용: ITIL 4는 폭포수 방식에서 벗어나 애자일, 린, DevOps 관행과 통합`],blanks:[{s:`SVS의 핵심인 서비스 가치 사슬(SVC) 6가지: {{계획}}, {{개선}}, {{참여}}, {{설계·전환}}, {{획득·구축}}, {{전달·지원}}.`},{s:`ITIL 4의 4차원 모델: {{조직과 사람}}, {{정보와 기술}}, {{파트너와 공급자}}, {{가치 흐름과 프로세스}}.`},{s:`ITIL v3는 {{서비스 라이프사이클}} 중심이었으나, ITIL 4는 {{서비스 가치 체계(SVS)}} 중심이다.`},{s:`ITIL 4는 {{DevOps}}, {{Agile}}, {{Lean}} 관행과 통합하여 현대 IT 환경에 대응한다.`}]}
]}
];

/* engine_3step_daily.js
   DAY 선택 → 3-STEP 파이프라인 엔진
   데이터 구조: DAYS[{label,qs[],topics[{topic,domain,keywords[],blanks[{s}]}]}]
*/

// ═══ State ═══
let curDay=-1;
let stepDone=[false,false,false];
let s1={qi:0,score:0,answered:false};
let s2={ti:0,results:[]};
let s3={ti:0};
let QS=[],TOPICS=[];

function atag(a){
  const m={AI:'tAI',NW:'tNW',MG:'tMG',SC:'tSC'},l={AI:'인공지능/통계',NW:'네트워크',MG:'IT경영',SC:'디지털보안'};
  return`<span class="tag ${m[a]||'tN'}">${l[a]||a}</span>`;
}
function stepIndicator(cur){
  return`<div class="step-ind">${[0,1,2].map(i=>{
    let cls=i===0?'s1':i===1?'s2':'s3';
    if(i===cur)cls+=' current';
    else if(!stepDone[i]&&i!==cur)cls=' inactive';
    return(i>0?`<div class="step-line${stepDone[i-1]?' done':''}"></div>`:'')+
    `<div class="step-dot ${cls}">${stepDone[i]?'✓':(i+1)}</div>`;
  }).join('')}</div>`;
}

// ═══ DAY LIST ═══
function renderDayList(){
  curDay=-1;
  document.getElementById('hdrT').textContent='4주차 주간모의고사 · 3-STEP 인출 훈련';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="home-title">4주차 · 3-STEP 인출 훈련</div>
    <div class="home-sub">인공지능/통계 · 네트워크 · IT경영 · 디지털보안<br>매일 20문항 객관식 + 20토픽 키워드 인출 + 20토픽 빈칸 채우기</div>
    <div class="day-grid">${DAYS.map((d,i)=>{
      const done=!!dayScores[i];
      return`<div class="day-card${done?' done':''}" onclick="selectDay(${i})">
        <div class="day-lbl">${d.label}</div>
        ${done?`<div class="day-score" style="color:#059669">STEP1: ${dayScores[i].s1}/20</div>`:'<div class="day-score" style="color:#94a3b8">미완료</div>'}
        <button class="day-btn">${done?'다시 하기':'시작하기'}</button>
      </div>`;
    }).join('')}</div>`;
}

let dayScores={};
function selectDay(idx){
  curDay=idx;
  QS=DAYS[idx].qs;
  TOPICS=DAYS[idx].topics;
  stepDone=[false,false,false];
  s1={qi:0,score:0,answered:false};
  s2={ti:0,results:[]};
  s3={ti:0};
  renderHome();
}

// ═══ 3-STEP HOME ═══
function renderHome(){
  const d=DAYS[curDay];
  document.getElementById('hdrT').textContent=d.label+' · 3-STEP 인출 훈련';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="home-title">${d.label} · 3-STEP 인출 훈련</div>
    <div class="home-sub">인공지능/통계 · 네트워크 · IT경영 · 디지털보안 핵심 개념<br>인지 확인 → 키워드 인출 → 빈칸 채우기</div>
    <div class="info-banner">
      💡 <b>학습 파이프라인</b> : 같은 토픽을 3단계에 걸쳐 점점 깊이 있게 반복합니다.<br>
      순서대로 진행하면 효과적이지만, <b>각 단계를 독립적으로 연습</b>할 수도 있습니다.
    </div>
    <div class="pipeline">
      <div class="pipe-step${stepDone[0]?' done':''}" onclick="startStep1()">
        <div class="pipe-num pn1">1</div>
        <div class="pipe-lbl">📝 STEP 1 · 객관식 퀴즈</div>
        <div class="pipe-desc">4지선다로 핵심 개념을 빠르게 점검합니다. (${QS.length}문항)</div>
        ${stepDone[0]?`<div class="pipe-score">✅ ${s1.score}/${QS.length} 완료</div>`:''}
      </div>
      <div class="pipe-connector"></div>
      <div class="pipe-step${stepDone[1]?' done':''}" onclick="startStep2()">
        <div class="pipe-num pn2">2</div>
        <div class="pipe-lbl">🔑 STEP 2 · 키워드 인출</div>
        <div class="pipe-desc">토픽명만 보고 핵심 키워드를 떠올려 봅니다. (${TOPICS.length}토픽)</div>
        ${stepDone[1]?`<div class="pipe-score">✅ 완료</div>`:''}
      </div>
      <div class="pipe-connector"></div>
      <div class="pipe-step${stepDone[2]?' done':''}" onclick="startStep3()">
        <div class="pipe-num pn3">3</div>
        <div class="pipe-lbl">✏️ STEP 3 · 빈칸 채우기</div>
        <div class="pipe-desc">핵심 문장의 빈칸을 채우며 정확한 키워드를 확인합니다. (${TOPICS.length}토픽)</div>
        ${stepDone[2]?`<div class="pipe-score">✅ 완료</div>`:''}
      </div>
    </div>
    <div style="text-align:center;margin-top:8px"><button class="r-btn secondary" onclick="renderDayList()" style="font-size:12px;padding:8px 18px">← DAY 목록으로</button></div>
  `;
}

// ═══ STEP 1 ═══
function startStep1(){s1={qi:0,score:0,answered:false};renderQuiz();}
function renderQuiz(){
  const pw=document.getElementById('progWrap');pw.style.display='block';
  document.getElementById('progFill').style.background='linear-gradient(90deg,#4f46e5,#7c3aed)';
  document.getElementById('progTxt').textContent=`STEP 1 · ${s1.qi+1} / ${QS.length}`;
  document.getElementById('progScr').textContent=`점수: ${s1.score}`;
  document.getElementById('progFill').style.width=`${((s1.qi+1)/QS.length)*100}%`;
  const q=QS[s1.qi];
  document.getElementById('app').innerHTML=`${stepIndicator(0)}
    <div class="q-card"><div class="q-meta">${atag(q.a)}<span class="tag tN">Q${s1.qi+1}</span><span class="tag tN">${q.t}</span><button class="back-btn" onclick="renderHome()">← 목록</button></div>
    <div class="q-text">${q.q}</div>
    <div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" id="o${i}" onclick="s1Choose(${i})"><span class="opt-lbl">${'①②③④'[i]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="fb" id="fb"></div></div>
    <div class="next-row"><button class="next-btn" id="nxt" onclick="s1Next()">${s1.qi+1<QS.length?'다음 문제 →':'결과 보기 →'}</button></div>`;
  s1.answered=false;
}
function s1Choose(idx){
  if(s1.answered)return;s1.answered=true;const q=QS[s1.qi];
  for(let i=0;i<4;i++){const b=document.getElementById('o'+i);b.classList.add('dis');if(i===q.ans)b.classList.add(idx===q.ans?'ok':'rv');}
  const fb=document.getElementById('fb');
  if(idx===q.ans){s1.score++;document.getElementById('o'+idx).classList.add('ok');fb.className='fb ok';fb.innerHTML=`<div class="fb-t">✅ 정답!</div>${q.exp}`;}
  else{document.getElementById('o'+idx).classList.add('ng');fb.className='fb ng';fb.innerHTML=`<div class="fb-t">❌ 오답 — 정답: ${'①②③④'[q.ans]}</div>${q.exp}`;}
  fb.style.display='block';document.getElementById('nxt').style.display='inline-block';document.getElementById('progScr').textContent=`점수: ${s1.score}`;
}
function s1Next(){s1.qi++;if(s1.qi>=QS.length)s1Result();else renderQuiz();}
function s1Result(){
  stepDone[0]=true;dayScores[curDay]={s1:s1.score};
  document.getElementById('progWrap').style.display='none';
  const pct=Math.round(s1.score/QS.length*100);
  const grade=pct>=90?'🏆 최우수':pct>=75?'🥇 우수':pct>=60?'🥈 보통':'🥉 분발 필요';
  document.getElementById('app').innerHTML=`${stepIndicator(0)}
    <div class="result-card"><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">STEP 1 · 객관식 퀴즈 결과</div>
    <div><span class="r-score">${s1.score}</span><span class="r-denom"> / ${QS.length}</span></div>
    <div class="r-pct">정답률 ${pct}%</div><div class="r-grade">${grade}</div>
    <div class="r-msg">객관식으로 핵심 개념을 확인했습니다.<br>이제 같은 토픽의 키워드를 <b>직접 떠올려 보세요!</b></div>
    <div class="r-btns"><button class="r-btn green" onclick="startStep2()">🔑 STEP 2 · 키워드 인출 →</button><button class="r-btn secondary" onclick="renderHome()">목록으로</button></div></div>`;
}

// ═══ STEP 2 ═══
function startStep2(){s2={ti:0,results:[]};renderKeyword();}
function renderKeyword(){
  const pw=document.getElementById('progWrap');pw.style.display='block';
  document.getElementById('progFill').style.background='linear-gradient(90deg,#059669,#10b981)';
  document.getElementById('progTxt').textContent=`STEP 2 · ${s2.ti+1} / ${TOPICS.length}`;
  document.getElementById('progScr').textContent='';
  document.getElementById('progFill').style.width=`${((s2.ti+1)/TOPICS.length)*100}%`;
  const tp=TOPICS[s2.ti];
  document.getElementById('app').innerHTML=`${stepIndicator(1)}
    <div class="kw-card"><div class="q-meta">${atag(tp.domain)}<span class="tag tN">${s2.ti+1}/${TOPICS.length}</span><button class="back-btn" onclick="renderHome()">← 목록</button></div>
    <div class="kw-topic">${tp.topic}</div>
    <div class="kw-prompt">이 토픽의 <b>핵심 키워드</b>를 먼저 떠올려 보세요.<br>충분히 생각한 후 아래 버튼을 눌러 확인합니다.</div>
    <button class="kw-reveal-btn" id="kwRevBtn" onclick="revealKw()">💡 키워드 공개</button>
    <div class="kw-list" id="kwList">${tp.keywords.map((k,i)=>`<div class="kw-item" id="kw${i}" onclick="toggleKw(${i})"><div class="kw-check">✓</div><div style="flex:1;color:#334155">${k}</div></div>`).join('')}</div>
    <div class="kw-self-row" id="kwSelfRow">
      <div style="font-size:12px;color:#64748b;margin-bottom:8px">떠올린 키워드만 터치하여 <b style="color:#059669">✓ 체크</b>하세요. 체크하지 않은 항목은 못 떠올린 것으로 집계됩니다.</div>
      <button class="r-btn green" id="kwNxt" onclick="kwNext()" style="display:none;font-size:12px;padding:8px 20px">${s2.ti+1<TOPICS.length?'다음 토픽 →':'결과 보기 →'}</button>
    </div></div>`;
  window._kwR=false;window._kwC=new Array(tp.keywords.length).fill(0);
}
function revealKw(){if(window._kwR)return;window._kwR=true;document.getElementById('kwRevBtn').classList.add('revealed');document.getElementById('kwRevBtn').textContent='키워드가 공개되었습니다';document.getElementById('kwList').classList.add('show');document.getElementById('kwSelfRow').classList.add('show');document.getElementById('kwNxt').style.display='inline-block';}
function toggleKw(i){
  if(!window._kwR)return;const el=document.getElementById('kw'+i);
  if(window._kwC[i]===0){window._kwC[i]=1;el.className='kw-item checked';}
  else{window._kwC[i]=0;el.className='kw-item';}
}
function kwNext(){
  const tp=TOPICS[s2.ti];s2.results.push({topic:tp.topic,checked:window._kwC.filter(v=>v===1).length,total:tp.keywords.length});
  s2.ti++;if(s2.ti>=TOPICS.length)s2Result();else renderKeyword();
}
function s2Result(){
  stepDone[1]=true;document.getElementById('progWrap').style.display='none';
  const tK=s2.results.reduce((a,r)=>a+r.total,0),tC=s2.results.reduce((a,r)=>a+r.checked,0),pct=Math.round(tC/tK*100);
  document.getElementById('app').innerHTML=`${stepIndicator(1)}
    <div class="result-card"><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">STEP 2 · 키워드 인출 결과</div>
    <div><span class="r-score" style="background:linear-gradient(135deg,#059669,#10b981);-webkit-background-clip:text">${tC}</span><span class="r-denom"> / ${tK} 키워드</span></div>
    <div class="r-pct">인출 성공률 ${pct}%</div>
    <div class="r-msg">${s2.results.map(r=>`<span style="font-size:11px;color:${r.checked===r.total?'#059669':'#64748b'}">${r.topic.split('(')[0].trim()}: ${r.checked}/${r.total}</span>`).join(' · ')}<br><br>이제 <b>빈칸 채우기</b>로 정확한 키워드를 확인합니다!</div>
    <div class="r-btns"><button class="r-btn amber" onclick="startStep3()">✏️ STEP 3 · 빈칸 채우기 →</button><button class="r-btn secondary" onclick="renderHome()">목록으로</button></div></div>`;
}

// ═══ STEP 3 ═══
function startStep3(){s3={ti:0};renderBlank();}
function renderBlank(){
  const pw=document.getElementById('progWrap');pw.style.display='block';
  document.getElementById('progFill').style.background='linear-gradient(90deg,#d97706,#f59e0b)';
  document.getElementById('progTxt').textContent=`STEP 3 · ${s3.ti+1} / ${TOPICS.length}`;
  document.getElementById('progScr').textContent='';
  document.getElementById('progFill').style.width=`${((s3.ti+1)/TOPICS.length)*100}%`;
  const tp=TOPICS[s3.ti];
  const blHtml=tp.blanks.map((b,bi)=>{
    let html=b.s.replace(/\{\{([^}]+)\}\}/g,(_,ans)=>`<span class="bl-blank" data-ans="${ans}" onclick="rvBl(this)">[　?　]</span>`);
    return`<div class="bl-sentence"><span class="bl-label">${bi+1}</span>${html}</div>`;
  }).join('');
  document.getElementById('app').innerHTML=`${stepIndicator(2)}
    <div class="bl-card"><div class="q-meta">${atag(tp.domain)}<span class="tag tN">${s3.ti+1}/${TOPICS.length}</span><button class="back-btn" onclick="renderHome()">← 목록</button></div>
    <div class="bl-topic">${tp.topic}</div>
    <div class="bl-prompt">빈칸을 터치하면 키워드가 하나씩 공개됩니다. 먼저 머릿속으로 떠올린 후 터치하세요!</div>
    ${blHtml}
    <button class="bl-reveal-all" id="blRA" onclick="rvAll()">전체 키워드 공개</button></div>
    <div class="next-row"><button class="next-btn" id="blNxt" style="display:inline-block;${s3.ti+1>=TOPICS.length?'background:linear-gradient(135deg,#d97706,#f59e0b)':''}" onclick="blNext()">${s3.ti+1<TOPICS.length?'다음 토픽 →':'최종 결과 →'}</button></div>`;
}
function rvBl(el){if(el.classList.contains('revealed'))return;el.classList.add('revealed');el.textContent=el.dataset.ans;}
function rvAll(){document.querySelectorAll('.bl-blank:not(.revealed)').forEach(el=>{el.classList.add('revealed');el.textContent=el.dataset.ans;});const b=document.getElementById('blRA');b.classList.add('done');b.textContent='모든 키워드가 공개되었습니다';}
function blNext(){s3.ti++;if(s3.ti>=TOPICS.length)s3Result();else renderBlank();}
function s3Result(){
  stepDone[2]=true;document.getElementById('progWrap').style.display='none';
  document.getElementById('app').innerHTML=`${stepIndicator(2)}
    <div class="result-card"><div style="font-size:12px;color:#94a3b8;margin-bottom:8px">🎉 3-STEP 인출 훈련 완료!</div>
    <div style="font-size:42px;margin:10px 0">🏆</div>
    <div class="r-grade">${DAYS[curDay].label} 인출 훈련을 모두 마쳤습니다</div>
    <div class="r-msg">"아는 것"에서 "쓸 수 있는 것"으로 한 걸음 더 나아갔습니다.<br>내일도 같은 루틴으로 반복하면, 시험장에서 자연스럽게 키워드가 나옵니다! 💪</div>
    <div class="r-btns"><button class="r-btn primary" onclick="selectDay(${curDay})">처음부터 다시</button><button class="r-btn secondary" onclick="renderDayList()">DAY 목록으로</button></div></div>`;
}

renderDayList();

</script>
</body>
</html>
