  },

    opts: [
      "Read Committed → Read Uncommitted → Repeatable Read → Serializable",
      "Read Uncommitted → Read Committed → Repeatable Read → Serializable",
      "Repeatable Read → Read Committed → Read Uncommitted → Serializable",
      "Serializable → Repeatable Read → Read Committed → Read Uncommitted"
    ],

    exp: "ANSI SQL 표준 격리 수준은 낮은 순으로 <strong>Read Uncommitted → Read Committed → Repeatable Read → Serializable</strong>입니다. 단계가 높을수록 이상 현상(Dirty Read 등)을 더 많이 차단하지만 동시성은 감소합니다."
  },
  {
    area: "DB", topic: "조인 알고리즘",
    q: "인덱스가 없는 대용량 테이블 두 개를 조인할 때 옵티마이저가 선택하기에 가장 적합한 물리적 조인 방식은?",

      "크로스 조인(Cross Join) — 모든 조합을 생성하므로 빠짐없이 처리하므로"
    ],

    exp: "해시 조인은 작은 테이블을 해시 테이블에 올린 후 큰 테이블을 탐색하는 방식으로, <strong>인덱스가 없는 대용량 동등 조인</strong>에 가장 유리합니다. 정렬 병합 조인은 이미 정렬된 경우, NL 조인은 인덱스가 있는 소규모 결과에 적합합니다."
  },
  {
    area: "DS", topic: "Apache Kafka",
    q: "Apache Kafka의 핵심 특징으로 옳지 않은 것은?",
    opts: [
      "링크드인에서 개발한 오픈소스 분산 메시지 브로커이다",
      "발행-구독(Pub/Sub) 모델을 기반으로 동작한다",
      "데이터를 디스크에 순차 저장(Sequential I/O)하여 대용량 처리 성능을 높인다",

    ],

    exp: "Kafka는 메시지를 처리 후 즉시 삭제하지 않고, <strong>설정된 보존 기간(Retention Period) 동안 디스크에 유지</strong>합니다. 이로 인해 컨슈머가 원하는 시점부터 메시지를 다시 소비(Re-consume)할 수 있습니다."
  },
  {
    area: "DS", topic: "MEC",
    q: "MEC(Mobile Edge Computing)의 주요 목적으로 가장 적절한 것은?",
    opts: [
      "중앙 데이터센터의 컴퓨팅 파워를 최대화하여 AI 학습 효율을 높이는 것",
      "사용자 단말기 자체에 고성능 칩을 탑재하여 온디바이스 AI를 구현하는 것",
      "기지국 주변에 컴퓨팅 자원을 배치하여 데이터 처리 지연을 최소화하는 것",
      "클라우드 사업자의 멀티 리전 구성을 통해 글로벌 가용성을 확보하는 것"
    ],
    ans: 2,
    exp: "MEC는 사용자와 가까운 <strong>기지국(에지)에 서버를 전진 배치</strong>하는 기술입니다. 데이터가 중앙 클라우드까지 왕복하는 시간을 제거하여 자율주행·원격 수술 등 <strong>초저지연 서비스</strong>를 실현합니다."
  },
  {
    area: "DS", topic: "빅데이터 5V",
    q: "빅데이터의 5V 특성 중 '데이터의 신뢰성과 정확성'을 나타내는 V는?",
    opts: [
      "Volume (규모)",
      "Velocity (속도)",
      "Variety (다양성)",
      "Veracity (진실성)"
    ],
    ans: 3,
    exp: "빅데이터 5V는 Volume(규모), Velocity(속도), Variety(다양성), <strong>Veracity(진실성·신뢰성)</strong>, Value(가치)입니다. Veracity는 수집된 데이터의 품질과 정확성을 보장해야 의미 있는 분석이 가능하다는 개념입니다."
  }
];

let cur = -1, score = 0, answered = false;

function tag(area) {
  const m = {SE:'tag-se SE Ch',CA:'tag-ca CA/OS Ch',DB:'tag-db DB Ch',DS:'tag-ds DS Ch'};
  const cl = m[area].split(' ')[0];
  const label = {SE:'소프트웨어공학',CA:'CA/OS',DB:'데이터베이스',DS:'디지털서비스'}[area];
  return `<span class="tag ${cl}">${label}</span>`;
}

function render() {
  const app = document.getElementById('app');
  const pw = document.getElementById('progressWrap');

  if (cur === -1) {
    pw.style.display = 'none';
    app.innerHTML = `
      <div class="q-card start-card">
        <h2>5주차 주간퀴즈</h2>
        <p>소프트웨어공학 · CA/OS · 데이터베이스 · 디지털서비스<br>총 20문항 | 4지선다 | 문항별 즉시 정답 확인</p>
        <div class="stat-row">
          <div class="stat-box"><div class="stat-val">20</div><div class="stat-key">문항 수</div></div>
          <div class="stat-box"><div class="stat-val">4</div><div class="stat-key">출제 영역</div></div>
          <div class="stat-box"><div class="stat-val">즉시</div><div class="stat-key">정답 확인</div></div>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기 →</button>
      </div>`;
    return;
  }

  if (cur >= Q.length) {
    pw.style.display = 'none';
    const pct = Math.round(score / Q.length * 100);
    const grade = pct >= 90 ? '🏆 최우수' : pct >= 75 ? '🥇 우수' : pct >= 60 ? '🥈 보통' : '🥉 분발 필요';
    const msg = pct >= 90 ? '완벽에 가까운 이해도입니다!' : pct >= 75 ? '핵심 개념을 잘 파악하고 있습니다.' : pct >= 60 ? '부족한 영역을 복습해보세요.' : '개념 정리가 더 필요합니다. 다시 도전!';
    app.innerHTML = `
      <div class="q-card score-card">
        <div style="font-size:13px;color:#64748b;margin-bottom:8px">최종 점수</div>
        <div><span class="score-num">${score}</span><span class="score-denom"> / ${Q.length}</span></div>
        <div class="score-label">정답률 ${pct}%</div>
        <div class="score-grade">${grade}</div>
        <div class="score-msg">${msg}</div>
        <button class="restart-btn" onclick="restartQuiz()">다시 풀기</button>
      </div>`;
    return;
  }

  pw.style.display = 'block';
  document.getElementById('progressText').textContent = `${cur+1} / ${Q.length}`;
  document.getElementById('scoreText').textContent = `점수: ${score}`;
  document.getElementById('progressFill').style.width = `${((cur+1)/Q.length)*100}%`;

  const q = Q[cur];
  app.innerHTML = `
    <div class="q-card">
      <div class="q-meta">${tag(q.area)}<span class="tag tag-num">Q${cur+1}</span><span class="tag tag-num">${q.topic}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`
          <button class="opt-btn" id="opt${i}" onclick="choose(${i})">
            <span class="opt-label">${['①','②','③','④'][i]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>
    <div style="text-align:right;margin-top:-8px">
      <button id="nextBtn" style="display:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer" onclick="next()">
        ${cur+1 < Q.length ? '다음 문제 →' : '결과 보기 →'}
      </button>
    </div>`;
  answered = false;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = Q[cur];
  const fb = document.getElementById('fb');
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById(`opt${i}`);
    btn.classList.add('disabled');
    if (i === q.ans) btn.classList.add(idx === q.ans ? 'correct' : 'reveal');
  }
  if (idx === q.ans) {
    score++;
    document.getElementById(`opt${idx}`).classList.add('correct');
    fb.className = 'feedback correct';
    fb.innerHTML = `<div class="fb-title">✅ 정답!</div>${q.exp}`;
  } else {
    document.getElementById(`opt${idx}`).classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.innerHTML = `<div class="fb-title">❌ 오답 — 정답은 ${['①','②','③','④'][q.ans]}입니다</div>${q.exp}`;
  }
  fb.style.display = 'block';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('scoreText').textContent = `점수: ${score}`;
}

function next() { cur++; render(); }
function startQuiz() { cur = 0; score = 0; render(); }
function restartQuiz() { cur = 0; score = 0; render(); }

render();
</script>
